<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="title">SandeepKumarResume</title>
  <!-- <title id="title">Sandeep Kumar - Senior Software Engineer</title> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary-color: #2563eb;
      --secondary-color: #1e293b;
      --text-main: #334155;
      --text-muted: #64748b;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --accent-color: #3b82f6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      background-color: var(--bg-body);
      color: var(--text-main);
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--bg-card);
      padding: 60px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 30px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--secondary-color);
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .designation {
      font-size: 1.25rem;
      color: var(--primary-color);
      font-weight: 500;
      margin-bottom: 15px;
    }

    .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .contact-info a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-info a:hover {
      color: var(--primary-color);
    }

    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--secondary-color);
      margin: 35px 0 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .section {
      margin-bottom: 30px;
    }

    #summary {
      font-size: 1.05rem;
      color: var(--text-main);
      text-align: justify;
    }

    .job,
    .education,
    .project {
      margin-bottom: 25px;
    }

    .job-header,
    .edu-header,
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .job-title,
    .edu-degree,
    .project-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--secondary-color);
    }

    .job-company,
    .edu-inst {
      font-weight: 500;
      color: var(--primary-color);
    }

    .job-date,
    .edu-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    ul {
      list-style-type: none;
      padding-left: 0;
    }

    li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    li::before {
      content: "•";
      color: var(--primary-color);
      font-weight: bold;
      position: absolute;
      left: 0;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .skill-category h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--secondary-color);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-tag {
      background: var(--bg-body);
      color: var(--text-main);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
    }

    .skill-tag:hover {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
      transform: translateY(-2px);
    }

    .project-desc {
      font-size: 0.95rem;
      color: var(--text-main);
      margin-bottom: 10px;
    }

    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tech-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-color);
      background: #eff6ff;
      padding: 2px 8px;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px;
      }

      h1 {
        font-size: 2rem;
      }

      .job-header,
      .edu-header {
        flex-direction: column;
        gap: 5px;
      }
    }

    @media print {
      @page {
        margin: 0;
      }

      body {
        padding: 1.5cm;
        background: white;
      }

      .container {
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }

      .skill-category,
      .job,
      .education,
      .project {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .page-break {
        page-break-before: always;
      }

      .skill-tag:hover {
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1 id="name"></h1>
      <div class="designation" id="designation"></div>
      <div class="contact-info" id="contact"></div>
    </header>

    <div class="section">
      <h2>Professional Summary</h2>
      <p id="summary"></p>
    </div>

    <div class="section">
      <h2>Technical Skills</h2>
      <div id="skills-container" class="skills-grid"></div>
    </div>

    <div class="section">
      <h2>Professional Experience</h2>
      <div id="experience"></div>
    </div>

    <div class="section">
      <h2>Education</h2>
      <div id="education"></div>
    </div>

    <div class="section">
      <h2>Key Projects</h2>
      <div id="projects"></div>
    </div>
  </div>

  <script src="./assets/data.js"></script>
  <script src="./assets/resume.js"></script>
</body>

</html>
