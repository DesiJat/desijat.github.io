### सूत्र 1.33: चित्त प्रसादन (मन की शांति के उपाय)

> **मैत्रीकरुणामुदितोपेक्षाणां सुखदुःखपुण्यापुण्यविषयाणां भावनातश्चित्तप्रसादनम् ॥३३॥**
> *(Maitri karuna mudita upekshanam sukha duhkha punya apunya vishayanam bhavanatas chitta prasadanam)*

#### शब्दार्थ:
- **मैत्री (Maitri):** मित्रता (Friendliness).
- **करुणा (Karuna):** दया (Compassion).
- **मुदिता (Mudita):** प्रसन्नता (Gladness).
- **उपेक्षा (Upeksha):** उदासीनता/इग्नोर करना (Indifference).
- **सुख (Sukha):** सुखी लोग।
- **दुःख (Duhkha):** दुखी लोग।
- **पुण्य (Punya):** अच्छे काम करने वाले (Virtuous).
- **अपुण्य (Apunya):** बुरे काम करने वाले (Wicked).

#### भावार्थ:
मन को शांत और प्रसन्न रखने के लिए चार भावनाएं अपनाएं:
1. **सुखी** लोगों के प्रति **मैत्री** (ईर्ष्या न करें)।
2. **दुखी** लोगों के प्रति **करुणा** (मदद करें)।
3. **पुण्यात्माओं** (अच्छे लोगों) के प्रति **मुदिता** (खुश हों)।
4. **पापियों** (बुरे लोगों) के प्रति **उपेक्षा** (उन्हें इग्नोर करें, गुस्सा न करें)।

#### WWWH Framework:
- **What:** सामाजिक व्यवहार (Social Intelligence) का सबसे बड़ा सूत्र।
- **Why:** हमारे अधिकतर क्लेश (तनाव) दूसरों के व्यवहार से आते हैं। यह सूत्र हमें हर स्थिति में शांत रहना सिखाता है।
- **When:** जब भी आप किसी से मिलें या किसी के बारे में सोचें।
- **How:**
  - अगर कोई खुश है, तो जलें नहीं, दोस्त बनें।
  - अगर कोई दुखी है, तो दया दिखाएं।
  - अगर कोई बुरा कर रहा है, तो उससे लड़ें नहीं, उसे अपने मन से निकाल दें (Ignore)।

---

### सूत्र 1.34: प्राण द्वारा स्थिरता

> **प्रच्छर्दनविधारणाभ्यां वा प्राणस्य ॥३४॥**
> *(Pracchardana vidharanabhyam va pranasya)*

#### शब्दार्थ:
- **प्रच्छर्दन (Pracchardana):** बाहर निकालना (Exhalation).
- **विधारणाभ्याम् (Vidharanabhyam):** रोकना (Retention).
- **वा (Va):** अथवा।
- **प्राणस्य (Pranasya):** सांस का।

#### भावार्थ:
सांस को विशेष रूप से बाहर निकालने और रोकने (रेचक और कुंभक) से भी मन स्थिर होता है।

#### WWWH Framework:
- **What:** प्राणायाम तकनीक।
- **Why:** सांस और मन का गहरा संबंध है। सांस थमेगी तो मन थमेगा।
- **When:** जब मन बहुत बेचैन हो या गुस्सा आए।
- **How:** जोर से सांस बाहर छोड़ें और जितनी देर सुखपूर्वक हो सके, बाहर ही रोकें।

---

### सूत्र 1.35: दिव्य विषयों का ध्यान

> **विषयवती वा प्रवृत्तिरुत्पन्ना मनसः स्थितिनिबन्धनी ॥३५॥**
> *(Vishayavati va pravrittir utpanna manasah sthiti nibandhani)*

#### शब्दार्थ:
- **विषयवती (Vishayavati):** दिव्य विषयों वाली (Sensory perception).
- **प्रवृत्तिः (Pravrittih):** अनुभव/गतिविधि।
- **उत्पन्ना (Utpanna):** पैदा होने पर।
- **मनसः (Manasah):** मन को।
- **स्थितिनिबन्धनी (Sthiti nibandhani):** बांधने वाली/स्थिर करने वाली।

#### भावार्थ:
दिव्य गंध, दिव्य स्वाद, या दिव्य नाद (Sound) का अनुभव होने पर भी मन उसमें बंधकर स्थिर हो जाता है।

#### WWWH Framework:
- **What:** सूक्ष्म इंद्रियों का अनुभव।
- **Why:** जब मन को कोई अलौकिक अनुभव मिलता है, तो उसका विश्वास पक्का हो जाता है।
- **When:** ध्यान के दौरान अगर कोई खुशबू या आवाज आए।
- **How:** नाक के अग्र भाग पर ध्यान लगाने से दिव्य गंध का अनुभव हो सकता है।

---

### सूत्र 1.36: ज्योति का ध्यान

> **विशोका वा ज्योतिष्मती ॥३६॥**
> *(Vishoka va jyotishmati)*

#### शब्दार्थ:
- **विशोका (Vishoka):** शोक रहित/दुख रहित (Sorrowless).
- **वा (Va):** अथवा।
- **ज्योतिष्मती (Jyotishmati):** प्रकाशमय (Luminous).

#### भावार्थ:
हृदय में शोक-रहित, प्रकाशमय ज्योति का ध्यान करने से भी मन शांत होता है।

#### WWWH Framework:
- **What:** इनर लाइट मेडिटेशन।
- **Why:** प्रकाश सत्व गुण का प्रतीक है और अंधेरे (अज्ञान) को मिटाता है।
- **When:** जब मन उदास या भारी हो।
- **How:** कल्पना करें कि आपके हृदय कमल में एक शांत, स्थिर लौ जल रही है।

---

### सूत्र 1.37: वीतराग का ध्यान

> **वीतरागविषयं वा चित्तम् ॥३७॥**
> *(Vitaraga vishayam va chittam)*

#### शब्दार्थ:
- **वीतराग (Vitaraga):** राग-द्वेष से मुक्त (Desireless).
- **विषयं (Vishayam):** विषय बनाने वाला।
- **वा (Va):** अथवा।
- **चित्तम् (Chittam):** मन।

#### भावार्थ:
जिन महापुरुषों (जैसे बुद्ध, कृष्ण, क्राइस्ट) का मन राग-द्वेष से मुक्त हो चुका है, उनका ध्यान करने से भी अपना मन शांत हो जाता है।

#### WWWH Framework:
- **What:** रोल मॉडल का ध्यान।
- **Why:** मन जैसा सोचता है, वैसा बनता है। शांत व्यक्ति का ध्यान करने से शांति मिलती है।
- **When:** जब अपना मन काबू में न आए।
- **How:** अपने गुरु या इष्ट देव का स्मरण करें जो पूर्णतः शांत हैं।

---

### सूत्र 1.38: स्वप्न और निद्रा का ज्ञान

> **स्वप्ननिद्राज्ञानालम्बनं वा ॥३८॥**
> *(Svapna nidra jnana alambanam va)*

#### शब्दार्थ:
- **स्वप्न (Svapna):** सपना।
- **निद्रा (Nidra):** गहरी नींद।
- **ज्ञान (Jnana):** ज्ञान।
- **आलम्बनं (Alambanam):** सहारा।

#### भावार्थ:
सपने में देखे गए किसी दिव्य दृश्य या गहरी नींद के सुखद अनुभव का सहारा लेने से भी मन स्थिर होता है।

#### WWWH Framework:
- **What:** अवचेतन के संकेतों का उपयोग।
- **Why:** कभी-कभी सपने हमें गहरा संदेश या शांति देते हैं।
- **When:** सुबह उठने के बाद।
- **How:** अगर कोई अच्छा सपना आया हो, तो उस भावना को दिन भर याद रखें।

---

### सूत्र 1.39: मनचाहा ध्यान

> **यथाभिमतध्यानाद्वा ॥३९॥**
> *(Yatha abhimata dhyanad va)*

#### शब्दार्थ:
- **यथा (Yatha):** जैसा।
- **अभिमत (Abhimata):** पसंद हो (Desired).
- **ध्यानात् (Dhyanat):** ध्यान करने से।
- **वा (Va):** अथवा।

#### भावार्थ:
या फिर, जो भी (शुभ) रूप या वस्तु आपको पसंद हो, उसका ध्यान करने से मन स्थिर हो जाता है।

#### WWWH Framework:
- **What:** फ्रीडम ऑफ चॉइस।
- **Why:** जबरदस्ती थोपे गए ध्यान में मन नहीं लगता। जो प्यारा लगता है, वहां मन खुद टिकता है।
- **When:** शुरुआत में।
- **How:** किसी को पहाड़ पसंद है, किसी को फूल, किसी को भगवान। जो भाए, उसी का ध्यान करें।

---

### सूत्र 1.40: वशीकार (Mastery)

> **परमाणुपरममहत्त्वान्तोऽस्य वशीकारः ॥४०॥**
> *(Paramanu parama mahattva anto asya vashikarah)*

#### शब्दार्थ:
- **परमाणु (Paramanu):** सबसे छोटा कण (Atom).
- **परममहत्त्व (Parama mahattva):** सबसे महान/विशाल (Infinite).
- **अन्तः (Antah):** तक।
- **अस्य (Asya):** इसका (योगी का)।
- **वशीकारः (Vashikarah):** अधिकार/मास्टरी।

#### भावार्थ:
जब योगी का मन स्थिर हो जाता है, तो वह सबसे छोटे परमाणु से लेकर सबसे विशाल ब्रह्मांड तक - किसी भी चीज पर एकाग्र हो सकता है। उसकी रेंज (Range) अनंत हो जाती है।

#### WWWH Framework:
- **What:** ध्यान की शक्ति का विस्तार।
- **Why:** यह बताने के लिए कि एकाग्रता केवल एक बिंदु के लिए नहीं, बल्कि सर्वव्यापी है।
- **When:** समाधि सिद्ध होने पर।
- **How:** यह अभ्यास का परिणाम (Result) है।

---

### सूत्र 1.41: समापत्ति (Engrossment)

> **क्षीणवृत्तेरभिजातस्येव मणेर्ग्रहीतृग्रहणग्राह्येषु तत्स्थतदञ्जनता समापत्तिः ॥४१॥**
> *(Kshina vritter abhijatasya eva maner grahitri grahana grahyeshu tatstha tadanjanata samapattih)*

#### शब्दार्थ:
- **क्षीणवृत्तेः (Kshina vritter):** जिसकी वृत्तियां कमजोर हो गई हैं।
- **अभिजातस्य मणेः इव (Abhijatasya maner iva):** शुद्ध स्फटिक मणि (Crystal) की तरह।
- **ग्रहीतृ (Grahitri):** जानने वाला (Subject).
- **ग्रहण (Grahana):** इंद्रियां (Instrument).
- **ग्राह्येषु (Grahyeshu):** वस्तु (Object).
- **तत्स्थतदञ्जनता (Tatstha tadanjanata):** उसी में स्थित होकर उसी का रंग ले लेना।
- **समापत्तिः (Samapattih):** समापत्ति (Complete absorption).

#### भावार्थ:
जैसे शुद्ध स्फटिक (Crystal) के पास लाल फूल रखने पर वह लाल दिखता है, वैसे ही शांत मन जिस भी चीज (ज्ञाता, ज्ञान, या ज्ञेय) पर टिकता है, उसी का रूप ले लेता है। इसे समापत्ति कहते हैं।

#### WWWH Framework:
- **What:** पूर्ण तल्लीनता (Total Absorption).
- **Why:** इसमें "मैं" मिट जाता है, केवल "वह" रह जाता है।
- **When:** गहरे ध्यान में।
- **How:** अपने आप को भूलकर ऑब्जेक्ट में खो जाना।

---

### सूत्र 1.42: सवितर्क समापत्ति

> **तत्र शब्दार्थज्ञानविकल्पैः संकीर्णा सवितर्का समापत्तिः ॥४२॥**
> *(Tatra shabda artha jnana vikalpaih sankirna savitarka samapattih)*

#### शब्दार्थ:
- **शब्द (Shabda):** नाम।
- **अर्थ (Artha):** वस्तु।
- **ज्ञान (Jnana):** ज्ञान।
- **विकल्पैः (Vikalpaih):** विकल्पों से।
- **संकीर्णा (Sankirna):** मिली-जुली (Mixed).
- **सवितर्का (Savitarka):** तर्क सहित।

#### भावार्थ:
जब ध्यान में शब्द (नाम), अर्थ (वस्तु) और ज्ञान (जानकारी) - तीनों मिले-जुले रहते हैं, तो उसे सवितर्क समापत्ति कहते हैं। (जैसे "गाय" शब्द, गाय का जानवर, और गाय का ज्ञान - सब साथ में)।

#### WWWH Framework:
- **What:** मिक्सड मेडिटेशन।
- **Why:** शुरुआत में मन चीजों को अलग-अलग नहीं देख पाता, सब मिक्स हो जाता है।
- **When:** ध्यान की प्रारंभिक अवस्था में।
- **How:** किसी मूर्ति या मंत्र पर ध्यान लगाते समय उसके नाम और रूप दोनों को साथ में अनुभव करें।

---

### सूत्र 1.43: निर्वितर्क समापत्ति

> **स्मृतिपरिशुद्धौ स्वरूपशून्येवार्थमात्रनिर्भासा निर्वितर्का ॥४३॥**
> *(Smriti parishuddhau svarupa shunya iva artha matra nirbhasa nirvitarka)*

#### शब्दार्थ:
- **स्मृतिपरिशुद्धौ (Smriti parishuddhau):** स्मृति (नाम/शब्द) के साफ हो जाने पर।
- **स्वरूपशून्या इव (Svarupa shunya iva):** अपने रूप से शून्य जैसी।
- **अर्थमात्रनिर्भासा (Artha matra nirbhasa):** केवल वस्तु का ही भान होना।
- **निर्वितर्का (Nirvitarka):** तर्क रहित।

#### भावार्थ:
जब शब्द और नाम याद नहीं रहते, केवल वस्तु (Object) का असली स्वरूप चमकता है, जैसे कि मन खुद गायब हो गया हो, उसे निर्वितर्क समापत्ति कहते हैं।

#### WWWH Framework:
- **What:** शुद्ध ध्यान।
- **Why:** शब्दों की भीड़ हटने पर ही सच्चाई दिखती है।
- **When:** जब ध्यान गहरा हो जाए।
- **How:** ध्यान करते-करते जब "मैं ध्यान कर रहा हूँ" का विचार भी मिट जाए, बस लक्ष्य रह जाए।

---

### सूत्र 1.44: सविचार और निर्विचार

> **एतयैव सविचारा निर्विचारा च सूक्ष्मविषया व्याख्याता ॥४४॥**
> *(Etaya eva savichara nirvichara cha sukshma vishaya vyakhyata)*

#### शब्दार्थ:
- **एतया (Etaya):** इसी के द्वारा (सवितर्क/निर्वितर्क के वर्णन से)।
- **सविचारा (Savichara):** विचार सहित (सूक्ष्म विषयों पर)।
- **निर्विचारा (Nirvichara):** विचार रहित (सूक्ष्म विषयों पर)।
- **सूक्ष्मविषया (Sukshma vishaya):** सूक्ष्म विषयों वाली।
- **व्याख्याता (Vyakhyata):** व्याख्या की गई है।

#### भावार्थ:
इसी तरह, जब ध्यान किसी स्थूल (Gross) वस्तु के बजाय सूक्ष्म (Subtle) तत्वों (जैसे तन्मात्र, अहंकार) पर होता है, तो उसे सविचार (विचार सहित) और निर्विचार (विचार रहित) समापत्ति कहते हैं।

#### WWWH Framework:
- **What:** सूक्ष्म जगत का ध्यान।
- **Why:** स्थूल से सूक्ष्म की ओर बढ़ना ही योग है।
- **When:** जब मन स्थूल चीजों से ऊब जाए।
- **How:** अब मूर्ति (स्थूल) को छोड़कर उसके पीछे की शक्ति (सूक्ष्म) पर ध्यान लगाएं।

---

### सूत्र 1.45: सूक्ष्मता की सीमा

> **सूक्ष्मविषयत्वं चालिङ्गपर्यवसानम् ॥४५॥**
> *(Sukshma vishayatvam cha alinga paryavasanam)*

#### शब्दार्थ:
- **सूक्ष्मविषयत्वं (Sukshma vishayatvam):** सूक्ष्म विषयों की सीमा।
- **च (Cha):** और।
- **अलिङ्ग (Alinga):** प्रधान/मूल प्रकृति (The Unmanifest).
- **पर्यवसानम् (Paryavasanam):** अंत/सीमा (Culmination).

#### भावार्थ:
सूक्ष्म विषयों की सीमा "प्रधान" (मूल प्रकृति) तक है। उसके बाद केवल पुरुष (आत्मा) है।

#### WWWH Framework:
- **What:** प्रकृति की आखिरी सीमा।
- **Why:** यह जानने के लिए कि मन कहाँ तक जा सकता है।
- **When:** ज्ञान मार्ग में।
- **How:** समझें कि हर सूक्ष्म चीज अंततः प्रकृति (Matter) ही है, चेतना (Consciousness) नहीं।

---

### सूत्र 1.46: सबीज समाधि

> **ता एव सबीजः समाधिः ॥४६॥**
> *(Ta eva sabijah samadhih)*

#### शब्दार्थ:
- **ताः (Tah):** वे (चारों समापत्तियां)।
- **एव (Eva):** ही।
- **सबीजः (Sabijah):** बीज सहित (With seed).
- **समाधिः (Samadhih):** समाधि हैं।

#### भावार्थ:
ये चारों (सवितर्क, निर्वितर्क, सविचार, निर्विचार) "सबीज समाधि" (Seed Samadhi) कहलाती हैं, क्योंकि इनमें अभी भी संस्कार रूपी बीज बचे रहते हैं।

#### WWWH Framework:
- **What:** बीज वाली समाधि।
- **Why:** क्योंकि इसमें अभी भी लौटने का रास्ता (बीज) बचा है। पूर्ण मुक्ति नहीं है।
- **When:** समाधि के पहले चरण में।
- **How:** इसे अंतिम लक्ष्य न मानें, आगे बढ़ें।

---

### सूत्र 1.47: निर्विचार की स्वच्छता

> **निर्विचारवैशारद्येऽध्यात्मप्रसादः ॥४७॥**
> *(Nirvichara vaisharadye adhyatma prasadah)*

#### शब्दार्थ:
- **निर्विचार (Nirvichara):** निर्विचार समाधि।
- **वैशारद्ये (Vaisharadye):** निर्मलता/कुशलता होने पर (On gaining purity).
- **अध्यात्मप्रसादः (Adhyatma prasadah):** अंतःकरण की स्वच्छता/प्रसन्नता (Spiritual illumination).

#### भावार्थ:
जब निर्विचार समाधि परिपक्व (निर्मल) हो जाती है, तब साधक को "अध्यात्म प्रसाद" (भीतरी स्वच्छता और शांति) प्राप्त होता है।

#### WWWH Framework:
- **What:** परम शांति (Inner Peace).
- **Why:** मन की सारी गंदगी साफ हो गई है।
- **When:** निर्विचार समाधि के बाद।
- **How:** यह अपने आप घटित होता है, जैसे बादल छंटने पर सूरज दिखता है।

---

### सूत्र 1.48: ऋतम्भरा प्रज्ञा

> **ऋतम्भरा तत्र प्रज्ञा ॥४८॥**
> *(Ritambhara tatra prajna)*

#### शब्दार्थ:
- **ऋतम्भरा (Ritambhara):** सत्य को धारण करने वाली (Truth-bearing).
- **तत्र (Tatra):** वहां (उस अवस्था में)।
- **प्रज्ञा (Prajna):** बुद्धि/ज्ञान।

#### भावार्थ:
उस अवस्था में जो बुद्धि (ज्ञान) प्राप्त होती है, वह "ऋतम्भरा" कहलाती है। वह केवल सत्य को ही जानती है, उसमें रत्ती भर भी गलती नहीं होती।

#### WWWH Framework:
- **What:** परम सत्य का ज्ञान।
- **Why:** साधारण बुद्धि गलतियां कर सकती है, ऋतम्भरा नहीं।
- **When:** निर्विचार समाधि की सिद्धि पर।
- **How:** यह बौद्धिक पढ़ाई से नहीं, गहरे ध्यान से मिलती है।

---

### सूत्र 1.49: श्रुत और अनुमान से अलग

> **श्रुतानुमानप्रज्ञाभ्यामन्यविषया विशेषार्थत्वात् ॥४९॥**
> *(Shruta anumana prajnabhyam anya vishaya vishesha arthatvat)*

#### शब्दार्थ:
- **श्रुत (Shruta):** सुना हुआ (शास्त्र)।
- **अनुमान (Anumana):** तर्क/अंदाजा।
- **प्रज्ञाभ्याम् (Prajnabhyam):** बुद्धियों से।
- **अन्यविषया (Anya vishaya):** अलग विषय वाली।
- **विशेषार्थत्वात् (Vishesha arthatvat):** विशेष अर्थ (सत्य) को जानने वाली होने के कारण।

#### भावार्थ:
यह ऋतम्भरा प्रज्ञा, सुने हुए (शास्त्र) और अनुमान (तर्क) से मिले ज्ञान से बिल्कुल अलग और ऊँची है, क्योंकि यह वस्तु के विशेष (असली) तत्व को जानती है, न कि सामान्य रूप को।

#### WWWH Framework:
- **What:** डायरेक्ट नॉलेज (Direct Perception).
- **Why:** किताबें और तर्क केवल इशारा कर सकते हैं, अनुभव नहीं दे सकते।
- **When:** सत्य को साक्षात जानने के लिए।
- **How:** अपनी बुद्धि (Intellect) से परे जाकर अंतर्ज्ञान (Intuition) पर भरोसा करें।

---

### सूत्र 1.50: संस्कारों का नाश

> **तज्जः संस्कारोऽन्यसंस्कारप्रतिबन्धी ॥५०॥**
> *(Taj-jah samskaro anya samskara pratibandhi)*

#### शब्दार्थ:
- **तज्जः (Taj-jah):** उससे (ऋतम्भरा प्रज्ञा से) पैदा होने वाला।
- **संस्कारः (Samskarah):** संस्कार।
- **अन्यसंस्कार (Anya samskara):** दूसरे (पुराने) संस्कारों को।
- **प्रतिबन्धी (Pratibandhi):** रोकने वाला/काटने वाला (Obstructing).

#### भावार्थ:
इस समाधि से पैदा होने वाले संस्कार (निशान) बाकी सभी पुराने सांसारिक संस्कारों को काट देते हैं/रोक देते हैं।

#### WWWH Framework:
- **What:** लोहे को लोहा काटता है।
- **Why:** पुराने बुरे संस्कारों को हटाने के लिए समाधि का प्रबल संस्कार चाहिए।
- **When:** मुक्ति की प्रक्रिया में।
- **How:** समाधि के अभ्यास को बार-बार दोहराकर।

---

### सूत्र 1.51: निर्बीज समाधि (The End)

> **तस्यापि निरोधे सर्वनिरोधान्निर्बीजः समाधिः ॥५१॥**
> *(Tasya api nirodhe sarva nirodhan nirbijah samadhih)*

#### शब्दार्थ:
- **तस्य अपि (Tasya api):** उसका भी (समाधि के संस्कार का भी)।
- **निरोधे (Nirodhe):** रुक जाने पर।
- **सर्वनिरोधात् (Sarva nirodhat):** सब कुछ रुक जाने से।
- **निर्बीजः समाधिः (Nirbijah samadhih):** निर्बीज समाधि।

#### भावार्थ:
जब वह समाधि का संस्कार भी शांत हो जाता है और सब कुछ (सारे विचार, सारे संस्कार) निरुद्ध हो जाते हैं, तब वह "निर्बीज समाधि" (Seedless Samadhi) होती है। यही कैवल्य (मोक्ष) की द्वार है।

#### WWWH Framework:
- **What:** अंतिम लक्ष्य (Ultimate Goal).
- **Why:** जन्म-मरण के चक्र (बीज) को पूरी तरह नष्ट करने के लिए।
- **When:** योग की सर्वोच्च अवस्था में।
- **How:** सब कुछ छोड़कर, खुद को भी छोड़कर।

---
*समाधि पाद (अध्याय 1) समाप्त।*


---

## साधन पाद (Sadhana Pada) - अध्याय 2

### सूत्र 2.1: क्रिया योग

> **तपःस्वाध्यायेश्वरप्रणिधानानि क्रियायोगः ॥१॥**
> *(Tapah svadhyaya ishvarapranidhanani kriya yogah)*

#### शब्दार्थ:
- **तपः (Tapah):** तपस्या/अनुशासन (Austerity/Discipline).
- **स्वाध्याय (Svadhyaya):** स्वयं का अध्ययन/शास्त्र पठन (Self-study).
- **ईश्वरप्रणिधानानि (Ishvarapranidhanani):** ईश्वर के प्रति समर्पण।
- **क्रियायोगः (Kriya yogah):** क्रिया योग है।

#### भावार्थ:
तप (शारीरिक/मानसिक अनुशासन), स्वाध्याय (आत्म-चिंतन), और ईश्वर प्रणिधान (भक्ति) - इन तीनों को मिलाकर 'क्रिया योग' कहते हैं। यह योग की व्यावहारिक शुरुआत है।

#### WWWH Framework:
- **What:** प्रैक्टिकल योग का फॉर्मूला।
- **Why:** शरीर, मन और भावनाओं को शुद्ध करने के लिए।
- **When:** साधना की शुरुआत में।
- **How:**
  - **तप:** सही भोजन, सही नींद, और कष्ट सहने की क्षमता।
  - **स्वाध्याय:** अच्छी किताबें पढ़ें और खुद को ऑब्जर्व करें।
  - **ईश्वर प्रणिधान:** अपने कर्म ईश्वर को अर्पित करें।

---

### सूत्र 2.2: क्रिया योग का उद्देश्य

> **समाधिभावनार्थः क्लेशतनूकरणार्थश्च ॥२॥**
> *(Samadhi bhavanarthah klesha tanukaranarthash cha)*

#### शब्दार्थ:
- **समाधिभावनार्थः (Samadhi bhavanarthah):** समाधि की भावना जगाने के लिए।
- **क्लेश (Klesha):** दुख/क्लेश।
- **तनूकरण (Tanukarana):** कमजोर/पतला करना (To weaken).
- **अर्थः (Arthah):** उद्देश्य।
- **च (Cha):** और।

#### भावार्थ:
क्रिया योग का उद्देश्य दो है: 1. समाधि की स्थिति को लाना, और 2. क्लेशों (दुखों के कारणों) को कमजोर करना।

#### WWWH Framework:
- **What:** योग का डबल एक्शन।
- **Why:** जब तक क्लेश (Ego, Anger etc.) मजबूत हैं, समाधि नहीं लग सकती।
- **When:** रोजमर्रा की जिंदगी में।
- **How:** जब भी गुस्सा (क्लेश) आए, तो तप (चुप रहने) का इस्तेमाल करके उसे कमजोर करें।

---

### सूत्र 2.3: पांच क्लेश (दुख के कारण)

> **अविद्यास्मितारागद्वेषाभिनिवेशाः क्लेशाः ॥३॥**
> *(Avidya asmita raga dvesha abhiniveshah kleshah)*

#### शब्दार्थ:
- **अविद्या (Avidya):** अज्ञान (Ignorance).
- **अस्मिता (Asmita):** अहंकार/"मैं" भाव (Egoism).
- **राग (Raga):** लगाव/मोह (Attachment).
- **द्वेष (Dvesha):** नफरत/चिढ़ (Aversion).
- **अभिनिवेशः (Abhiniveshah):** मृत्यु का डर/जीने की चाह (Fear of death/Clinging to life).
- **क्लेशाः (Kleshah):** क्लेश हैं।

#### भावार्थ:
ये पांच हमारे दुख के मुख्य कारण हैं: अविद्या, अस्मिता, राग, द्वेष और अभिनिवेश।

#### WWWH Framework:
- **What:** दुखों की जड़ें।
- **Why:** इन्हीं पांचों के कारण हम जन्म-मरण के चक्र में फंसते हैं।
- **When:** जब भी मन दुखी हो, चेक करें इनमें से कौन जिम्मेदार है।
- **How:** इन्हें पहचानना ही इनसे छूटने की शुरुआत है।

---

### सूत्र 2.4: अविद्या - सबकी जननी

> **अविद्या क्षेत्रमुत्तरेषां प्रसुप्ततनुविच्छिन्नोदाराणाम् ॥४॥**
> *(Avidya kshetram uttaresham prasupta tanu vicchinna udaranam)*

#### भावार्थ:
अविद्या (अज्ञान) ही बाकी चार क्लेशों (अस्मिता, राग, द्वेष, अभिनिवेश) का खेत (जड़) है। चाहे वे क्लेश सोए हुए हों (प्रसुप्त), कमजोर हों (तनु), दबे हुए हों (विच्छिन्न), या पूरी तरह सक्रिय हों (उदार)।

#### WWWH Framework:
- **What:** अज्ञान ही सबका बाप है।
- **Why:** अगर अज्ञान मिट जाए, तो बाकी सारे दुख अपने आप खत्म हो जाएंगे।
- **When:** मूल कारण ढूंढते समय।
- **How:** ज्ञान (Viveka) के द्वारा अविद्या को नष्ट करें।

---

### सूत्र 2.5: अविद्या की परिभाषा

> **अनित्याशुचिदुःखानात्मसु नित्यशुचिसुखात्मख्यातिरविद्या ॥५॥**
> *(Anitya ashuchi duhkha anatmasu nitya shuchi sukha atma khyatir avidya)*

#### शब्दार्थ:
- **अनित्य (Anitya):** नाशवान।
- **अशुचि (Ashuchi):** अपवित्र।
- **दुःख (Duhkha):** दुखदायी।
- **अनात्मसु (Anatmasu):** जो आत्मा नहीं है।
- **नित्य (Nitya):** हमेशा रहने वाला।
- **शुचि (Shuchi):** पवित्र।
- **सुख (Sukha):** सुखदायी।
- **आत्म (Atma):** आत्मा।
- **ख्यातिः (Khyatih):** समझना/ज्ञान।

#### भावार्थ:
1. जो नाशवान है उसे अमर समझना,
2. जो अपवित्र (शरीर) है उसे पवित्र समझना,
3. जो दुख देने वाला है उसे सुख समझना, और
4. जो आत्मा नहीं है उसे आत्मा समझना - यही अविद्या है।

#### WWWH Framework:
- **What:** उल्टा ज्ञान (Wrong Perception).
- **Why:** हम शरीर को ही "मैं" मान लेते हैं और नश्वर चीजों में सुख ढूंढते हैं।
- **When:** हर पल।
- **How:** याद दिलाएं - "यह शरीर नश्वर है, मैं नहीं।"

---

### सूत्र 2.6: अस्मिता (Ego)

> **दृग्दर्शनशक्त्योरेकात्मतेवास्मिता ॥६॥**
> *(Drig darshana shaktyor ekatmata iva asmita)*

#### शब्दार्थ:
- **दृक् (Drik):** दृष्टा/आत्मा (Seer).
- **दर्शनशक्त्योः (Darshana shaktyoh):** दर्शन शक्ति/बुद्धि (Instrument of seeing).
- **एकात्मता (Ekatmata):** एक हो जाना (Identity).
- **इव (Iva):** जैसे/मानो।
- **अस्मिता (Asmita):** अस्मिता/अहंकार।

#### भावार्थ:
दृष्टा (आत्मा/देखने वाला) और दर्शन शक्ति (बुद्धि/मन) का एक हो जाना अस्मिता है। यानी "मैं" (Soul) और "मेरा विचार/शरीर" (Mind/Body) को एक मान लेना।

#### WWWH Framework:
- **What:** झूठी पहचान (False Ego).
- **Why:** हम अपने टूल्स (मन/शरीर) को ही खुद समझ बैठते हैं।
- **When:** जब हम कहते हैं "मैं गोरा हूँ" या "मैं स्मार्ट हूँ"।
- **How:** भेद करें - "मैं देखने वाला हूँ, और यह शरीर दिखने वाली चीज है।"

---

### सूत्र 2.7: राग (Attachment)

> **सुखानुशयी रागः ॥७॥**
> *(Sukha anushayi ragah)*

#### शब्दार्थ:
- **सुख (Sukha):** सुख।
- **अनुशयी (Anushayi):** पीछे चलने वाला/साथ रहने वाला (Following).
- **रागः (Ragah):** राग/प्रेम/आसक्ति।

#### भावार्थ:
सुख के पीछे भागना और उसे पकड़कर रखने की चाहत राग है। "मुझे यह फिर चाहिए" - यह राग है।

#### WWWH Framework:
- **What:** चिपकाव (Attachment).
- **Why:** सुख की यादें हमें गुलाम बना लेती हैं।
- **When:** जब हम किसी पुरानी खुशी को बार-बार याद करें।
- **How:** सुख का आनंद लें, पर उसे पकड़ें नहीं। "यह भी बीत जाएगा" याद रखें।

---

### सूत्र 2.8: द्वेष (Aversion)

> **दुःखानुशयी द्वेषः ॥८॥**
> *(Duhkha anushayi dveshah)*

#### शब्दार्थ:
- **दुःख (Duhkha):** दुख।
- **अनुशयी (Anushayi):** पीछे चलने वाला।
- **द्वेषः (Dveshah):** द्वेष/नफरत।

#### भावार्थ:
दुख के अनुभव से जो नफरत या गुस्सा पैदा होता है, वह द्वेष है। "मुझे यह नहीं चाहिए" - यह द्वेष है।

#### WWWH Framework:
- **What:** नफरत (Dislike).
- **Why:** हम दुख से भागना चाहते हैं, और जो दुख देता है उससे नफरत करते हैं।
- **When:** जब कोई हमारी इच्छा के खिलाफ जाए।
- **How:** नफरत भी एक तरह का बंधन है। जिसे नफरत करते हैं, उसे ही याद करते रहते हैं। इसे छोड़ें।

---

### सूत्र 2.9: अभिनिवेश (Fear of Death)

> **स्वरसवाही विदुषोऽपि तथारूढोऽभिनिवेशः ॥९॥**
> *(Svarasavahi vidusho api tatha rudho abhiniveshah)*

#### शब्दार्थ:
- **स्वरसवाही (Svarasavahi):** अपने आप बहने वाला/स्वाभाविक (Flowing by its own potency).
- **विदुषः (Vidusho):** विद्वान/ज्ञानी (Wise).
- **अपि (Api):** भी।
- **तथा (Tatha):** वैसे ही।
- **आरूढः (Rudho):** जमा हुआ/स्थित (Established).
- **अभिनिवेशः (Abhiniveshah):** जीने की चाह/मृत्यु भय।

#### भावार्थ:
जीने की अंधी चाहत (या मौत का डर) जो अनपढ़ से लेकर विद्वान तक सबमें समान रूप से पाई जाती है, वह अभिनिवेश है। यह पिछले जन्मों के अनुभव से आता है।

#### WWWH Framework:
- **What:** मौत का डर (Survival Instinct).
- **Why:** शरीर से गहरा जुड़ाव होने के कारण।
- **When:** खतरे के समय।
- **How:** समझें कि आत्मा अमर है, केवल कपड़े (शरीर) बदलते हैं।

---

### सूत्र 2.10: सूक्ष्म क्लेशों का नाश

> **ते प्रतिप्रसवहेयाः सूक्ष्माः ॥१०॥**
> *(Te pratiprasava heyah sukshmah)*

#### शब्दार्थ:
- **ते (Te):** वे (पांचों क्लेश)।
- **प्रतिप्रसव (Pratiprasava):** प्रतिलोम/उल्टा क्रम (Resolving back into cause).
- **हेयाः (Heyah):** त्यागने योग्य/नष्ट करने योग्य (To be destroyed).
- **सूक्ष्माः (Sukshmah):** सूक्ष्म अवस्था में (Subtle).

#### भावार्थ:
इन क्लेशों के सूक्ष्म रूप (बीज) को "प्रतिप्रसव" (उल्टा क्रम/Involution) द्वारा नष्ट किया जाता है। यानी उन्हें उनके मूल कारण (प्रकृति) में वापस लीन करके।

#### WWWH Framework:
- **What:** जड़ से उखाड़ना।
- **Why:** ऊपर से काटने पर घास फिर उग आती है, जड़ (बीज) को जलाना जरूरी है।
- **When:** समाधि की उच्च अवस्था में।
- **How:** ध्यान द्वारा मन को उसके स्रोत (Source) में वापस ले जाकर।

---

### सूत्र 2.11: स्थूल क्लेशों का नाश

> **ध्यानहेयास्तद्वृत्तयः ॥११॥**
> *(Dhyana heyah tad vrittayah)*

#### भावार्थ:
और जब ये क्लेश विचारों (वृत्तियों) के रूप में सक्रिय हों, तो उन्हें **ध्यान** (Meditation) द्वारा नष्ट करना चाहिए।

#### WWWH Framework:
- **What:** क्लेशों की सफाई।
- **Why:** ताकि मन शांत हो सके।
- **When:** जब क्लेश परेशान करें।
- **How:** ध्यान में बैठकर देखें कि गुस्सा या डर कहां से आ रहा है, और उसे साक्षी भाव से विदा करें।

### सूत्र 2.12: कर्माशय (Bank of Karma)

> **क्लेशमूलः कर्माशयो दृष्टादृष्टजन्मवेदनीयः ॥१२॥**
> *(Klesha mulah karmashayo drishta adrishta janma vedaniyah)*

#### शब्दार्थ:
- **क्लेशमूलः (Klesha mulah):** क्लेश ही जिसकी जड़ हैं।
- **कर्माशयः (Karmashayah):** कर्मों का भंडार (Deposit of karma).
- **दृष्टादृष्ट (Drishta adrishta):** इस जन्म में या अगले जन्मों में।
- **वेदनीयः (Vedaniyah):** भोगने योग्य।

#### भावार्थ:
हमारे अच्छे-बुरे कर्मों का भंडार (कर्माशय) क्लेशों (अविद्या, अस्मिता आदि) के कारण बनता है। इसका फल हमें इस जन्म में या अगले जन्मों में भोगना पड़ता है।

#### WWWH Framework:
- **What:** कर्म का सिद्धांत।
- **Why:** हम जो भी करते हैं, वह कहीं खोता नहीं, जमा होता है।
- **When:** कोई भी काम करते समय।
- **How:** ध्यान रखें कि हर काम के पीछे भावना (क्लेश) क्या है? अगर भावना शुद्ध है, तो बंधन कम होगा।

### सूत्र 2.13: कर्म के तीन फल

> **सति मूले तद्विपाको जात्यायुर्भोगाः ॥१३॥**
> *(Sati mule tad vipako jati ayur bhogah)*

#### शब्दार्थ:
- **सति मूले (Sati mule):** जड़ (क्लेश) के होने पर।
- **तद्विपाकः (Tad vipako):** उसका फल (Fruition).
- **जाति (Jati):** जन्म/योनि (Species/Birth).
- **आयुः (Ayuh):** जीवन काल (Life span).
- **भोगाः (Bhogah):** सुख-दुख का अनुभव (Experience).

#### भावार्थ:
जब तक जड़ (क्लेश/अविद्या) मौजूद है, तब तक कर्मों का फल तीन रूपों में मिलता है:
1. **जाति (Jati):** किस योनि/परिवार में जन्म होगा।
2. **आयु (Ayuh):** जीवन कितना लंबा होगा।
3. **भोग (Bhogah):** जीवन में सुख मिलेगा या दुख।

#### WWWH Framework:
- **What:** कर्मफल का पैकेज।
- **Why:** हमारे पिछले कर्म ही हमारा वर्तमान डिजाइन करते हैं।
- **When:** जन्म लेते ही तय हो जाता है।
- **How:** इसे बदला नहीं जा सकता, लेकिन नए कर्मों को सुधारा जा सकता है।

### सूत्र 2.14: सुख और दुख

> **ते ह्लादपरितापफला पुण्यापुण्यहेतुत्वात् ॥१४॥**
> *(Te hlada paritapa phala punya apunya hetutvat)*

#### शब्दार्थ:
- **ते (Te):** वे (जाति, आयु, भोग)।
- **ह्लाद (Hlada):** खुशी/सुख (Joy).
- **परिताप (Paritapa):** दुख/ताप (Sorrow).
- **फलाः (Phalah):** फल वाले।
- **पुण्य (Punya):** अच्छे कर्म (Virtue).
- **अपुण्य (Apunya):** बुरे कर्म (Vice).
- **हेतुत्वात् (Hetutvat):** कारण होने से।

#### भावार्थ:
ये (जन्म, आयु, भोग) सुख देने वाले या दुख देने वाले होते हैं, जो इस बात पर निर्भर करता है कि हमारे कर्म पुण्य (अच्छे) थे या अपुण्य (बुरे)।

#### WWWH Framework:
- **What:** जैसा बीज, वैसा फल।
- **Why:** न्याय का सिद्धांत (Law of Justice).
- **When:** जीवन की हर घटना में।
- **How:** अगर दुख मिल रहा है, तो समझें कि यह किसी पुराने कर्ज का भुगतान है। शिकायत न करें, भुगतान करें।

### सूत्र 2.15: विवेकी के लिए सब दुख है

> **परिणामतापसंस्कारदुःखैर्गुणवृत्तिविरोधाच्च दुःखमेव सर्वं विवेकिनः ॥१५॥**
> *(Parinama tapa samskara duhkhair guna vritti virodhach cha duhkham eva sarvam vivekinah)*

#### भावार्थ:
एक समझदार व्यक्ति (विवेकी) के लिए संसार का हर सुख भी अंततः दुख ही है। क्यों?
1. **परिणाम दुख:** सुख खत्म होने का डर।
2. **ताप दुख:** सुख पाने की बेचैनी/जलन।
3. **संस्कार दुख:** सुख की आदत पड़ जाना।
4. **गुण वृत्ति विरोध:** मन के गुणों (सत्व, रज, तम) में लगातार संघर्ष।

#### WWWH Framework:
- **What:** कड़वा सच (The Hard Truth).
- **Why:** ताकि हम झूठे सुखों के पीछे भागना बंद करें।
- **When:** जब हम किसी सांसारिक सुख में बहुत डूब जाएं।
- **How:** समझें कि हर सुख के पीछे दुख छिपा है, इसलिए समभाव (Equanimity) में रहें।

---

### सूत्र 2.16: हेय (दुख टालने योग्य है)

> **हेयं दुःखमनागतम् ॥१६॥**
> *(Heyam duhkham anagatam)*

#### भावार्थ:
जो दुख अभी आया नहीं है (भविष्य का दुख), उसे टाला जा सकता है (रोका जा सकता है)।

#### WWWH Framework:
- **What:** उम्मीद की किरण (Hope).
- **Why:** पास्ट को नहीं बदल सकते, प्रेजेंट को झेलना है, लेकिन फ्यूचर को बदला जा सकता है।
- **When:** आज, अभी।
- **How:** योग साधना शुरू करके भविष्य के कर्मों को सुधारें।

---

### सूत्र 2.17: हेयहेतु (दुख का कारण)

> **द्रष्टृदृश्ययोः संयोगो हेयहेतुः ॥१७॥**
> *(Drashtri drishyayoh samyogo heya hetuh)*

#### शब्दार्थ:
- **द्रष्टृ (Drashtri):** देखने वाला (Seer/Subject).
- **दृश्ययोः (Drishyayoh):** दिखने वाला (Seen/Object).
- **संयोगः (Samyogah):** मिलन/जुड़ाव (Union/Identification).
- **हेयहेतुः (Heya hetuh):** दुख का कारण (Cause of suffering).

#### भावार्थ:
दुख का मुख्य कारण "द्रष्टा" (आत्मा/Seer) और "दृश्य" (प्रकृति/Seen) का संयोग (जुड़ जाना) है। जब आत्मा खुद को मन/शरीर समझ लेती है, तभी दुख शुरू होता है।

#### WWWH Framework:
- **What:** मिस-आइडेंटिफिकेशन (Misidentification).
- **Why:** जैसे ही हम कहते हैं "यह मेरा है", दुख शुरू हो जाता है।
- **When:** हर पल जब हम शरीर के सुख-दुख को अपना मानते हैं।
- **How:** साक्षी भाव (Witnessing) से इस गांठ को खोलें।

---

### सूत्र 2.18: दृश्य का स्वरूप

> **प्रकाशक्रियास्थितिशीलं भूतेन्द्रियात्मकं भोगापवर्गार्थं दृश्यम् ॥१८॥**
> *(Prakasha kriya sthiti shilam bhuta indriya atmakam bhoga apavarga artham drishyam)*

#### शब्दार्थ:
- **प्रकाश (Prakasha):** प्रकाश/ज्ञान (Sattva).
- **क्रिया (Kriya):** क्रिया/गति (Rajas).
- **स्थिति (Sthiti):** स्थिति/जड़ता (Tamas).
- **शीलम् (Shilam):** स्वभाव वाला।
- **भूतेन्द्रियात्मकम् (Bhuta indriya atmakam):** पंचभूतों और इंद्रियों से बना हुआ।
- **भोगापवर्गार्थम् (Bhoga apavarga artham):** भोग और मोक्ष के लिए।
- **दृश्यम् (Drishyam):** दृश्य (प्रकृति)।

#### भावार्थ:
दृश्य (प्रकृति) तीन गुणों से बना है - सत्व (प्रकाश), रजस (क्रिया), और तमस (स्थिति)। यह पंचभूतों और इंद्रियों के रूप में प्रकट होता है। इसका उद्देश्य पुरुष (आत्मा) को भोग (संसार का अनुभव) और अपवर्ग (मोक्ष) प्रदान करना है।

#### WWWH Framework:
- **What:** प्रकृति का काम।
- **Why:** प्रकृति हमारे लिए खेल का मैदान (भोग) और स्कूल (मोक्ष) दोनों है।
- **When:** जब तक हम मुक्त नहीं होते।
- **How:** प्रकृति का उपयोग सीढ़ी की तरह करें - ऊपर चढ़ने के लिए।

---

### सूत्र 2.19: गुणों की अवस्थाएं

> **विशेषाविशेषलिंगमात्रालिंगानि गुणपर्वाणि ॥१९॥**
> *(Vishesha avishesha linga matra alingani guna parvani)*

#### शब्दार्थ:
- **विशेष (Vishesha):** विशेष (Gross elements).
- **अविशेष (Avishesha):** अविशेष (Subtle elements).
- **लिंगमात्र (Linga matra):** लिंगमात्र (Mahat/Buddhi).
- **अलिंगानि (Alingani):** अलिंग (Pradhana/Prakriti).
- **गुणपर्वाणि (Guna parvani):** गुणों की अवस्थाएं/पर्व।

#### भावार्थ:
गुणों (सत्व, रजस, तमस) की चार अवस्थाएं हैं:
1. **विशेष:** स्थूल तत्व (आकाश, वायु, अग्नि, जल, पृथ्वी)।
2. **अविशेष:** सूक्ष्म तत्व (तन्मात्र)।
3. **लिंगमात्र:** बुद्धि (महत्)।
4. **अलिंग:** मूल प्रकृति।

#### WWWH Framework:
- **What:** सृष्टि का विकास क्रम।
- **Why:** यह समझने के लिए कि हम स्थूल से सूक्ष्म की ओर कैसे बढ़ें।
- **When:** ध्यान की गहराइयों में।
- **How:** स्थूल (शरीर) से सूक्ष्म (मन) और फिर कारण (आत्मा) की ओर यात्रा करें।

---

### सूत्र 2.20: द्रष्टा का स्वरूप

> **द्रष्टा दृशिमात्रः शुद्धोऽपि प्रत्ययानुपश्यः ॥२०॥**
> *(Drashta drishi matrah shuddho api pratyaya anupashyah)*

#### शब्दार्थ:
- **द्रष्टा (Drashta):** आत्मा।
- **दृशिमात्रः (Drishi matrah):** केवल देखने की शक्ति (Pure consciousness).
- **शुद्धः (Shuddhah):** पवित्र (Pure).
- **अपि (Api):** होते हुए भी।
- **प्रत्यय (Pratyaya):** विचार/बुद्धि।
- **अनुपश्यः (Anupashyah):** देखने वाला (Looks through).

#### भावार्थ:
द्रष्टा (आत्मा) केवल देखने वाला (Pure Consciousness) है। वह पूरी तरह शुद्ध है, लेकिन मन के विचारों (प्रत्यय) के माध्यम से देखता है, इसलिए वह अशुद्ध सा लगता है (जैसे रंगीन चश्मे से दुनिया रंगीन दिखती है)।

#### WWWH Framework:
- **What:** आत्मा की शुद्धता।
- **Why:** आत्मा कभी मैली नहीं होती, केवल मन मैला होता है।
- **When:** आत्म-ज्ञान के समय।
- **How:** चश्मा (मन) साफ करें, देखने वाला (आत्मा) तो पहले से ही साफ है।

---

### सूत्र 2.21: दृश्य का प्रयोजन

> **तदर्थ एव दृश्यस्यात्मा ॥२१॥**
> *(Tad artha eva drishyasya atma)*

#### शब्दार्थ:
- **तदर्थ (Tad artha):** उसके (द्रष्टा के) लिए।
- **एव (Eva):** ही।
- **दृश्यस्य (Drishyasya):** दृश्य (प्रकृति) का।
- **आत्मा (Atma):** स्वरूप/अस्तित्व।

#### भावार्थ:
दृश्य (प्रकृति) का अस्तित्व केवल द्रष्टा (आत्मा) के लिए ही है - ताकि वह भोग और मोक्ष प्राप्त कर सके। प्रकृति का अपना कोई स्वार्थ नहीं है।

#### WWWH Framework:
- **What:** निस्वार्थ सेवा।
- **Why:** प्रकृति मां की तरह है जो आत्मा के विकास के लिए सब कुछ करती है।
- **When:** हमेशा।
- **How:** प्रकृति का सम्मान करें, वह आपकी शत्रु नहीं, सहयोगी है।

### सूत्र 2.22: मुक्त और बद्ध के लिए प्रकृति

> **कृतार्थं प्रति नष्टमप्यनष्टं तदन्यसाधारणत्वात् ॥२२॥**
> *(Kritartham prati nashtam apy anashtam tad anya sadharanatvat)*

#### शब्दार्थ:
- **कृतार्थं (Kritartham):** जिसका उद्देश्य पूरा हो गया (मुक्त पुरुष)।
- **प्रति (Prati):** के प्रति/लिए।
- **नष्टम् (Nashtam):** नष्ट/गायब।
- **अपि (Api):** भी।
- **अनष्टम् (Anashtam):** नष्ट नहीं।
- **तदन्य (Tad anya):** दूसरों के लिए।
- **साधारणत्वात् (Sadharanatvat):** समान होने के कारण।

#### भावार्थ:
जिस पुरुष (आत्मा) का उद्देश्य पूरा हो गया है (जो मुक्त हो गया है), उसके लिए प्रकृति (दृश्य) नष्ट हो जाती है (दिखना बंद हो जाती है)। लेकिन दूसरों (जो अभी अज्ञानी हैं) के लिए वह नष्ट नहीं होती, क्योंकि वह सबके लिए समान है।

#### WWWH Framework:
- **What:** सब्जेक्टिव वर्ल्ड।
- **Why:** दुनिया वही रहती है, बस जागने वाले के लिए सपना टूट जाता है।
- **When:** मोक्ष प्राप्त होने पर।
- **How:** जैसे सोए हुए व्यक्ति के लिए सपना सच है, लेकिन जागने वाले के लिए गायब हो जाता है।

### सूत्र 2.23: संयोग का उद्देश्य

> **स्वस्वामिशक्त्योः स्वरूपोपलब्धिहेतुः संयोगः ॥२३॥**
> *(Sva svami shaktyoh svarupa upalabdhi hetuh samyogah)*

#### शब्दार्थ:
- **स्व (Sva):** अपना (प्रकृति/दृश्य)।
- **स्वामि (Svami):** मालिक (पुरुष/द्रष्टा)।
- **शक्त्योः (Shaktyoh):** शक्तियों का।
- **स्वरूप (Svarupa):** असली रूप।
- **उपलब्धि (Upalabdhi):** प्राप्ति/ज्ञान।
- **हेतुः (Hetuh):** कारण/उद्देश्य।
- **संयोगः (Samyogah):** संयोग।

#### भावार्थ:
प्रकृति (स्व) और पुरुष (स्वामी) का संयोग इसलिए हुआ है ताकि पुरुष अपनी शक्तियों को जान सके और अंत में अपनी असली पहचान (मोक्ष) प्राप्त कर सके। संसार एक स्कूल है।

#### WWWH Framework:
- **What:** जीवन का उद्देश्य (Purpose of Life).
- **Why:** हम यहाँ फंसने नहीं, सीखने आए हैं। भोग और मोक्ष - दोनों अनुभव जरूरी हैं।
- **When:** जब जीवन व्यर्थ लगने लगे।
- **How:** हर अनुभव से सीखें और आगे बढ़ें।

### सूत्र 2.24: संयोग का कारण

> **तस्य हेतुरविद्या ॥२४॥**
> *(Tasya hetur avidya)*

#### शब्दार्थ:
- **तस्य (Tasya):** उसका (संयोग का)।
- **हेतुः (Hetuh):** कारण।
- **अविद्या (Avidya):** अज्ञान।

#### भावार्थ:
इस संयोग (बंधन) का मूल कारण अविद्या (अज्ञान) है।

#### WWWH Framework:
- **What:** बंधन की जड़।
- **Why:** हम भूल गए हैं कि हम कौन हैं, इसलिए हम वह बन गए हैं जो हम नहीं हैं।
- **When:** जब तक ज्ञान नहीं होता।
- **How:** अविद्या को विद्या (ज्ञान) से ही मिटाया जा सकता है।

### सूत्र 2.25: हान (कैवल्य)

> **तदभावात्संयोगाभावो हानं तद्दृशेः कैवल्यम् ॥२५॥**
> *(Tad abhavat samyoga abhavo hanam tad drisheh kaivalyam)*

#### शब्दार्थ:
- **तद् (Tad):** उसका (अविद्या का)।
- **अभावात् (Abhavat):** अभाव/नाश होने से।
- **संयोगाभावः (Samyoga abhavah):** संयोग का नाश।
- **हानम् (Hanam):** हान/मुक्ति (Removal).
- **तद् (Tad):** वह।
- **दृशेः (Drisheh):** द्रष्टा का।
- **कैवल्यम् (Kaivalyam):** कैवल्य/मोक्ष (Liberation).

#### भावार्थ:
जब अविद्या का नाश हो जाता है, तो संयोग भी खत्म हो जाता है। इसे ही "हान" कहते हैं और यही द्रष्टा (आत्मा) का "कैवल्य" (मोक्ष) है।

#### WWWH Framework:
- **What:** परम मुक्ति (Ultimate Freedom).
- **Why:** दुख का हमेशा के लिए अंत।
- **When:** अविद्या के मिटने पर।
- **How:** अकेले (केवल) हो जाना - प्रकृति से अलग, अपने आप में पूर्ण।

### सूत्र 2.26: हानोपाय (उपाय)

> **विवेकख्यातिरविप्लवा हानोपायः ॥२६॥**
> *(Viveka khyatir aviplava hanopayah)*

#### भावार्थ:
दुख को दूर करने का उपाय "अविप्लवा विवेकख्याति" है। यानी बिना डगमगाए, लगातार यह ज्ञान बना रहना कि "मैं शरीर नहीं, आत्मा हूँ" (Discriminative Knowledge).

#### WWWH Framework:
- **What:** मास्टर की (Master Key).
- **Why:** केवल ज्ञान ही अज्ञान (अविद्या) को काट सकता है।
- **When:** 24x7.
- **How:** हर अनुभव में भेद करें - यह "दृश्य" है (बदलने वाला) और मैं "द्रष्टा" हूँ (न बदलने वाला)।

### सूत्र 2.27: प्रज्ञा की 7 सीढ़ियां

> **तस्य सप्तधा प्रान्तभूमिः प्रज्ञा ॥२७॥**
> *(Tasya saptadha pranta bhumih prajna)*

#### शब्दार्थ:
- **तस्य (Tasya):** उसकी (उस योगी की)।
- **सप्तधा (Saptadha):** सात प्रकार की।
- **प्रान्तभूमिः (Pranta bhumih):** अंतिम अवस्था वाली (Highest stage).
- **प्रज्ञा (Prajna):** बुद्धि/ज्ञान।

#### भावार्थ:
उस विवेकी योगी की बुद्धि (प्रज्ञा) सात स्तरों (Stages) में विकसित होती है, जो उसे पूर्ण मुक्ति तक ले जाती है।

#### WWWH Framework:
- **What:** ज्ञान के 7 लेवल।
- **Why:** ज्ञान एक बार में नहीं, धीरे-धीरे परिपक्व होता है।
- **When:** विवेकख्याति प्राप्त होने पर।
- **How:** जैसे-जैसे अशुद्धि घटती है, समझ के स्तर बढ़ते जाते हैं।

### सूत्र 2.28: योगांग अनुष्ठान

> **योगांगानुष्ठानादशुद्धिक्षये ज्ञानदीप्तिराविवेकख्यातेः ॥२८॥**
> *(Yoga anga anushthanad ashuddhi kshaye jnana diptir a viveka khyateh)*

#### शब्दार्थ:
- **योगांग (Yoga anga):** योग के अंग।
- **अनुष्ठानात् (Anushthanat):** अनुष्ठान/अभ्यास करने से।
- **अशुद्धिक्षये (Ashuddhi kshaye):** अशुद्धियों का नाश होने पर।
- **ज्ञानदीप्तिः (Jnana diptih):** ज्ञान का प्रकाश।
- **आ (A):** तक।
- **विवेकख्यातेः (Viveka khyateh):** विवेकख्याति (Discrimination).

#### भावार्थ:
योग के अंगों (Limbs) का अनुष्ठान (पालन) करने से अशुद्धियां नष्ट होती हैं और ज्ञान का प्रकाश (Wisdom) बढ़ता जाता है, जब तक कि विवेकख्याति (पूर्ण ज्ञान) न मिल जाए।

#### WWWH Framework:
- **What:** सफाई और रोशनी।
- **Why:** जैसे शीशे से धूल हटाने पर चेहरा दिखता है, वैसे ही योग से चित्त साफ होता है।
- **When:** जब तक मोक्ष न मिले।
- **How:** अष्टांग योग का पालन करके।

### सूत्र 2.29: आठ अंग (Ashtanga Yoga)

> **यमनियमासनप्राणायामप्रत्याहारधारणाध्यानसमाधयोऽष्टावंगानि ॥२९॥**
> *(Yama niyama asana pranayama pratyahara dharana dhyana samadhayo ashtau angani)*

#### भावार्थ:
योग के आठ अंग हैं:
1. **यम (Yama):** सामाजिक अनुशासन।
2. **नियम (Niyama):** व्यक्तिगत अनुशासन।
3. **आसन (Asana):** शारीरिक मुद्रा।
4. **प्राणायाम (Pranayama):** श्वास नियंत्रण।
5. **प्रत्याहार (Pratyahara):** इंद्रियों को समेटना।
6. **धारणा (Dharana):** एकाग्रता।
7. **ध्यान (Dhyana):** मेडिटेशन।
8. **समाधि (Samadhi):** पूर्ण तल्लीनता।

#### WWWH Framework:
- **What:** योग का पूरा नक्शा (Roadmap).
- **Why:** स्टेप-बाय-स्टेप आगे बढ़ने के लिए।
- **When:** जीवन भर।
- **How:** पहले यम-नियम से नींव मजबूत करें, फिर आसन-प्राणायाम से शरीर साधें, फिर ध्यान की ओर बढ़ें।

### सूत्र 2.30: यम (Social Code)

> **अहिंसासत्यास्तेयब्रह्मचर्यापरिग्रहा यमाः ॥३०॥**
> *(Ahimsa satya asteya brahmacharya aparigraha yamah)*

#### शब्दार्थ:
- **अहिंसा (Ahimsa):** हिंसा न करना।
- **सत्य (Satya):** सच बोलना।
- **अस्तेय (Asteya):** चोरी न करना।
- **ब्रह्मचर्य (Brahmacharya):** संयम।
- **अपरिग्रह (Aparigraha):** संग्रह न करना।
- **यमाः (Yamah):** यम हैं।

#### भावार्थ:
पांच यम हैं:
1. **अहिंसा:** किसी को मन, वचन, कर्म से दुख न देना।
2. **सत्य:** सच बोलना और जीना।
3. **अस्तेय:** चोरी न करना (जो अपना नहीं, उसे न लेना)।
4. **ब्रह्मचर्य:** ऊर्जा का संयम (Sexual/Sensory restraint).
5. **अपरिग्रह:** जरूरत से ज्यादा जमा न करना (Non-hoarding).

#### WWWH Framework:
- **What:** सामाजिक नियम (Don'ts).
- **Why:** समाज में शांति और खुद के मन की शांति के लिए।
- **When:** दूसरों के साथ व्यवहार करते समय।
- **How:** इनका पालन सख्ती से करें।

### सूत्र 2.31: महाव्रत

> **जातिदेशकालसमयानवच्छिन्नाः सार्वभौमा महाव्रतम् ॥३१॥**
> *(Jati desha kala samaya anavacchinnah sarvabhauma mahavratam)*

#### शब्दार्थ:
- **जाति (Jati):** जन्म/वर्ग।
- **देश (Desha):** स्थान।
- **काल (Kala):** समय।
- **समय (Samaya):** परिस्थिति/अवसर।
- **अनवच्छिन्नाः (Anavacchinnah):** सीमित न होने वाले।
- **सार्वभौमाः (Sarvabhauma):** सभी भूमिकाओं में/Universal.
- **महाव्रतम् (Mahavratam):** महान व्रत।

#### भावार्थ:
जब ये यम किसी जाति, देश, काल या परिस्थिति की सीमा के बिना हर हाल में पालन किए जाते हैं, तो ये "महाव्रत" बन जाते हैं। (जैसे - "मैं अहिंसा का पालन करूँगा, चाहे मेरी जान पर ही क्यों न बन आए")।

#### WWWH Framework:
- **What:** बिना शर्त पालन (Unconditional Practice).
- **Why:** अगर हम बहाने बनाएंगे (जैसे "युद्ध में हिंसा ठीक है"), तो व्रत कमजोर हो जाएगा।
- **When:** हर हाल में।
- **How:** कोई भी परिस्थिति हो, नियमों से समझौता न करें।

---

### सूत्र 2.32: नियम (Personal Code)

> **शौचसंतोषतपःस्वाध्यायेश्वरप्रणिधानानि नियमाः ॥३२॥**
> *(Shaucha santosha tapah svadhyaya ishvarapranidhanani niyamah)*

#### शब्दार्थ:
- **शौच (Shaucha):** पवित्रता।
- **संतोष (Santosha):** संतोष।
- **तपः (Tapah):** तप।
- **स्वाध्याय (Svadhyaya):** स्वाध्याय।
- **ईश्वरप्रणिधानानि (Ishvarapranidhanani):** ईश्वर प्रणिधान।
- **नियमाः (Niyamah):** नियम हैं।

#### भावार्थ:
पांच नियम हैं:
1. **शौच:** सफाई (बाहरी और भीतरी)।
2. **संतोष:** जो है उसमें खुश रहना (Contentment).
3. **तप:** अनुशासन/कष्ट सहना।
4. **स्वाध्याय:** आत्म-अध्ययन।
5. **ईश्वर प्रणिधान:** समर्पण।

#### WWWH Framework:
- **What:** व्यक्तिगत नियम (Do's).
- **Why:** खुद को अनुशासित और शुद्ध करने के लिए।
- **When:** अपनी दिनचर्या में।
- **How:** रोज नहाएं (शौच), खुश रहें (संतोष), मेहनत करें (तप), पढ़ें (स्वाध्याय), और प्रार्थना करें (ईश्वर प्रणिधान)।

### सूत्र 2.33: वितर्क बाधने (Negative Thoughts)

> **वितर्कबाधने प्रतिपक्षभावनम् ॥३३॥**
> *(Vitarka badhane pratipaksha bhavanam)*

#### भावार्थ:
जब मन में योग विरोधी विचार (वितर्क - जैसे हिंसा या झूठ) आएं, तो उनके विपरीत (Positive) विचारों का चिंतन करना चाहिए। इसे "प्रतिपक्ष भावन" कहते हैं।

#### WWWH Framework:
- **What:** नेगेटिविटी का एंटीडोट।
- **Why:** नेगेटिव विचार को लड़ने से नहीं, रिप्लेस करने से हराया जाता है।
- **When:** जब गुस्सा या लालच आए।
- **How:** अगर किसी पर गुस्सा आए, तो तुरंत उसके किसी अच्छे गुण के बारे में सोचें।

### सूत्र 2.35: अहिंसा का फल

> **अहिंसाप्रतिष्ठायां तत्सन्निधौ वैरत्यागः ॥३५॥**
> *(Ahimsa pratishthayam tat sannidhau vaira tyagah)*

#### शब्दार्थ:
- **अहिंसाप्रतिष्ठायां (Ahimsa pratishthayam):** अहिंसा में स्थित होने पर।
- **तत्सन्निधौ (Tat sannidhau):** उसके पास/उपस्थिति में।
- **वैरत्यागः (Vaira tyagah):** बैर (दुश्मनी) का त्याग।

#### भावार्थ:
जब योगी अहिंसा में पूरी तरह स्थित हो जाता है, तो उसके पास आने वाले प्राणी (शेर-बकरी भी) अपना स्वाभाविक बैर (दुश्मनी) छोड़ देते हैं।

#### WWWH Framework:
- **What:** प्रेम की शक्ति।
- **Why:** वाइब्रेशन काम करती है। अगर आपके अंदर हिंसा नहीं है, तो सामने वाला भी शांत हो जाएगा।
- **When:** अहिंसा सिद्ध होने पर।
- **How:** अपने अंदर से नफरत का हर कतरा निकाल दें।

---

### सूत्र 2.36: सत्य का फल

> **सत्यप्रतिष्ठायां क्रियाफलाश्रयत्वम् ॥३६॥**
> *(Satya pratishthayam kriya phala ashrayatvam)*

#### शब्दार्थ:
- **सत्यप्रतिष्ठायां (Satya pratishthayam):** सत्य में स्थित होने पर।
- **क्रियाफलाश्रयत्वम् (Kriya phala ashrayatvam):** क्रिया और फल का आश्रय (आधार) बन जाना।

#### भावार्थ:
सत्य सिद्ध होने पर योगी की वाणी में वह शक्ति आ जाती है कि वह जो कह दे, वह सच हो जाता है (वाक-सिद्धि)।

#### WWWH Framework:
- **What:** जुबान की ताकत।
- **Why:** जो कभी झूठ नहीं बोलता, प्रकृति उसके शब्दों का मान रखती है।
- **When:** सत्य सिद्ध होने पर।
- **How:** मजाक में भी झूठ न बोलें।

---

### सूत्र 2.37: अस्तेय का फल

> **अस्तेयप्रतिष्ठायां सर्वरत्नोपस्थानम् ॥३७॥**
> *(Asteya pratishthayam sarva ratna upasthanam)*

#### शब्दार्थ:
- **अस्तेयप्रतिष्ठायां (Asteya pratishthayam):** अस्तेय (चोरी न करना) में स्थित होने पर।
- **सर्वरत्नोपस्थानम् (Sarva ratna upasthanam):** सभी रत्नों का उपस्थित हो जाना।

#### भावार्थ:
चोरी का भाव पूरी तरह मिट जाने पर दुनिया के सारे रत्न/धन खुद-ब-खुद योगी के पास आ जाते हैं।

#### WWWH Framework:
- **What:** असली अमीरी।
- **Why:** जब आप कुछ नहीं चाहते, तो सब कुछ आपके पास आता है।
- **When:** लालच खत्म होने पर।
- **How:** दूसरों की चीजों पर नजर न डालें।

---

### सूत्र 2.38: ब्रह्मचर्य का फल

> **ब्रह्मचर्यप्रतिष्ठायां वीर्यलाभः ॥३८॥**
> *(Brahmacharya pratishthayam virya labhah)*

#### शब्दार्थ:
- **ब्रह्मचर्यप्रतिष्ठायां (Brahmacharya pratishthayam):** ब्रह्मचर्य में स्थित होने पर।
- **वीर्यलाभः (Virya labhah):** वीर्य (बल) का लाभ।

#### भावार्थ:
ब्रह्मचर्य सिद्ध होने पर अपार शारीरिक और मानसिक बल (वीर्य) की प्राप्ति होती है।

#### WWWH Framework:
- **What:** ऊर्जा संरक्षण।
- **Why:** ऊर्जा ही जीवन है। उसे बर्बाद न करें।
- **When:** संयम पालन से।
- **How:** अपनी ऊर्जा को नीचे (भोग) की बजाय ऊपर (योग) की ओर ले जाएं।

---

### सूत्र 2.39: अपरिग्रह का फल

> **अपरिग्रहस्थैर्ये जन्मकथंतासंबोधः ॥३९॥**
> *(Aparigraha sthairye janma kathanta sambodhah)*

#### शब्दार्थ:
- **अपरिग्रहस्थैर्ये (Aparigraha sthairye):** अपरिग्रह में स्थिरता आने पर।
- **जन्मकथंतासंबोधः (Janma kathanta sambodhah):** जन्मों के 'कैसे और क्यों' का ज्ञान।

#### भावार्थ:
अपरिग्रह (संग्रह न करना) सिद्ध होने पर योगी को अपने पूर्व जन्मों का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** टाइम ट्रेवल।
- **Why:** जब हम चीजों (Matter) से नहीं चिपके होते, तो चेतना (Consciousness) मुक्त होकर समय के पार देख सकती है।
- **When:** मोह छूटने पर।
- **How:** चीजों को जमा करना बंद करें, यादें खुद खुलने लगेंगी।

---

### सूत्र 2.40: शौच का फल

> **शौचात् स्वांगजुगुप्सा परैरसंसर्गः ॥४०॥**
> *(Shauchat svanga jugupsa parair asamsargah)*

#### शब्दार्थ:
- **शौचात् (Shauchat):** शौच (सफाई) से।
- **स्वांगजुगुप्सा (Svanga jugupsa):** अपने अंगों के प्रति जुगुप्सा (घृणा/वैराग्य)।
- **परैः (Paraih):** दूसरों के साथ।
- **असंसर्गः (Asamsargah):** संपर्क न रखना।

#### भावार्थ:
शौच (सफाई) सिद्ध होने पर अपने शरीर के प्रति मोह खत्म हो जाता है (जुगुप्सा) और दूसरों के शरीर से संपर्क की इच्छा नहीं रहती।

#### WWWH Framework:
- **What:** देह-अभिमान का नाश।
- **Why:** जब हम शरीर की गंदगी (मल-मूत्र) को गहराई से समझते हैं, तो उसे "मैं" मानना छोड़ देते हैं।
- **When:** शरीर की वास्तविकता जानने पर।
- **How:** शरीर को मंदिर की तरह साफ रखें, लेकिन उसे भगवान न समझें।

---

### सूत्र 2.42: संतोष का फल

> **संतोषादनुत्तमसुखलाभः ॥४२॥**
> *(Santoshat anuttama sukha labhah)*

#### शब्दार्थ:
- **संतोषात् (Santoshat):** संतोष से।
- **अनुत्तम (Anuttama):** सर्वोत्तम/जिससे ऊपर कोई न हो।
- **सुखलाभः (Sukha labhah):** सुख का लाभ।

#### भावार्थ:
संतोष से सर्वोत्तम सुख मिलता है। "गोधन, गजधन, बाजिधन... जब आवे संतोष धन, सब धन धूरि समान।"

#### WWWH Framework:
- **What:** हैप्पीनेस हैक।
- **Why:** इच्छाएं कभी खत्म नहीं होतीं, संतोष ही एकमात्र उपाय है।
- **When:** अभी, इसी वक्त।
- **How:** जो है, उसके लिए कृतज्ञ (Grateful) रहें।

---

### सूत्र 2.46: आसन की परिभाषा

> **स्थिरसुखमासनम् ॥४६॥**
> *(Sthira sukham asanam)*

#### भावार्थ:
जिस मुद्रा में शरीर **स्थिर** (Stable) हो और **सुखपूर्वक** (Comfortable) लंबे समय तक रह सके, वही आसन है।

#### WWWH Framework:
- **What:** सही बैठने का तरीका।
- **Why:** ध्यान के लिए शरीर का हिलना-डुलना बंद होना जरूरी है।
- **When:** ध्यान या प्राणायाम करते समय।
- **How:** जबरदस्ती न करें। शरीर को रिलैक्स छोड़ें और रीढ़ सीधी रखें।

---

### सूत्र 2.47: आसन सिद्धि

> **प्रयत्नशैथिल्यानन्तसमापत्तिभ्याम् ॥४७॥**
> *(Prayatna shaithilya ananta samapattibhyam)*

#### शब्दार्थ:
- **प्रयत्न (Prayatna):** प्रयत्न/कोशिश।
- **शैथिल्य (Shaithilya):** ढीला छोड़ना/शिथिलता।
- **अनन्त (Ananta):** अनंत (नाग/ईश्वर)।
- **समापत्तिभ्याम् (Samapattibhyam):** समापत्ति/ध्यान लगाने से।

#### भावार्थ:
प्रयत्न की शिथिलता (Effortlessness) और अनंत (ईश्वर/शून्य) में मन लगाने से आसन सिद्ध होता है।

#### WWWH Framework:
- **What:** आसन का सीक्रेट।
- **Why:** अगर शरीर में तनाव (Effort) है, तो मन शांत नहीं होगा।
- **When:** आसन करते समय।
- **How:** आसन में जाकर रिलैक्स हो जाएं, संघर्ष न करें।

---

### सूत्र 2.49: प्राणायाम

> **तस्मिन् सति श्वासप्रश्वासयोर्गतिविच्छेदः प्राणायामः ॥४९॥**
> *(Tasmin sati shvasa prashvasayor gati vicchedah pranayamah)*

#### शब्दार्थ:
- **तस्मिन् सति (Tasmin sati):** उसके (आसन के) सिद्ध होने पर।
- **श्वासप्रश्वासयोः (Shvasa prashvasayoh):** श्वास और प्रश्वास की।
- **गतिविच्छेदः (Gati vicchedah):** गति का रुक जाना/विच्छेद।
- **प्राणायामः (Pranayamah):** प्राणायाम है।

#### भावार्थ:
आसन सिद्ध होने पर, श्वास (अंदर लेना) और प्रश्वास (बाहर छोड़ना) की गति को रोक देना या नियंत्रित करना प्राणायाम है।

#### WWWH Framework:
- **What:** लाइफ फोर्स कंट्रोल।
- **Why:** मन को काबू करने के लिए प्राण (सांस) को काबू करना सबसे आसान तरीका है।
- **When:** आसन के बाद।
- **How:** अनुलोम-विलोम, कपालभाति आदि का अभ्यास करें।

---

### सूत्र 2.52: प्राणायाम का फल

> **ततः क्षीयते प्रकाशावरणम् ॥५२॥**
> *(Tatah kshiyate prakasha avaranam)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (प्राणायाम से)।
- **क्षीयते (Kshiyate):** नष्ट होता है/क्षीण होता है।
- **प्रकाशावरणम् (Prakasha avaranam):** प्रकाश (ज्ञान) का आवरण (पर्दा)।

#### भावार्थ:
प्राणायाम से ज्ञान के प्रकाश पर पड़ा हुआ पर्दा (अविद्या/कर्म) क्षीण (नष्ट) हो जाता है।

#### WWWH Framework:
- **What:** ज्ञान का उदय।
- **Why:** अशुद्धियां जल जाती हैं और बुद्धि निर्मल हो जाती है।
- **When:** नियमित प्राणायाम से।
- **How:** जैसे हवा बादलों को हटा देती है, वैसे ही प्राणायाम अज्ञान को हटा देता है।

---

### सूत्र 2.53: मन की योग्यता

> **धारणासु च योग्यता मनसः ॥५३॥**
> *(Dharanasu cha yogyata manasah)*

#### शब्दार्थ:
- **धारणासु (Dharanasu):** धारणा (एकाग्रता) के लिए।
- **च (Cha):** और।
- **योग्यता (Yogyata):** योग्यता/क्षमता।
- **मनसः (Manasah):** मन की।

#### भावार्थ:
और मन धारणा (Concentration) के योग्य बन जाता है।

#### WWWH Framework:
- **What:** फोकस की तैयारी।
- **Why:** चंचल मन एकाग्र नहीं हो सकता। प्राणायाम उसे थाम देता है।
- **When:** ध्यान से ठीक पहले।
- **How:** प्राणायाम के बाद मन शांत हो जाता है, तब उसे एक बिंदु पर टिकाना आसान होता है।

---

### सूत्र 2.54: प्रत्याहार (Withdrawal)

> **स्वविषयासंप्रयोगे चित्तस्य स्वरूपानुकार इवेन्द्रियाणां प्रत्याहारः ॥५४॥**
> *(Sva vishaya asamprayoge chittasya svarupa anukara iva indriyanam pratyaharah)*

#### शब्दार्थ:
- **स्वविषय (Sva vishaya):** अपने विषयों (रूप, रस आदि)।
- **असंप्रयोगे (Asamprayoge):** संपर्क न होने पर/त्यागने पर।
- **चित्तस्य (Chittasya):** चित्त के।
- **स्वरूपानुकार (Svarupa anukara):** स्वरूप की नकल करने जैसा।
- **इव (Iva):** जैसे।
- **इन्द्रियाणाम् (Indriyanam):** इंद्रियों का।
- **प्रत्याहारः (Pratyaharah):** प्रत्याहार।

#### भावार्थ:
जब इंद्रियां अपने विषयों (आंख-दृश्य, कान-शब्द) से हटकर, चित्त के स्वरूप में लीन हो जाती हैं (जैसे कछुआ अपने अंग समेट लेता है), उसे प्रत्याहार कहते हैं।

#### WWWH Framework:
- **What:** इंद्रियों की वापसी (Withdrawal).
- **Why:** ऊर्जा बाहर बह रही है, उसे अंदर मोड़ना है।
- **When:** बाहरी दुनिया से कटकर भीतर जाने के लिए।
- **How:** आंखें बंद करें और बाहर की आवाजों को सुनना बंद करके भीतर की आवाज सुनें।

---

### सूत्र 2.55: इंद्रिय जय

> **ततः परमा वश्यतेन्द्रियाणाम् ॥५५॥**
> *(Tatah parama vashyata indriyanam)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (प्रत्याहार से)।
- **परमा (Parama):** परम/सर्वोच्च।
- **वश्यता (Vashyata):** वश में होना/नियंत्रण।
- **इन्द्रियाणाम् (Indriyanam):** इंद्रियों का।

#### भावार्थ:
प्रत्याहार से इंद्रियों पर परम वश (Supreme Mastery) प्राप्त हो जाता है। अब इंद्रियां मन को नहीं खींचतीं, बल्कि मन जहां चाहे वहां लगती हैं।

#### WWWH Framework:
- **What:** सेल्फ कंट्रोल।
- **Why:** इंद्रियां अच्छी नौकर हैं लेकिन बुरी मालिक।
- **When:** योग की उच्च अवस्था में।
- **How:** अब आप जो चाहेंगे वही देखेंगे, वही सुनेंगे। डिस्ट्रेक्शन खत्म।

---
*साधन पाद (अध्याय 2) समाप्त।*

## विभूति पाद (Vibhuti Pada) - अध्याय 3

### सूत्र 3.1: धारणा (Concentration)

> **देशबन्धश्चित्तस्य धारणा ॥१॥**
> *(Desha bandhash chittasya dharana)*

#### शब्दार्थ:
- **देश (Desha):** स्थान/जगह (Place/Spot).
- **बन्धः (Bandhah):** बांधना (Binding).
- **चित्तस्य (Chittasya):** चित्त का।
- **धारणा (Dharana):** धारणा है।

#### भावार्थ:
चित्त (मन) को किसी एक स्थान (जैसे नासिका का अग्र भाग, हृदय, या कोई मूर्ति) पर बांध देना (टिका देना) धारणा है।

#### WWWH Framework:
- **What:** फोकस (Focus).
- **Why:** बिखरी हुई ऊर्जा को एक लेजर बीम की तरह इकट्ठा करने के लिए।
- **When:** प्रत्याहार के बाद।
- **How:** मन को बार-बार एक ही बिंदु पर वापस लाएं।

---

### सूत्र 3.2: ध्यान (Meditation)

> **तत्र प्रत्ययैकतानता ध्यानम् ॥२॥**
> *(Tatra pratyaya ekatanata dhyanam)*

#### शब्दार्थ:
- **तत्र (Tatra):** वहां (उस धारणा में)।
- **प्रत्यय (Pratyaya):** ज्ञान/विचार (Cognition).
- **एकतानता (Ekatanata):** एक तार होना/लगातार प्रवाह (Unbroken flow).
- **ध्यानम् (Dhyanam):** ध्यान है।

#### भावार्थ:
जब उस (धारणा वाले) स्थान पर ज्ञान का प्रवाह तेल की धार की तरह लगातार बना रहे, बिना किसी रुकावट के, तो उसे ध्यान कहते हैं।

#### WWWH Framework:
- **What:** फ्लो स्टेट (Flow State).
- **Why:** धारणा में कोशिश होती है, ध्यान में बहाव होता है।
- **When:** जब धारणा पक्की हो जाए।
- **How:** जब "मैं ध्यान कर रहा हूँ" का विचार भी न आए, बस ध्यान बना रहे।

---

### सूत्र 3.3: समाधि (Absorption)

> **तदेवार्थमात्रनिर्भासं स्वरूपशून्यमिव समाधिः ॥३॥**
> *(Tad eva artha matra nirbhasam svarupa shunyam iva samadhih)*

#### शब्दार्थ:
- **तद् एव (Tad eva):** वही (ध्यान) ही।
- **अर्थमात्र (Artha matra):** केवल विषय/लक्ष्य (Object only).
- **निर्भासम् (Nirbhasam):** चमकना/दिखना (Shining).
- **स्वरूपशून्यम् (Svarupa shunyam):** अपने रूप से शून्य।
- **इव (Iva):** जैसे।
- **समाधिः (Samadhih):** समाधि है।

#### भावार्थ:
जब ध्यान करते-करते "मैं" (ध्याता) और "ध्यान" (क्रिया) भूल जाएं, और केवल "लक्ष्य" (धेय) ही शेष रह जाए, जैसे कि मन का अपना स्वरूप शून्य हो गया हो, उसे समाधि कहते हैं।

#### WWWH Framework:
- **What:** टोटल मर्जर (Total Merger).
- **Why:** द्वैत (Dualism) को खत्म करने के लिए।
- **When:** ध्यान की पराकाष्ठा पर।
- **How:** बूंद का सागर में मिल जाना।

---

### सूत्र 3.4: संयम (Samyama)

> **त्रयमेकत्र संयमः ॥४॥**
> *(Trayam ekatra samyamah)*

#### शब्दार्थ:
- **त्रयम् (Trayam):** तीनों (धारणा, ध्यान, समाधि)।
- **एकत्र (Ekatra):** एक साथ/एक ही विषय पर।
- **संयमः (Samyamah):** संयम है।

#### भावार्थ:
जब धारणा, ध्यान और समाधि - ये तीनों एक ही विषय पर एक साथ घटित होते हैं, तो उस अवस्था को "संयम" कहते हैं। यह योग का सबसे शक्तिशाली हथियार है।

#### WWWH Framework:
- **What:** सुपर पावर टूल।
- **Why:** किसी भी चीज का रहस्य जानने के लिए।
- **When:** जब किसी वस्तु/तत्व को पूरी तरह जानना हो।
- **How:** पहले फोकस (धारणा), फिर फ्लो (ध्यान), फिर मर्जर (समाधि) - तीनों एक साथ।

---

### सूत्र 3.5: प्रज्ञा का आलोक

> **तज्जयात्प्रज्ञालोकः ॥५॥**
> *(Taj jayat prajna alokah)*

#### शब्दार्थ:
- **तज्जयात् (Taj jayat):** उस (संयम) को जीतने से।
- **प्रज्ञालोकः (Prajna alokah):** प्रज्ञा (बुद्धि) का आलोक (प्रकाश)।

#### भावार्थ:
उस संयम को जीत लेने (सिद्ध कर लेने) से प्रज्ञा (बुद्धि) का आलोक (प्रकाश) हो जाता है। यानी जिस चीज पर संयम किया जाए, उसका पूरा ज्ञान मिल जाता है।

#### WWWH Framework:
- **What:** ज्ञान का सूर्योदय।
- **Why:** संयम अज्ञान के अंधेरे को मिटा देता है।
- **When:** संयम सिद्ध होने पर।
- **How:** किसी भी विषय पर संयम करें, उसका रहस्य खुल जाएगा।

---

### सूत्र 3.6: विनियोग (Application)

> **तस्य भूमिषु विनियोगः ॥६॥**
> *(Tasya bhumishu viniyogah)*

#### शब्दार्थ:
- **तस्य (Tasya):** उसका (संयम का)।
- **भूमिषु (Bhumishu):** भूमिकाओं/स्तरों में (In stages).
- **विनियोगः (Viniyogah):** प्रयोग/उपयोग (Application).

#### भावार्थ:
उस संयम का उपयोग (विनियोग) अलग-अलग भूमिकाओं (Stages) में धीरे-धीरे करना चाहिए। (सीधे ऊंची छलांग न लगाएं)।

#### WWWH Framework:
- **What:** स्टेप-बाय-स्टेप प्रोग्रेस।
- **Why:** बिना तैयारी के उच्च स्तर पर जाना खतरनाक हो सकता है।
- **When:** साधना में आगे बढ़ते समय।
- **How:** पहले स्थूल चीजों पर संयम करें, फिर सूक्ष्म पर।

---

### सूत्र 3.7: अंतरंग साधन

> **त्रयमन्तरंगं पूर्वेभ्यः ॥७॥**
> *(Trayam antarangam purvebhyah)*

#### शब्दार्थ:
- **त्रयम् (Trayam):** तीनों (धारणा, ध्यान, समाधि)।
- **अन्तरंगम् (Antarangam):** अंदरूनी/अंतरंग (Internal).
- **पूर्वेभ्यः (Purvebhyah):** पहले वालों से (यम, नियम, आसन, प्राणायाम, प्रत्याहार)।

#### भावार्थ:
ये तीनों (धारणा, ध्यान, समाधि) पहले के पांच अंगों (यम, नियम, आसन, प्राणायाम, प्रत्याहार) की तुलना में "अंतरंग" (Internal) साधन हैं।

#### WWWH Framework:
- **What:** इनर सर्कल।
- **Why:** ये सीधे मन के साथ काम करते हैं, जबकि बाकी शरीर और सांस के साथ।
- **When:** योग की गहराई समझने के लिए।
- **How:** बाहरी अंगों को पार करके भीतरी अंगों में प्रवेश करें।

---

### सूत्र 3.8: बहिरंग भी

> **तदपि बहिरंगं निर्बीजस्य ॥८॥**
> *(Tad api bahirangam nirbijasya)*

#### शब्दार्थ:
- **तद् (Tad):** वह (तीनों - संयम)।
- **अपि (Api):** भी।
- **बहिरंगम् (Bahirangam):** बाहरी साधन (External).
- **निर्बीजस्य (Nirbijasya):** निर्बीज समाधि का।

#### भावार्थ:
लेकिन निर्बीज समाधि (कैवल्य) की तुलना में ये तीनों भी "बहिरंग" (External) ही हैं।

#### WWWH Framework:
- **What:** अभी और अंदर जाना है।
- **Why:** क्योंकि इनमें भी "आलंबन" (सहारा/बीज) होता है, निर्बीज में कोई सहारा नहीं होता।
- **When:** अंतिम मुक्ति के लिए।
- **How:** मन के सहारे को भी छोड़ दें।

---

### सूत्र 3.9: निरोध परिणाम

> **व्युत्थाननिरोधसंस्कारयोरभिभवप्रादुर्भावौ निरोधक्षणचित्तान्वयो निरोधपरिणामः ॥९॥**
> *(Vyutthana nirodha samskarayor abhibhava pradurbhavau nirodha kshana chitta anvayo nirodha parinamah)*

#### शब्दार्थ:
- **व्युत्थान (Vyutthana):** उठने वाले/चंचल संस्कार (Outgoing impressions).
- **निरोध (Nirodha):** रोकने वाले संस्कार (Restraining impressions).
- **संस्कारयोः (Samskarayoh):** संस्कारों का।
- **अभिभव (Abhibhava):** दबना (Disappearance).
- **प्रादुर्भावौ (Pradurbhavau):** प्रकट होना (Appearance).
- **निरोधक्षण (Nirodha kshana):** रुकने का क्षण (Moment of restraint).
- **चित्तान्वयः (Chitta anvayah):** चित्त का जुड़ना (Connection with mind).
- **निरोधपरिणामः (Nirodha parinamah):** निरोध परिणाम।

#### भावार्थ:
जब मन के भटकने वाले संस्कार (व्युत्थान) दब जाते हैं और रोकने वाले संस्कार (निरोध) उभर आते हैं, और चित्त उस "रुकने के क्षण" (Moment of silence) के साथ जुड़ जाता है, तो उसे "निरोध परिणाम" कहते हैं।

#### WWWH Framework:
- **What:** मन का साइलेंस मोड।
- **Why:** पुराने शोर को दबाने के लिए।
- **When:** समाधि के अभ्यास के दौरान।
- **How:** हर विचार के बीच के खाली गैप (Gap) पर ध्यान दें।

---

### सूत्र 3.10: प्रशांत वाहिता

> **तस्य प्रशान्तवाहिता संस्कारात् ॥१०॥**
> *(Tasya prashanta vahita samskarat)*

#### शब्दार्थ:
- **तस्य (Tasya):** उसका (चित्त का)।
- **प्रशान्तवाहिता (Prashanta vahita):** शांति से बहना (Peaceful flow).
- **संस्कारात् (Samskarat):** (निरोध के) संस्कार से।

#### भावार्थ:
निरोध संस्कारों के लगातार अभ्यास से चित्त "प्रशांत वाहिता" (Peaceful Flow) में बहने लगता है। जैसे शांत नदी।

#### WWWH Framework:
- **What:** शांति की आदत।
- **Why:** आदत ही स्वभाव बन जाती है।
- **When:** निरोध के अभ्यास के बाद।
- **How:** बार-बार शांति का अभ्यास करें, ताकि मन खुद ब खुद शांत रहने लगे।

---

### सूत्र 3.11: समाधि परिणाम

> **सर्वार्थतैकाग्रतयोः क्षयोदयौ चित्तस्य समाधिपरिणामः ॥११॥**
> *(Sarvarthata ekagratayoh kshaya udayau chittasya samadhi parinamah)*

#### शब्दार्थ:
- **सर्वार्थता (Sarvarthata):** सब कुछ देखना/बिखराव (Multi-pointedness).
- **एकाग्रतयोः (Ekagratayoh):** एकाग्रता (One-pointedness).
- **क्षयोदयौ (Kshaya udayau):** नाश और उदय (Destruction and rising).
- **चित्तस्य (Chittasya):** चित्त का।
- **समाधिपरिणामः (Samadhi parinamah):** समाधि परिणाम।

#### भावार्थ:
जब चित्त का "सब कुछ देखने का स्वभाव" (सर्वार्थता/Distraction) घटता है और "एक ही चीज देखने का स्वभाव" (एकाग्रता/Focus) बढ़ता है, तो इसे "समाधि परिणाम" कहते हैं।

#### WWWH Framework:
- **What:** लेजर फोकस।
- **Why:** बिखरी हुई रोशनी जला नहीं सकती, फोकस की हुई जला सकती है।
- **When:** ध्यान से समाधि की ओर जाते समय।
- **How:** मन के कैनवास से बाकी सब हटा दें, सिर्फ एक लक्ष्य रखें।

---

### सूत्र 3.12: एकाग्रता परिणाम

> **ततः पुनः शान्तोदितौ तुल्यप्रत्ययौ चित्तस्यैकाग्रतापरिणामः ॥१२॥**
> *(Tatah punah shanta uditau tulya pratyayau chittasya ekagrata parinamah)*

#### शब्दार्थ:
- **ततः (Tatah):** वहां/तब।
- **पुनः (Punah):** फिर।
- **शान्तोदितौ (Shanta uditau):** शांत (गया हुआ) और उदित (आया हुआ)।
- **तुल्यप्रत्ययौ (Tulya pratyayau):** एक जैसे विचार (Similar cognition).
- **चित्तस्य (Chittasya):** चित्त का।
- **एकाग्रतापरिणामः (Ekagrata parinamah):** एकाग्रता परिणाम।

#### भावार्थ:
जब चित्त में एक विचार शांत होता है (जाता है) और ठीक वैसा ही दूसरा विचार उठता है (आता है) - यानी दोनों विचार एक जैसे (तुल्य) होते हैं, तो इसे "एकाग्रता परिणाम" कहते हैं।

#### WWWH Framework:
- **What:** अटूट धारा।
- **Why:** ताकि ध्यान टूटे नहीं।
- **When:** गहरी एकाग्रता में।
- **How:** जैसे तेल की धार गिरती है, वैसे ही एक ही विचार (जैसे "ओम... ओम... ओम...") लगातार बहे।

---

### सूत्र 3.13: भूत और इंद्रिय परिणाम

> **एतेन भूतेन्द्रियेषु धर्मलक्षणअवस्थापरिणामा व्याख्याताः ॥१३॥**
> *(Etena bhuta indriyeshu dharma lakshana avastha parinama vyakhyatah)*

#### शब्दार्थ:
- **एतेन (Etena):** इससे (चित्त परिणाम से)।
- **भूतेन्द्रियेषु (Bhuta indriyeshu):** तत्वों और इंद्रियों में।
- **धर्म (Dharma):** धर्म (Form/Property).
- **लक्षण (Lakshana):** लक्षण (Time phase).
- **अवस्था (Avastha):** अवस्था (Condition/Age).
- **परिणामाः (Parinamah):** बदलाव/परिणाम।
- **व्याख्याताः (Vyakhyatah):** कहे गए हैं/समझाए गए हैं।

#### भावार्थ:
इसी (चित्त के परिणाम) की तरह, पंचभूतों (Elements) और इंद्रियों (Senses) में भी तीन प्रकार के बदलाव होते हैं:
1. **धर्म परिणाम:** रूप बदलना (जैसे मिट्टी का घड़ा बनना)।
2. **लक्षण परिणाम:** समय बदलना (भविष्य से वर्तमान, वर्तमान से भूत)।
3. **अवस्था परिणाम:** हालत बदलना (नया घड़ा पुराना हो जाना)।

#### WWWH Framework:
- **What:** बदलाव का नियम (Universal Law of Change).
- **Why:** प्रकृति में सब कुछ बदलता रहता है।
- **When:** संसार को समझते समय।
- **How:** देखें कि कैसे चीजें अपना रूप (धर्म), काल (लक्षण) और हालत (अवस्था) बदलती हैं।

---

### सूत्र 3.14: धर्मी (Substratum)

> **शान्तोदिताव्यपदेश्यधर्मानुपाती धर्मी ॥१४॥**
> *(Shanta udita avyapadeshya dharma anupati dharmi)*

#### शब्दार्थ:
- **शान्त (Shanta):** शांत/भूत (Past).
- **उदित (Udita):** उदित/वर्तमान (Present).
- **अव्यपदेश्य (Avyapadeshya):** अव्यक्त/भविष्य (Future/Unmanifest).
- **धर्म (Dharma):** धर्म/गुण।
- **अनुपाती (Anupati):** अनुगत रहने वाला/पीछे चलने वाला।
- **धर्मी (Dharmi):** धर्मी/मूल वस्तु (Substance).

#### भावार्थ:
जो शांत हो चुके (Past), जो अभी उदित हैं (Present), और जो अभी अव्यक्त हैं (Future) - इन तीनों प्रकार के धर्मों (गुणों) में जो एक समान रहता है, वह "धर्मी" (Substance/Base) है। (जैसे मिट्टी वही रहती है, चाहे वह पाउडर हो, पिंड हो या घड़ा)।

#### WWWH Framework:
- **What:** आधार (Base).
- **Why:** बदलाव के लिए किसी ऐसी चीज का होना जरूरी है जो न बदले (या जो आधार हो)।
- **When:** सत्य को खोजते समय।
- **How:** आभूषणों में सोना देखें, लहरों में पानी देखें।

### सूत्र 3.15: बदलाव का कारण

> **क्रमान्यत्वं परिणामान्यत्वे हेतुः ॥१५॥**
> *(Krama anyatvam parinama anyatve hetuh)*

#### शब्दार्थ:
- **क्रम (Krama):** क्रम (Sequence).
- **अन्यत्वम् (Anyatvam):** अंतर/भिन्नता।
- **परिणाम (Parinama):** परिणाम/बदलाव।
- **अन्यत्वे (Anyatve):** भिन्नता में।
- **हेतुः (Hetuh):** कारण।

#### भावार्थ:
परिणाम (Result) में अंतर का कारण "क्रम" (Sequence) में अंतर होना है। (जैसे दूध से दही बनने का क्रम अलग है, और दूध के फटने का क्रम अलग)।

#### WWWH Framework:
- **What:** प्रोसेस का महत्व।
- **Why:** हर बदलाव एक सीक्वेंस फॉलो करता है।
- **When:** किसी बदलाव को समझने के लिए।
- **How:** अगर रिजल्ट बदलना है, तो प्रोसेस (क्रम) बदलो।

---

### सूत्र 3.16: अतीत और भविष्य का ज्ञान

> **परिणामत्रयसंयमादतीतानागतज्ञानम् ॥१६॥**
> *(Parinama traya samyamad atita anagata jnanam)*

#### शब्दार्थ:
- **परिणामत्रय (Parinama traya):** तीन परिणाम (धर्म, लक्षण, अवस्था)।
- **संयमात् (Samyamat):** संयम करने से।
- **अतीत (Atita):** अतीत (Past).
- **अनागत (Anagata):** अनागत/भविष्य (Future).
- **ज्ञानम् (Jnanam):** ज्ञान।

#### भावार्थ:
तीनों प्रकार के परिणामों (धर्म, लक्षण, अवस्था) पर संयम करने से योगी को अतीत (Past) और भविष्य (Future) का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** टाइम ट्रेवल (Mental).
- **Why:** जब आप बदलाव के पैटर्न को समझ जाते हैं, तो आप बता सकते हैं कि पहले क्या था और आगे क्या होगा।
- **When:** संयम सिद्ध होने पर।
- **How:** किसी वस्तु के बदलाव की चेन (Chain of change) पर ध्यान लगाकर।

---

### सूत्र 3.17: सर्वभूत रुत ज्ञान (Language of all beings)

> **शब्दार्थप्रत्ययानामितरेतराध्यासात्संकरस्तत्प्रविभागसंयमात्सर्वभूतरुतज्ञानम् ॥१७॥**
> *(Shabda artha pratyayanam itaretara adhyasat sankaras tat pravibhaga samyamat sarva bhuta ruta jnanam)*

#### शब्दार्थ:
- **शब्द (Shabda):** शब्द (Word/Sound).
- **अर्थ (Artha):** अर्थ (Meaning).
- **प्रत्यय (Pratyaya):** ज्ञान (Idea).
- **इतरेतराध्यासात् (Itaretara adhyasat):** एक दूसरे पर अध्यास (Superimposition) होने से।
- **संकरः (Sankarah):** मिश्रण/गड़बड़ (Confusion).
- **तत् (Tat):** उनके।
- **प्रविभाग (Pravibhaga):** अलग-अलग करने (Distinction).
- **संयमात् (Samyamat):** संयम से।
- **सर्वभूत (Sarva bhuta):** सभी प्राणियों की।
- **रुत (Ruta):** बोली/आवाज (Sound).
- **ज्ञानम् (Jnanam):** ज्ञान।

#### भावार्थ:
शब्द (Sound), अर्थ (Meaning), और ज्ञान (Idea) - ये तीनों आमतौर पर मिले-जुले रहते हैं। इन तीनों के भेद (Difference) पर संयम करने से योगी को सभी प्राणियों (पशु-पक्षियों सहित) की भाषा समझ में आ जाती है।

#### WWWH Framework:
- **What:** यूनिवर्सल ट्रांसलेटर।
- **Why:** हर आवाज के पीछे एक भावना (Meaning) छिपी होती है।
- **When:** कम्यूनिकेशन के लिए।
- **How:** शब्द को नहीं, उसके पीछे की वाइब्रेशन (Intent) को सुनें।

---

### सूत्र 3.18: पूर्व जन्म का ज्ञान

> **संस्कारसाक्षात्करणात्पूर्वजातिज्ञानम् ॥१८॥**
> *(Samskara sakshatkaranat purva jati jnanam)*

#### शब्दार्थ:
- **संस्कार (Samskara):** संस्कार (Impressions).
- **साक्षात्करणात् (Sakshatkaranat):** साक्षात करने से/प्रत्यक्ष देखने से।
- **पूर्व (Purva):** पूर्व/पिछले।
- **जाति (Jati):** जन्म।
- **ज्ञानम् (Jnanam):** ज्ञान।

#### भावार्थ:
अपने संस्कारों (Subconscious impressions) को साक्षात देखने (संयम करने) से पूर्व जन्मों का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** पास्ट लाइफ रिग्रेशन।
- **Why:** हमारे संस्कार पुरानी फाइलों की तरह हैं। उन्हें खोलने पर पुराना डेटा मिल जाता है।
- **When:** आत्म-खोज के लिए।
- **How:** अपने गहरे डरों या आदतों की जड़ तक जाएं।

### सूत्र 3.19: दूसरे के चित्त का ज्ञान

> **प्रत्ययस्य परचित्तज्ञानम् ॥१९॥**
> *(Pratyayasya para chitta jnanam)*

#### शब्दार्थ:
- **प्रत्ययस्य (Pratyayasya):** प्रत्यय (विचार) का (संयम करने से)।
- **पर (Para):** दूसरे के।
- **चित्त (Chitta):** चित्त/मन का।
- **ज्ञानम् (Jnanam):** ज्ञान।

#### भावार्थ:
दूसरे के मन के संकेतों (Body language/Thought waves) पर संयम करने से उसके चित्त (मन) का ज्ञान हो जाता है (Mind Reading).

#### WWWH Framework:
- **What:** माइंड रीडिंग।
- **Why:** विचार तरंगें हैं, अगर आप ट्यून-इन कर सकें तो पकड़ सकते हैं।
- **When:** दूसरों को गहराई से समझने के लिए।
- **How:** दूसरे व्यक्ति के हाव-भाव और वाइब्स पर फोकस करें।

---

### सूत्र 3.20: क्या नहीं दिखता?

> **न च तत्सालम्बनं तस्याविषयीभूतत्वात् ॥२०॥**
> *(Na cha tat salambanam tasya avishayi bhutatvat)*

#### शब्दार्थ:
- **न (Na):** नहीं।
- **च (Cha):** और।
- **तत् (Tat):** वह (ज्ञान)।
- **सालम्बनम् (Salambanam):** आलंबन/विषय सहित (With object).
- **तस्य (Tasya):** उसका।
- **अविषयीभूतत्वात् (Avishayi bhutatvat):** विषय न होने के कारण।

#### भावार्थ:
लेकिन उस (दूसरे के) मन में *किस विषय* (Object) के बारे में सोचा जा रहा है, यह नहीं दिखता, क्योंकि वह संयम का विषय नहीं था। (सिर्फ यह पता चलता है कि वह खुश है या दुखी, लेकिन *क्यों* है, यह नहीं)।

#### WWWH Framework:
- **What:** प्राइवेसी पॉलिसी।
- **Why:** आप इमोशन (गुस्सा) देख सकते हैं, लेकिन कारण (क्यों गुस्सा है) नहीं, जब तक उस पर संयम न करें।
- **When:** माइंड रीडिंग करते समय।
- **How:** अपनी सीमाओं का सम्मान करें।

### सूत्र 3.21: अंतर्धान (Invisibility)

> **कायरूपसंयमात्तद्ग्राह्यशक्तिस्तम्भे चक्षुःप्रकाशासंप्रयोगेऽन्तर्धानम् ॥२१॥**
> *(Kaya rupa samyamat tad grahya shakti stambhe chakshuh prakasha asamprayoge antardhanam)*

#### शब्दार्थ:
- **कायरूप (Kaya rupa):** शरीर के रूप पर।
- **संयमात् (Samyamat):** संयम से।
- **तद्ग्राह्यशक्ति (Tad grahya shakti):** उसकी (रूप की) ग्रहण करने की शक्ति।
- **स्तम्भे (Stambhe):** रुक जाने पर/स्तम्भन होने पर।
- **चक्षुः (Chakshuh):** आंख।
- **प्रकाश (Prakasha):** प्रकाश।
- **असम्प्रयोगे (Asamprayoge):** संपर्क न होने पर।
- **अन्तर्धानम् (Antardhanam):** अंतर्धान/अदृश्य होना।

#### भावार्थ:
शरीर के रूप (Form) पर संयम करने से, जब उसकी "दिखने की शक्ति" (Visibility) को रोक दिया जाता है और देखने वाले की आंख के प्रकाश से उसका संपर्क टूट जाता है, तो योगी अदृश्य (Invisible) हो जाता है।

#### WWWH Framework:
- **What:** गायब होना।
- **Why:** यह प्रकाश का खेल है। अगर आप प्रकाश को रिफ्लेक्ट करना बंद कर दें, तो आप नहीं दिखेंगे।
- **When:** सुरक्षा के लिए (प्राचीन काल में)।
- **How:** अपनी आभा (Aura) को समेटकर।

### सूत्र 3.22: मृत्यु का ज्ञान

> **सोपक्रमं निरुपक्रमं च कर्म तत्संयमादपरान्तज्ञानमरिष्टेभ्यो वा ॥२२॥**
> *(Sopakramam nirupakramam cha karma tat samyamat aparanta jnanam arishtebhyo va)*

#### शब्दार्थ:
- **सोपक्रमम् (Sopakramam):** जल्दी फल देने वाला (Active).
- **निरुपक्रमम् (Nirupakramam):** देर से फल देने वाला (Dormant).
- **च (Cha):** और।
- **कर्म (Karma):** कर्म।
- **तत्संयमात् (Tat samyamat):** उस पर संयम करने से।
- **अपरान्त (Aparanta):** मृत्यु/अंत।
- **ज्ञानम् (Jnanam):** ज्ञान।
- **अरिष्टेभ्यः (Arishtebhyo):** अरिष्टों/अशुभ संकेतों से।
- **वा (Va):** या।

#### भावार्थ:
कर्म दो तरह के होते हैं: सोपक्रम (जो जल्दी फल देने वाले हैं) और निरुपक्रम (जो देर से फल देंगे)। इन पर संयम करने से, या अरिष्टों (Omens/संकेतों) को देखने से मृत्यु के समय का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** डेथ क्लॉक।
- **Why:** यह जानने के लिए कि कितना समय बचा है।
- **When:** अंतिम यात्रा की तैयारी के लिए।
- **How:** अपने कर्मों की गति (Momentum) का विश्लेषण करें।

### सूत्र 3.23: मैत्री आदि बल

> **मैत्र्यादिषु बलानि ॥२३॥**
> *(Maitryadishu balani)*

#### शब्दार्थ:
- **मैत्र्यादिषु (Maitryadishu):** मैत्री (मित्रता) आदि भावनाओं में।
- **बलानि (Balani):** बल/शक्तियां।

#### भावार्थ:
मैत्री (Friendliness), करुणा (Compassion) आदि भावनाओं पर संयम करने से उनमें अपार बल प्राप्त होता है। (जैसे मैत्री पर संयम करने से कोई भी आपका दुश्मन नहीं रह सकता)।

#### WWWH Framework:
- **What:** इमोशनल सुपरपावर।
- **Why:** भावनाएं ऊर्जा हैं। उन्हें फोकस करने से वे शक्तिशाली हो जाती हैं।
- **When:** रिश्तों को सुधारने के लिए।
- **How:** किसी के प्रति इतनी गहरी दोस्ती महसूस करें कि नफरत की गुंजाइश ही न रहे।

### सूत्र 3.24: हाथी जैसा बल

> **बलेषु हस्तिबलादीनि ॥२४॥**
> *(Baleshu hasti baladini)*

#### शब्दार्थ:
- **बलेषु (Baleshu):** बलों में (संयम करने से)।
- **हस्ति (Hasti):** हाथी।
- **बलादीनि (Baladini):** बल आदि।

#### भावार्थ:
बलों पर (जैसे हाथी के बल पर) संयम करने से हाथी जैसा (शारीरिक) बल प्राप्त होता है।

#### WWWH Framework:
- **What:** बाहुबली।
- **Why:** मन पदार्थ (Matter) को नियंत्रित करता है।
- **When:** शारीरिक शक्ति की आवश्यकता हो।
- **How:** हाथी या हनुमान जी के बल का ध्यान करें।

### सूत्र 3.25: सूक्ष्म वस्तुओं का ज्ञान

> **प्रवृत्यालोकन्यासात्सूक्ष्मव्यवहितविप्रकृष्टज्ञानम् ॥२५॥**
> *(Pravritti aloka nyasat sukshma vyavahita viprakrishta jnanam)*

#### शब्दार्थ:
- **प्रवृत्ति (Pravritti):** प्रवृत्ति (ज्योतिष्मती/Super-sensory activity).
- **आलोक (Aloka):** प्रकाश।
- **न्यासात् (Nyasat):** डालने/फेंकने से (Projecting).
- **सूक्ष्म (Sukshma):** सूक्ष्म (Subtle).
- **व्यवहित (Vyavahita):** छिपा हुआ (Hidden).
- **विप्रकृष्ट (Viprakrishta):** दूर स्थित (Distant).
- **ज्ञानम् (Jnanam):** ज्ञान।

#### भावार्थ:
ज्योतिष्मती प्रवृत्ति (Inner Light) के प्रकाश को डालने से सूक्ष्म (Subtle), छिपी हुई (Hidden), और दूर स्थित (Distant) वस्तुओं का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** एक्स-रे विजन।
- **Why:** प्रकाश अंधेरे (अज्ञान) को मिटा देता है।
- **When:** छिपी हुई चीजों को खोजने के लिए।
- **How:** अपनी अंतर्दृष्टि (Intuition) का प्रकाश उस वस्तु पर डालें।

### सूत्र 3.26: सूर्य संयम (Cosmic Knowledge)

> **भुवनज्ञानं सूर्ये संयमात् ॥२६॥**
> *(Bhuvana jnanam surye samyamat)*

#### शब्दार्थ:
- **भुवन (Bhuvana):** भुवन/लोक (Worlds/Universe).
- **ज्ञानम् (Jnanam):** ज्ञान।
- **सूर्ये (Surye):** सूर्य पर।
- **संयमात् (Samyamat):** संयम करने से।

#### भावार्थ:
सूर्य पर संयम करने से समस्त लोकों (Solar System/Universe) का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** कॉस्मिक मैप।
- **Why:** सूर्य हमारे सौर मंडल का केंद्र और ऊर्जा स्रोत है।
- **When:** ब्रह्मांड को समझने के लिए।
- **How:** सूर्य को जीवन के स्रोत के रूप में ध्यान करें।

### सूत्र 3.27: चंद्र संयम (Star Knowledge)

> **चन्द्रे ताराव्यूहज्ञानम् ॥२७॥**
> *(Chandre tara vyuha jnanam)*

#### शब्दार्थ:

- **Why:** यह ज्ञान सीधे आत्मा से आता है, दिमाग से नहीं।

### सूत्र 3.35: पुरुष ज्ञान

> **सत्त्वपुरुषयोरत्यन्तासंकीर्णयोः प्रत्ययाविशेषो भोगः परार्थत्वात्स्वार्थसंयमात्पुरुषज्ञानम् ॥३५॥**
> *(Sattva purushayoh atyanta asankirnayoh pratyaya avishesho bhogah pararthatvat svartha samyamat purusha jnanam)*

#### शब्दार्थ:
- **सत्त्व (Sattva):** बुद्धि/सत्व गुण।
- **पुरुषयोः (Purushayoh):** पुरुष (आत्मा) का।
- **अत्यन्त (Atyanta):** अत्यंत।
- **असंकीर्णयोः (Asankirnayoh):** अलग/भिन्न (Distinct).
- **प्रत्यय (Pratyaya):** ज्ञान/प्रतीति।
- **अविशेषः (Avishesho):** भेद न करना (Non-distinction).
- **भोगः (Bhogah):** भोग (Experience).
- **परार्थत्वात् (Pararthatvat):** दूसरे के लिए होने से (For another).
- **स्वार्थ (Svartha):** अपने लिए (For Self).
- **संयमात् (Samyamat):** संयम करने से।
- **पुरुषज्ञानम् (Purusha jnanam):** पुरुष का ज्ञान।

#### भावार्थ:
बुद्धि (सत्व) और पुरुष (आत्मा) दोनों बिल्कुल अलग हैं। लेकिन अज्ञान के कारण हम उन्हें एक मान लेते हैं, यही "भोग" है। जब योगी "स्वार्थ" (पुरुष के असली स्वरूप) पर संयम करता है, तो उसे पुरुष (आत्मा) का ज्ञान हो जाता है।

#### WWWH Framework:
- **What:** असली ज्ञान।
- **Why:** हम खुद को मन समझ बैठे हैं, जबकि हम उसे देखने वाले हैं।
- **When:** मोक्ष की अंतिम सीढ़ी।
- **How:** "दृश्य" (जो दिख रहा है) को छोड़कर "द्रष्टा" (जो देख रहा है) पर फोकस करें।

- **How:** उदान वायु को सिद्ध करके।

### सूत्र 3.41: दिव्य श्रवण (Super Hearing)

- **आकाशयोः (Akashayoh):** आकाश का।
- **सम्बन्ध (Sambandha):** संबंध।
- **संयमात् (Samyamat):** संयम करने से।
- **दिव्यम् (Divyam):** दिव्य।
- **श्रोत्रम् (Shrotram):** श्रवण शक्ति।

#### भावार्थ:
कान (श्रोत्र) और आकाश (Space) के संबंध पर संयम करने से दिव्य सुनने की शक्ति प्राप्त होती है। (दूर की आवाजें भी सुनाई देती हैं)।

#### WWWH Framework:
- **What:** सुपर हियरिंग।
- **Why:** शब्द आकाश में यात्रा करता है, आकाश को साधने से शब्द सध जाता है।
- **When:** सूक्ष्म ध्वनियां सुनने के लिए।
- **How:** कान के भीतर के आकाश (Space) पर ध्यान लगाएं।

### सूत्र 3.42: आकाश गमन (Flying)

> **कायाकाशयोः सम्बन्धसंयमाल्लघुतूलसमापत्तेश्चाकाशगमनम् ॥४२॥**
> *(Kaya akashayoh sambandha samyamat laghu tula samapattesh cha akasha gamanam)*

#### शब्दार्थ:
- **काय (Kaya):** शरीर।
- **आकाशयोः (Akashayoh):** आकाश का।
- **सम्बन्ध (Sambandha):** संबंध।
- **संयमात् (Samyamat):** संयम करने से।
- **लघु (Laghu):** हल्की।
- **तूल (Tula):** रुई (Cotton).
- **समापत्तेः (Samapatteh):** समापत्ति/ध्यान से।
- **च (Cha):** और।
- **आकाशगमनम् (Akasha gamanam):** आकाश में चलना/उड़ना।

#### भावार्थ:
शरीर और आकाश के संबंध पर संयम करने से, और रुई (Cotton) जैसी हल्की चीजों पर ध्यान लगाकर शरीर को हल्का करने से, योगी आकाश में उड़ सकता है।

#### WWWH Framework:
- **What:** उड़ना (Levitation).
- **Why:** गुरुत्वाकर्षण मन की एक आदत है।
- **When:** भौतिक सीमाओं को तोड़ने के लिए।
- **How:** खुद को रुई जैसा हल्का महसूस करें।

### सूत्र 3.43: महाविदेहा (Out of body experience)

> **बहिरकल्पिता वृत्तिर्महाविदेहा ततः प्रकाशावरणक्षयः ॥४३॥**
> *(Bahir akalpita vrittir maha videha tatah prakasha avarana kshayah)*

#### शब्दार्थ:
- **बहिः (Bahih):** बाहर।
- **अकल्पिता (Akalpita):** अकल्पित/वास्तविक (Not imagined).
- **वृत्तिः (Vrittih):** वृत्ति/स्थिति।
- **महाविदेहा (Maha videha):** महाविदेहा (Great disembodied state).
- **ततः (Tatah):** उससे।
- **प्रकाश (Prakasha):** प्रकाश का।
- **आवरण (Avarana):** आवरण/पर्दा।
- **क्षयः (Kshayah):** नाश।

#### भावार्थ:
शरीर के बाहर मन को टिकाने की जो "अकल्पिता वृत्ति" है (बिना शरीर के होने का अहसास), उसे "महाविदेहा" कहते हैं। इससे बुद्धि के प्रकाश का आवरण नष्ट हो जाता है।

#### WWWH Framework:
- **What:** एस्ट्रल प्रोजेक्शन (Astral Projection).
- **Why:** यह साबित करने के लिए कि चेतना शरीर के बिना भी रह सकती है।
- **When:** योग की उच्च अवस्था में।
- **How:** मन को शरीर से बाहर निकालें और वहां कार्य करें।

### सूत्र 3.44: तत्वों पर विजय

> **स्थूलस्वरूपसूक्ष्मान्वयार्थवत्त्वसंयमाद्भूतजयः ॥४४॥**
> *(Sthula svarupa sukshma anvaya arthavattva samyamat bhuta jayah)*

#### शब्दार्थ:
- **स्थूल (Sthula):** स्थूल रूप (Gross).
- **स्वरूप (Svarupa):** असली रूप (Essential nature).
- **सूक्ष्म (Sukshma):** सूक्ष्म रूप (Subtle).
- **अन्वय (Anvaya):** अन्वय/गुण (Inherence).
- **अर्थवत्त्व (Arthavattva):** उद्देश्य (Purpose).
- **संयमात् (Samyamat):** संयम करने से।
- **भूतजयः (Bhuta jayah):** तत्वों पर विजय।

#### भावार्थ:
पंचभूतों (Elements) के पांच रूपों (स्थूल, स्वरूप, सूक्ष्म, अन्वय, अर्थवत्त्व) पर संयम करने से तत्वों पर विजय प्राप्त होती है। (आग जला नहीं सकती, पानी डुबो नहीं सकता)।

#### WWWH Framework:
- **What:** तत्वों का मास्टर।
- **Why:** प्रकृति को नियंत्रित करने के लिए।
- **When:** जब प्रकृति के साथ सामंजस्य बिठाना हो।
- **How:** पदार्थ की पांच परतों को समझें।

### सूत्र 3.45: अष्ट सिद्धि (Eight Powers)

> **ततोऽणिमादिप्रादुर्भावः कायसंपत्तद्धर्मानभिघातश्च ॥४५॥**
> *(Tato animadi pradurbhavah kaya sampat tad dharma anabhighatash cha)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (भूत जय से)।
- **अणिमादि (Animadi):** अणिमा आदि।
- **प्रादुर्भावः (Pradurbhavah):** प्रकट होना।
- **कायसंपत् (Kaya sampat):** शरीर की संपत्ति/पूर्णता।
- **तद्धर्म (Tad dharma):** उनके (तत्वों के) धर्मों से।
- **अनभिघातः (Anabhighatah):** बाधा न होना/चोट न लगना।
- **च (Cha):** और।

#### भावार्थ:
तत्वों को जीतने से "अणिमा" आदि आठ सिद्धियां (अष्ट सिद्धि) प्राप्त होती हैं, शरीर उत्तम (काय सम्पत्) हो जाता है, और तत्वों के धर्म (जैसे आग की गर्मी) उसे चोट नहीं पहुंचाते।

#### WWWH Framework:
- **What:** अष्ट सिद्धियां।
- **Why:** भौतिक नियमों से पूर्ण स्वतंत्रता।
- **When:** सिद्धि की पराकाष्ठा पर।
- **How:** तत्वों के स्वामी बनकर।

**अष्ट सिद्धियां:**
1. **अणिमा:** अणु जैसा छोटा होना।
2. **लघिमा:** हल्का होना।
3. **महिमा:** बड़ा होना।
4. **प्राप्ति:** कुछ भी छू लेना (जैसे चांद)।
5. **प्राकाम्य:** इच्छा पूरी करना।
6. **वशित्व:** सबको वश में करना।
7. **ईशित्व:** सब पर राज करना।
8. **यत्रकामावसायित्व:** सत्य संकल्प (जो चाहे वह हो जाए)।

### सूत्र 3.46: काय सम्पत् (Physical Perfection)

> **रूपलावण्यबलवज्रसंहननत्वानि कायसंपत् ॥४६॥**
> *(Rupa lavanya bala vajra samhananatvani kaya sampat)*

#### शब्दार्थ:
- **रूप (Rupa):** सुंदरता (Beauty).
- **लावण्य (Lavanya):** चमक/आकर्षण (Grace).
- **बल (Bala):** बल (Strength).
- **वज्रसंहननत्वानि (Vajra samhananatvani):** वज्र जैसी मजबूती (Adamantine hardness).
- **कायसंपत् (Kaya sampat):** शरीर की संपत्ति।

#### भावार्थ:
सुंदरता, चमक, बल, और वज्र जैसी मजबूती - ये चार शरीर की संपत्तियां (Perfections) हैं।

#### WWWH Framework:
- **What:** परफेक्ट बॉडी।
- **Why:** योग से शरीर भी दिव्य हो जाता है।
- **When:** जब तत्वों पर विजय प्राप्त हो।
- **How:** संयम और ध्यान से।

### सूत्र 3.47: इंद्रिय जय (Mastery over Senses)

> **ग्रहणस्वरूपास्मितान्वयार्थवत्त्वसंयमादिन्द्रियजयः ॥४७॥**
> *(Grahana svarupa asmita anvaya arthavattva samyamat indriya jayah)*

#### शब्दार्थ:
- **ग्रहण (Grahana):** ग्रहण करना (Process of knowing).
- **स्वरूप (Svarupa):** असली रूप (Essential nature).
- **अस्मिता (Asmita):** अहंकार (Ego/I-sense).
- **अन्वय (Anvaya):** अन्वय (Inherence).
- **अर्थवत्त्व (Arthavattva):** उद्देश्य (Purpose).
- **संयमात् (Samyamat):** संयम करने से।
- **इन्द्रियजयः (Indriya jayah):** इंद्रियों पर विजय।

#### भावार्थ:
इंद्रियों के पांच रूपों (ग्रहण, स्वरूप, अस्मिता, अन्वय, अर्थवत्त्व) पर संयम करने से इंद्रियों पर पूर्ण विजय प्राप्त होती है।

#### WWWH Framework:
- **What:** इंद्रियों का मास्टर।
- **Why:** ताकि इंद्रियां मन को न घसीटें।
- **When:** जब इंद्रियां बेकाबू हों।
- **How:** इंद्रियों की पांच परतों को समझें।

### सूत्र 3.48: मनोजवित्व (Speed of Mind)

> **ततो मनोजवित्वं विकरणभावः प्रधानजयश्च ॥४८॥**
> *(Tato mano javitvam vikarana bhavah pradhana jayash cha)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (इंद्रिय जय से)।
- **मनोजवित्वम् (Mano javitvam):** मन जैसी गति (Speed of mind).
- **विकरणभावः (Vikarana bhavah):** बिना शरीर के कार्य करना (Action without organs).
- **प्रधानजयः (Pradhana jayah):** प्रकृति पर विजय (Mastery over nature).
- **च (Cha):** और।

#### भावार्थ:
इंद्रियों को जीतने से मन जैसी गति (Speed of mind), बिना शरीर के अनुभव करने की शक्ति (Videha), और मूल प्रकृति (Pradhana) पर विजय प्राप्त होती है।

#### WWWH Framework:
- **What:** सुपर स्पीड (Flash).
- **Why:** मन प्रकाश से भी तेज है।
- **When:** एक साथ सब जगह होने के लिए।
- **How:** विचार की गति से चलें।

### सूत्र 3.49: सर्वभाव अधिष्ठातृत्व (Omnipotence)

> **सत्त्वपुरुषान्यताख्यातिमात्रस्य सर्वभावाधिष्ठातृत्वं सर्वज्ञातृत्वं च ॥४९॥**
> *(Sattva purusha anyata khyati matrasya sarva bhava adhishthatritvam sarva jnatritvam cha)*

#### शब्दार्थ:
- **सत्त्वपुरुषान्यताख्यातिमात्रस्य (Sattva purusha anyata khyati matrasya):** जब बुद्धि (सत्व) और पुरुष (आत्मा) के भेद का ज्ञान हो जाए।
- **सर्वभावाधिष्ठातृत्वं (Sarva bhava adhishthatritvam):** सभी भावों पर स्वामित्व (Omnipotence).
- **सर्वज्ञातृत्वं (Sarva jnatritvam):** सर्वज्ञता (Omniscience).
- **च (Cha):** और।

#### भावार्थ:
जब योगी बुद्धि (सत्व) और पुरुष (आत्मा) के भेद को पूरी तरह जान लेता है (विवेकख्याति), तो उसे सभी भावों पर स्वामित्व (Omnipotence) और सर्वज्ञता (Omniscience) प्राप्त होती है।

#### WWWH Framework:
- **What:** भगवान जैसी शक्तियां।
- **Why:** क्योंकि आप अपनी असली पहचान जान गए हैं।
- **When:** विवेकख्याति की अवस्था में।
- **How:** बुद्धि और आत्मा के भेद को समझें।

### सूत्र 3.50: कैवल्य का बीज

> **तद्वैराग्यादपि दोषबीजक्षये कैवल्यम् ॥५०॥**
> *(Tad vairagyad api dosha bija kshaye kaivalyam)*

#### शब्दार्थ:
- **तद् (Tad):** उस (सर्वज्ञता) से।
- **वैराग्यात् (Vairagyad):** वैराग्य होने से।
- **अपि (Api):** भी।
- **दोषबीज (Dosha bija):** दोषों (बंधन) के बीज।
- **क्षये (Kshaye):** नष्ट होने पर।
- **कैवल्यम् (Kaivalyam):** कैवल्य (Liberation).

#### भावार्थ:
उस सर्वज्ञता (Omniscience) से भी वैराग्य हो जाने पर, जब बंधन के बीज ही नष्ट हो जाते हैं, तब "कैवल्य" (Ultimate Liberation) प्राप्त होता है।

#### WWWH Framework:
- **What:** आखिरी त्याग।
- **Why:** शक्तियां भी बंधन हैं। सोने की जंजीर भी जंजीर है।
- **When:** जब आप भगवान बनने के करीब हों।
- **How:** कहें - "मुझे यह भी नहीं चाहिए, मुझे केवल मुक्ति चाहिए।"
