- **उच्यते (Uchyate):** कहा जाता है।

#### भावार्थ:
बिना बिंदु और विसर्ग के केवल "अ" (A) का जप/उच्चारण करने से, हे देवि! सहसा महान ज्ञान का प्रवाह (परमेश्वर) उदय होता है।

#### WWWH Framework:
- **What:** द फर्स्ट SOUND।
- **Why:** 'अ' सभी ध्वनियों की जननी है और सबसे स्वाभाविक स्वर है।
- **When:** सुबह के समय।
- **How:** "अअअअ..." का उच्चारण करें। यह गले से नहीं, नाभि से आना चाहिए।

---

### विधि 68: विसर्ग अंत (End of Visarga)

> **वर्णस्य सविसर्गस्य विसर्गान्तं चिति कुरु।**
> **निराधारेण चित्तेन स्पृशेद्ब्रह्म सनातनम् ॥९१॥**
> *(Varnasya savisargasya visargantam chiti kuru |*
> *Niradharena chittena sprished brahma sanatanam || 91 ||)*

#### शब्दार्थ:
- **वर्णस्य (Varnasya):** वर्ण का।
- **सविसर्गस्य (Savisargasya):** विसर्ग सहित।
- **विसर्गान्तं (Visargantam):** विसर्ग के अंत में।
- **चिति (Chiti):** चित्त को।
- **कुरु (Kuru):** करो/लगाओ।
- **निराधारेण (Niradharena):** निराधार (चित्त) से।
- **चित्तेन (Chittena):** चित्त से।
- **स्पृशेत् (Sprished):** स्पर्श करता है।
- **ब्रह्म सनातनम् (Brahma sanatanam):** सनातन ब्रह्म को।

#### भावार्थ:
विसर्ग युक्त वर्ण (जैसे "हः") के उच्चारण के अंत में, जब ध्वनि समाप्त हो रही हो, अपने निराधार चित्त को वहां लगाएं। वहां सनातन ब्रह्म का स्पर्श होता है।

#### WWWH Framework:
- **What:** एक्सहेलेशन SOUND।
- **Why:** विसर्ग (:) प्राण का विसर्जन है।
- **When:** प्राणायाम में।
- **How:** "हः" (Hah) बोलें। हवा बाहर गई, ध्वनि खत्म हुई। उस खालीपन को पकड़ें।

---

### विधि 69: आकाश रूप (Form of Sky)

> **व्योमाकारं स्वमात्मानं ध्यायेद्दिग्भिरनावृतम्।**
> **निराश्रया चितिः शक्तिः स्वरूपं दर्शयेत्तदा ॥९२॥**
> *(Vyomakaram svamatmanam dhyayed digbhir anavritam |*
> *Nirashraya chitih shaktih svarupam darshayet tada || 92 ||)*

#### शब्दार्थ:
- **व्योमाकारं (Vyomakaram):** आकाश के आकार वाला।
- **स्वमात्मानं (Svamatmanam):** अपने आत्मा को।
- **ध्यायेत् (Dhyayet):** ध्यान करें।
- **दिग्भिः (Digbhih):** दिशाओं से।
- **अनावृतम् (Anavritam):** न घिरा हुआ (अनंत)।
- **निराश्रया (Nirashraya):** बिना आधार के।
- **चितिः शक्तिः (Chitih shaktih):** चिति शक्ति।
- **स्वरूपं (Svarupam):** अपना स्वरूप।
- **दर्शयेत् (Darshayet):** दिखाती है।
- **तदा (Tada):** तब।

#### भावार्थ:
अपने आत्मा को आकाश की तरह अनंत और दिशाओं से मुक्त (Boundless) ध्यान करें। तब निराश्रय चिति शक्ति अपना स्वरूप दिखाती है।

#### WWWH Framework:
- **What:** बाउंड्रीलेस सेल्फ।
- **Why:** शरीर की सीमा (Skin) एक भ्रम है।
- **When:** खुली छत पर।
- **How:** आंख बंद करें और सोचें - "मेरा कोई अंत नहीं है, मैं हर जगह हूँ"।

---

### विधि 70: शलाका वेध (Piercing with Needle)

> **किञ्चिदङ्गं विभिद्याथ तीक्ष्णसूच्यादिना ततः।**
> **तत्रैव चेतनां युक्त्वा भैरवे निर्मला गतिः ॥९३॥**
> *(Kinchid angam vibhidya atha tikshna suchyadina tatah |*
> *Tatraiva chetanam yuktva bhairave nirmala gatih || 93 ||)*

#### शब्दार्थ:
- **किञ्चिदङ्गं (Kinchid angam):** किसी अंग को।
- **विभिद्य (Vibhidya):** भेदकर/छेदकर।
- **अथ (Atha):** फिर।
- **तीक्ष्णसूच्यादिना (Tikshna suchyadina):** तीखी सुई आदि से।
- **ततः (Tatah):** उसके बाद।
- **तत्रैव (Tatraiva):** वहीं पर।
- **चेतनां (Chetanam):** चेतना को।
- **युक्त्वा (Yuktva):** जोड़कर/एकाग्र करके।
- **भैरवे (Bhairave):** भैरव में।
- **निर्मला गतिः (Nirmala gatih):** निर्मल गति/अवस्था।

#### भावार्थ:
शरीर के किसी अंग को तीखी सुई से छेदने पर, सारा ध्यान उस दर्द के बिंदु (Point of Pain) पर एकाग्र कर दें। उस तीव्रता में भैरव की निर्मल गति प्राप्त होती है।

#### WWWH Framework:
- **What:** पेन मेडitation।
- **Why:** दर्द (Pain) ध्यान को तुरंत एक बिंदु पर ले आता है।
- **When:** जब कोई चोट लगे या दर्द हो।
- **How:** दर्द से भागें नहीं। सुई चुभने पर "आह" न करें, पूरा ध्यान उस चुभन पर लगा दें।

---

### विधि 71: अंतःकरण (Inner Instrument)

> **चित्ताद्यन्तःकृतिर्नास्ति ममेत्यन्तः विभावयेत्।**
> **विकल्पानामभावेन विकल्पैरुज्झितो भवेत् ॥९४॥**
> *(Chittadyantah kritir nasti mametyantah vibhavayet |*
> *Vikalpanam abhavena vikalpair ujjhito bhavet || 94 ||)*

#### शब्दार्थ:
- **चित्तादि (Chittadi):** चित्त, मन, बुद्धि, अहंकार।
- **अन्तःकृतिः (Antah kritih):** अंतःकरण।
- **न अस्ति (Na asti):** नहीं है।
- **मम (Mama):** मेरा।
- **इति (Iti):** ऐसा।
- **अन्तः (Antah):** भीतर।
- **विभावयेत् (Vibhavayet):** भावना करें।
- **विकल्पानाम् (Vikalpanam):** विकल्पों के।
- **अभावेन (Abhavena):** अभाव से।
- **विकल्पैः (Vikalpaih):** विकल्पों से।
- **उज्झितो (Ujjhito):** मुक्त/अलग।
- **भवेत् (Bhavet):** हो जाता है।

#### भावार्थ:
भीतर यह भावना करें कि "चित्त, मन, बुद्धि और अहंकार - यह अंतःकरण मेरा नहीं है"। इस प्रकार विकल्पों (विचारों) का अभाव होने से योगी विकल्प-मुक्त हो जाता है।

#### WWWH Framework:
- **What:** नेति-नेति (Not this, not this).
- **Why:** हम अपने मन (Software) को ही "मैं" समझ लेते हैं।
- **When:** जब मन बहुत शोर मचाए।
- **How:** देखें कि मन सोच रहा है, और कहें - "यह मैं नहीं हूँ, यह तो बस एक मशीन है"।

---

### विधि 72: माया विमोह (Illusion)

> **मायाविमोहिनी नाम कलायाः कलनं स्थितम्।**
> **इत्यादिधर्मतत्त्वानां कलनान्न पृथग्भवेत् ॥९५॥**
> *(Mayavimohini nama kalayah kalanam sthitam |*
> *Ityadi dharma tattvanam kalanan na prithag bhavet || 95 ||)*

#### शब्दार्थ:
- **मायाविमोहिनी (Mayavimohini):** विमोहित करने वाली माया।
- **नाम (Nama):** नामक।
- **कलायाः (Kalayah):** कलाओं का।
- **कलनं (Kalanam):** कार्य/क्रिया।
- **स्थितम् (Sthitam):** स्थित है।
- **इत्यादि (Ityadi):** इत्यादि।
- **धर्मतत्त्वानां (Dharma tattvanam):** धर्म तत्वों का।
- **कलनात् (Kalanat):** कार्य से।
- **न पृथग्भवेत् (Na prithag bhavet):** अलग नहीं है।

#### भावार्थ:
यह समझें कि यह सब माया का खेल है, इंद्रियों और तत्वों का कार्य है। मैं (चेतना) इनसे अलग नहीं हूँ, बल्कि यह सब मुझमें ही हो रहा है (Non-dual awareness).

#### WWWH Framework:
- **What:** सब माया है।
- **Why:** द्वैत (Dualism) संघर्ष पैदा करता है। अद्वैत शांति देता है।
- **When:** संसार को देखते समय।
- **How:** दुनिया को एक जादुई शो (Magic show) की तरह देखें।

---

### विधि 73: इच्छा उद्भव (Rising Desire)

> **इच्छायामथवा ज्ञाने जाते चित्तं निवेशयेत्।**
> **आत्मबुद्ध्यानन्यचेतास्ततस्तत्त्वार्थदर्शनम् ॥९६॥**
> *(Icchayam athava jnane jate chittam niveshayet |*
> *Atma buddhya ananya chetas tatas tattvartha darshanam || 96 ||)*

#### शब्दार्थ:
- **इच्छायां (Icchayam):** इच्छा (Desire) में।
- **अथवा (Athava):** अथवा।
- **ज्ञाने (Jnane):** ज्ञान (Knowledge) में।
- **जाते (Jate):** उत्पन्न होने पर।
- **चित्तं (Chittam):** चित्त को।
- **निवेशयेत् (Niveshayet):** लगा दे।
- **आत्मबुद्ध्या (Atma buddhya):** आत्म-बुद्धि से।
- **अनन्यचेताः (Ananya chetah):** एकाग्र मन वाला।
- **ततः (Tatah):** उससे।
- **तत्त्वार्थदर्शनम् (Tattvartha darshanam):** तत्व का दर्शन।

#### भावार्थ:
जब कोई इच्छा या ज्ञान उत्पन्न हो, तो तुरंत चित्त को उसी में (उसके उद्गम स्थान पर) लगा दें। आत्म-बुद्धि से एकाग्र होने पर तत्व का दर्शन होता है।

#### WWWH Framework:
- **What:** डिजायर सर्फिंग।
- **Why:** हम इच्छा के पीछे भागते हैं (Object), इच्छा की ऊर्जा (Energy) को नहीं देखते।
- **When:** जब कोई इच्छा जगे (जैसे आइसक्रीम खाने की)।
- **How:** आइसक्रीम के बारे में न सोचें, उस "चाहत" (Craving) की फीलिंग पर ध्यान दें। वह शुद्ध ऊर्जा है।

---

### विधि 74: इच्छा का अंत (End of Desire)

> **निर्निमित्तं भवेज्ज्ञानं निराधारं भ्रमात्मकम्।**
> **तत्त्वतः कस्यचिन्नैतदेवंभावी शिवः प्रिये ॥९७॥**
> *(Nirnimittam bhavej jnanam niradharam bhramatmakam |*
> *Tattvatah kasyachin naitad evam bhavi shivah priye || 97 ||)*

#### शब्दार्थ:
- **निर्निमित्तं (Nirnimittam):** बिना निमित्त/कारण के।
- **भवेत् (Bhavet):** हो/होता है।
- **ज्ञानं (Jnanam):** ज्ञान।
- **निराधारं (Niradharam):** बिना आधार के।
- **भ्रमात्मकम् (Bhramatmakam):** भ्रम रूप।
- **तत्त्वतः (Tattvatah):** वास्तव में/तत्वतः।
- **कस्यचित् (Kasyachit):** किसी का।
- **न (Na):** नहीं।
- **एतत् (Etat):** यह।
- **एवंभावी (Evam bhavi):** ऐसा भाव करने वाला।
- **शिवः (Shivah):** शिव।
- **प्रिये (Priye):** हे प्रिये।

#### भावार्थ:
यह ज्ञान/इच्छा बिना कारण है, निराधार है और भ्रम है। वास्तव में यह किसी का नहीं है। हे प्रिये! ऐसा भाव करने वाला शिव रूप हो जाता है।

#### WWWH Framework:
- **What:** इल्यूजन बस्टिंग।
- **Why:** इच्छाएं हमें गुलाम बनाती हैं क्योंकि हम उन्हें सच मानते हैं।
- **When:** जब इच्छाएं सताएं।
- **How:** खुद से पूछें - "यह इच्छा कहां से आई? इसका आधार क्या है?" आप पाएंगे कि यह हवा में लटकी है।

---

### विधि 75: चैतन्य (Consciousness)

> **चिद्धर्मा सर्वदेहेषु विशेषो नास्ति कुत्रचित्।**
> **अतश्च तन्मयं सर्वं भावयन्भवजिज्जनः ॥९८॥**
> *(Chiddharma sarva deheshu vishesho nasti kutrachit |*
> *Atashcha tanmayam sarvam bhavayan bhavajij janah || 98 ||)*

#### शब्दार्थ:
- **चिद्धर्मा (Chid dharma):** चैतन्य स्वभाव वाला।
- **सर्वदेहेषु (Sarva deheshu):** सभी शरीरों में।
- **विशेषः (Visheshah):** विशेष/भेद।
- **न अस्ति (Na asti):** नहीं है।
- **कुत्रचित् (Kutrachit):** कहीं भी।
- **अतश्च (Atashcha):** और इसलिए।
- **तन्मयं (Tanmayam):** तन्मय/उसी रूप।
- **सर्वं (Sarvam):** सब कुछ।
- **भावयन् (Bhavayan):** भावना करते हुए।
- **भवजित् (Bhavajit):** संसार को जीतने वाला।
- **जनः (Janah):** मनुष्य/साधक।

#### भावार्थ:
सभी शरीरों में एक ही चैतन्य (Consciousness) है, इसमें कोई भेद नहीं है। ऐसा मानकर जो सब कुछ तन्मय (चेतनामय) देखता है, वह संसार को जीत लेता है।

#### WWWH Framework:
- **What:** वननेस (Oneness).
- **Why:** "मैं अलग हूँ, तुम अलग हो" - यही अहंकार है।
- **When:** लोगों से मिलते समय।
- **How:** दूसरे की आंखों में देखें और सोचें - "वही चेतना वहां है जो यहां है"।

---

### विधि 76: वैराग्य (Detachment)

> **कामक्रोधलोभमोहमदमात्सर्यगोचरे।**
> **बुद्धिं निस्तिमितां कृत्वा तत्तत्त्वमवशिष्यते ॥९९॥**
> *(Kama krodha lobha moha mada matsarya gochare |*
> *Buddhim nistimitam kritva tat tattvam avashishyate || 99 ||)*

#### शब्दार्थ:
- **काम (Kama):** काम/इच्छा।
- **क्रोध (Krodha):** क्रोध।
- **लोभ (Lobha):** लोभ।
- **मोह (Moha):** मोह।
- **मद (Mada):** मद/अहंकार।
- **मात्सर्य (Matsarya):** ईर्ष्या।
- **गोचरे (Gochare):** प्रकट होने पर/विषय में।
- **बुद्धिं (Buddhim):** बुद्धि को।
- **निस्तिमितां (Nistimitam):** निस्तिमित/स्थिर।
- **कृत्वा (Kritva):** करके।
- **तत् (Tat):** वह।
- **तत्त्वम् (Tattvam):** तत्व।
- **अवशिष्यते (Avashishyate):** शेष रह जाता है।

#### भावार्थ:
काम, क्रोध आदि विकारों के आने पर, बुद्धि को निस्तिमित (बिल्कुल स्थिर/Silent) कर दें। न दबाएं, न बहें, बस देखें। तब जो शेष बचता है, वही तत्व है।

#### WWWH Framework:
- **What:** फ्रीज फ्रेम।
- **Why:** प्रतिक्रिया (Reaction) कर्म बांधती है। साक्षी (Witnessing) मुक्त करती है।
- **When:** जब गुस्सा आए।
- **How:** गुस्सा आया... स्टैच्यू! कुछ मत करो, बस उस आग को देखो। वह अपने आप जलकर राख हो जाएगी।

---

### विधि 77: इन्द्रजाल (Magic Show)

> **इन्द्रजालमयं विश्वं व्यस्तं वा चित्रकर्मवत्।**
> **भ्रमद्वा ध्यायतः सर्वं पश्यतश्च सुखोद्गमः ॥१००॥**
> *(Indrajalamayam vishvam vyastam va chitrakarmavat |*
> *Bhramad va dhyayatah sarvam pashyatash cha sukhodgamah || 100 ||)*

#### शब्दार्थ:
- **इन्द्रजालमयं (Indrajalamayam):** इंद्रजाल (जादू) से युक्त।
- **विश्वं (Vishvam):** विश्व को।
- **व्यस्तं (Vyastam):** व्यस्त/फैला हुआ।
- **वा (Va):** अथवा।
- **चित्रकर्मवत् (Chitrakarmavat):** चित्रकारी/पेंटिंग की तरह।
- **भ्रमद्वा (Bhramad va):** या भ्रम की तरह।
- **ध्यायतः (Dhyayatah):** ध्यान करने वाले का।
- **सर्वं (Sarvam):** सब कुछ।
- **पश्यतः (Pashyatah):** देखते हुए।
- **च (Cha):** और।
- **सुखोद्गमः (Sukhodgamah):** सुख का उदय।

#### भावार्थ:
इस विश्व को इंद्रजाल (जादू), चित्रकारी या भ्रम की तरह देखें। इस प्रकार सब कुछ साक्षी भाव से देखने पर सुख का उदय होता है।

#### WWWH Framework:
- **What:** लाइफ इज़ अ मूवी।
- **Why:** हम फिल्म में इतना खो जाते हैं कि रोने लगते हैं। यह याद दिलाना जरूरी है कि यह सिर्फ स्क्रीन है।
- **When:** जब जीवन में ड्रामा हो।
- **How:** सोचें कि आप थिएटर में बैठे हैं और अपनी ही जिंदगी की फिल्म देख रहे हैं।

---

### विधि 78: न दुःख न सुख (Neither Pain nor Pleasure)

> **न चित्तं निक्षिपेड्दुःखे न सुखे वा परिक्षिपेत्।**
> **भैरवि ज्ञायतां मध्ये किं तत्त्वमवशिष्यते ॥१०१॥**
> *(Na chittam nikshiped duhkhe na sukhe va parikshipet |*
> *Bhairavi jnayatam madhye kim tattvam avashishyate || 101 ||)*

#### शब्दार्थ:
- **न (Na):** न।
- **चित्तं (Chittam):** चित्त को।
- **निक्षिपेड् (Nikshiped):** डालना/लगाना चाहिए।
- **दुःखे (Duhkhe):** दुःख में।
- **न (Na):** न।
- **सुखे (Sukhe):** सुख में।
- **वा (Va):** अथवा।
- **परिक्षिपेत् (Parikshipet):** लगाना चाहिए।
- **भैरवि (Bhairavi):** हे भैरवी।
- **ज्ञायतां (Jnayatam):** जानो।
- **मध्ये (Madhye):** मध्य में।
- **किं (Kim):** क्या।
- **तत्त्वम् (Tattvam):** तत्व।
- **अवशिष्यते (Avashishyate):** शेष रहता है।

#### भावार्थ:
चित्त को न दुःख में लगाएं, न सुख में। हे भैरवि! इन दोनों के बीच में (Neutral state) जो बचता है, उसे जानो कि वह क्या तत्व है।

#### WWWH Framework:
- **What:** समत्व (Equanimity).
- **Why:** सुख और दुख एक ही सिक्के के दो पहलू हैं। सत्य दोनों से परे है।
- **When:** सुख-दुख के पलों में।
- **How:** सुख आए तो उछलो मत, दुख आए तो रोओ मत। बस सेंटर में रहो।

---

### विधि 79: विहायास्पदं (Leaving the Body)

> **विहायास्पदं देहं सर्वत्रापि विभावयेत्।**
> **दृढेन मनसा दृष्ट्या नान्येक्षिण्या सुखी भवेत् ॥१०२॥**
> *(Vihayaspadam deham sarvatrapi vibhavayet |*
> *Dridhena manasa drishtya nanyekshinya sukhi bhavet || 102 ||)*

#### शब्दार्थ:
- **विहाय (Vihaya):** छोड़कर।
- **आस्पदं (Aspadam):** आस्पद/स्थान (आधार)।
- **देहं (Deham):** शरीर को।
- **सर्वत्रापि (Sarvatrapi):** सर्वत्र भी।
- **विभावयेत् (Vibhavayet):** भावना करें।
- **दृढेन (Dridhena):** दृढ़।
- **मनसा (Manasa):** मन से।
- **दृष्ट्या (Drishtya):** दृष्टि से।
- **नान्येक्षिण्या (Na anyekshinya):** अनन्य (दूसरी ओर न देखने वाली) दृष्टि से।
- **सुखी (Sukhi):** सुखी।
- **भवेत् (Bhavet):** हो जाता है।

#### भावार्थ:
अपने आधार (शरीर) को छोड़कर, दृढ़ मन और अनन्य दृष्टि से भावना करें कि "मैं सर्वत्र हूँ"। इससे योगी सुखी (मुक्त) हो जाता है।

#### WWWH Framework:
- **What:** ओमनीप्रेजेंस।
- **Why:** शरीर एक पिंजरा है।
- **When:** ध्यान में।
- **How:** सोचें कि आप शरीर में कैद नहीं हैं, आप हवा की तरह हर जगह मौजूद हैं।

---

### विधि 80: ज्ञान और ज्ञेय (Knower and Known)

> **घटादौ यच्च विज्ञानं इच्छाद्यं वा ममान्तरे।**
> **नैव सर्वगतं जातं भावयन्निति सर्वगः ॥१०३॥**
> *(Ghatadau yach cha vijnanam icchadyam va mamantare |*
> *Naiva sarvagatam jatam bhavayan niti sarvagah || 103 ||)*

#### शब्दार्थ:
- **घटादौ (Ghatadau):** घड़े आदि में।
- **यच्च (Yach cha):** जो और।
- **विज्ञानं (Vijnanam):** विज्ञान/ज्ञान।
- **इच्छाद्यं (Icchadyam):** इच्छा आदि।
- **वा (Va):** अथवा।
- **ममान्तरे (Mama antare):** मेरे अंतर (भीतर) में।
- **नैव (Naiva):** नहीं ही।
- **सर्वगतं (Sarvagatam):** सर्वगत (सब में गया हुआ)।
- **जातं (Jatam):** उत्पन्न/हुआ।
- **भावयन् (Bhavayan):** भावना करते हुए।
- **इति (Iti):** ऐसा।
- **सर्वगः (Sarvagah):** सर्वग (सर्वव्यापी)।

#### भावार्थ:
"घड़े आदि का जो ज्ञान है या जो इच्छा मेरे भीतर है, वह केवल मुझमें या घड़े में नहीं, बल्कि सर्वगत (Universal) है" - ऐसा चिंतन करने से योगी सर्वव्यापक हो जाता है।

#### WWWH Framework:
- **What:** यूनिवर्सल नॉलेज।
- **Why:** ज्ञान व्यक्तिगत नहीं होता, वह ब्रह्मांडीय है।
- **When:** कुछ जानते या सीखते समय।
- **How:** "मैं जान रहा हूँ" - यह अहंकार है। "ज्ञान घटित हो रहा है" - यह सत्य है।

---

### विधि 81: सर्वत्र शिव (Shiva Everywhere)

> **ग्राह्यग्राहकसंवित्तिः सामान्या सर्वदेहिनाम्।**
> **योगिनां तु विशेषोऽयं सम्बन्धे सावधानता ॥१०४॥**
> *(Grahya grahaka samvittih samanya sarva dehinam |*
> *Yoginam tu vishesho ayam sambandhe savadhanata || 104 ||)*

#### शब्दार्थ:
- **ग्राह्य (Grahya):** ग्राह्य (विषय)।
- **ग्राहक (Grahaka):** ग्राहक (विषयी/जानने वाला)।
- **संवित्तिः (Samvittih):** संवित्ति (ज्ञान/चेतना)।
- **सामान्या (Samanya):** सामान्य है।
- **सर्वदेहिनाम् (Sarva dehinam):** सभी देहधारियों (प्राणियों) की।
- **योगिनां (Yoginam):** योगियों की।
- **तु (Tu):** तो/लेकिन।
- **विशेषोऽयं (Vishesho ayam):** यह विशेष है।
- **सम्बन्धे (Sambandhe):** संबंध में।
- **सावधानता (Savadhanata):** सावधानी/जागरूकता।

#### भावार्थ:
विषय (Object) और विषयी (Subject) का ज्ञान सभी प्राणियों को होता है। लेकिन योगियों की विशेषता यह है कि वे इन दोनों के "संबंध" (Connection) के प्रति सावधान (Aware) रहते हैं।

#### WWWH Framework:
- **What:** द लिंक।
- **Why:** हम या तो खुद को देखते हैं या दुनिया को। दोनों के बीच जो "देखना" (Seeing) हो रहा है, उसे भूल जाते हैं।
- **When:** किसी भी अनुभव के समय।
- **How:** फूल को देखते समय, फूल पर नहीं, "देखने की क्रिया" पर ध्यान दें।

---

### विधि 82: स्व और पर (Self and Other)

> **स्ववदन्यशरीरेऽपि संवित्तिमनुभावयेत्।**
> **अपेक्षां स्वशरीरस्य त्यक्त्वा व्यापी दिनैर्भवेत् ॥१०५॥**
> *(Svavad anya sharire api samvittim anubhavayet |*
> *Apeksham svasharirasya tyaktva vyapi dinair bhavet || 105 ||)*

#### शब्दार्थ:
- **स्ववत् (Svavat):** अपने समान (जैसे अपने शरीर में)।
- **अन्यशरीरे (Anya sharire):** अन्य (दूसरे के) शरीर में।
- **अपि (Api):** भी।
- **संवित्तिम् (Samvittim):** संवित्ति (चेतना) को।
- **अनुभावयेत् (Anubhavayet):** अनुभव करें।
- **अपेक्षां (Apeksham):** अपेक्षा/आसक्ति।
- **स्वशरीरस्य (Svasharirasya):** अपने शरीर की।
- **त्यक्त्वा (Tyaktva):** त्यागकर।
- **व्यापी (Vyapi):** व्यापक।
- **दिनैः (Dinaih):** दिनों में।
- **भवेत् (Bhavet):** हो जाता है।

#### भावार्थ:
अपने शरीर की अपेक्षा (Attachment) छोड़कर, दूसरे के शरीर में भी अपनी ही तरह चेतना का अनुभव करें। कुछ ही दिनों में योगी सर्वव्यापी हो जाता है।

#### WWWH Framework:
- **What:** एम्पैथी योग।
- **Why:** शरीर अलग हैं, चेतना एक है।
- **When:** किसी को स्पर्श करते समय।
- **How:** किसी का हाथ पकड़ें और महसूस करें कि आप उसके हाथ के अंदर से महसूस कर रहे हैं।

---

### विधि 83: निराधार मन (Supportless Mind)

> **निराधारं मनः कृत्वा विकल्पान्न विकल्पयेत्।**
> **तदात्मपरमात्मत्वे भैरवो मृगलोचने ॥१०६॥**
> *(Niradharam manah kritva vikalpan na vikalpayet |*
> *Tadatma paramatmatve bhairavo mrigalochane || 106 ||)*

#### शब्दार्थ:
- **निराधारं (Niradharam):** आधार रहित।
- **मनः (Manah):** मन को।
- **कृत्वा (Kritva):** करके।
- **विकल्पान् (Vikalpan):** विकल्पों (विचारों) को।
- **न (Na):** नहीं।
- **विकल्पयेत् (Vikalpayet):** विकल्प करना चाहिए/उठाना चाहिए।
- **तदात्म (Tadatma):** तदात्म (उस आत्मा में)।
- **परमात्मत्वे (Paramatmatve):** परमात्म भाव में।
- **भैरवो (Bhairavo):** भैरव।
- **मृगलोचने (Mrigalochane):** हे मृगनयनी।

#### भावार्थ:
मन को निराधार (Supportless) करके, किसी भी विचार को न उठाएं। तब उस अवस्था में परमात्मा (भैरव) ही शेष रहता है।

#### WWWH Framework:
- **What:** फ्री फॉल।
- **Why:** मन हमेशा किसी चीज़ (Object) को पकड़ता है। जब कुछ नहीं पकड़ता, तो वह खुद मिट जाता है।
- **When:** ध्यान में।
- **How:** विचारों को सहारा मत दो। उन्हें आने दो, जाने दो, पकड़ो मत।

---

### विधि 84: सर्वज्ञ (The Knower of All)

> **सर्वज्ञः सर्वकर्ता च व्यापकः परमेश्वरः।**
> **स एवाहं शैवधर्मा इति दारढ्याद्भवेच्छिवः ॥१०७॥**
> *(Sarvajnah sarvakarta cha vyapakah parameshvarah |*
> *Sa evaham shaivadharma iti dardhyad bhavech shivah || 107 ||)*

#### शब्दार्थ:
- **सर्वज्ञः (Sarvajnah):** सर्वज्ञ (सब जानने वाला)।
- **सर्वकर्ता (Sarvakarta):** सर्वकर्ता (सब करने वाला)।
- **च (Cha):** और।
- **व्यापकः (Vyapakah):** व्यापक।
- **परमेश्वरः (Parameshvarah):** परमेश्वर।
- **स (Sa):** वह।
- **एव (Eva):** ही।
- **अहं (Aham):** मैं हूँ।
- **शैवधर्मा (Shaiva dharma):** शिव धर्म वाला (शिव स्वरूप)।
- **इति (Iti):** ऐसा।
- **दारढ्यात् (Dardhyad):** दृढ़ता से।
- **भवेत् (Bhavet):** हो जाता है।
- **शिवः (Shivah):** शिव।

#### भावार्थ:
"परमेश्वर सर्वज्ञ, सर्वकर्ता और व्यापक है, और वही मैं हूँ (I am He)" - इस दृढ़ निश्चय (Conviction) से जीव शिव हो जाता है।

#### WWWH Framework:
- **What:** अहम् ब्रह्मास्मि।
- **Why:** हम खुद को छोटा और लाचार मानते हैं। यह विधि उस सम्मोहन को तोड़ती है।
- **When:** आत्मविश्वास की कमी होने पर।
- **How:** बार-बार याद दिलाएं - "मैं शरीर नहीं, मैं वह शक्ति हूँ जो सूरज को चला रही है"।

---

### विधि 85: जल तरंग (Wave and Water)

> **जलस्येवोर्मयो वह्नेर्ज्वालाभङ्ग्यः प्रभा रवेः।**
> **ममैव भैरवस्यैता विश्वभङ्ग्यो विभेदिताः ॥१०८॥**
> *(Jalasyevormayo vahner jvala bhangyah prabha raveh |*
> *Mamaiva bhairavasyaita vishva bhangyah vibheditah || 108 ||)*

#### शब्दार्थ:
- **जलस्य (Jalasya):** जल की।
- **इव (Iva):** की तरह।
- **उर्मयो (Urmayo):** लहरें (ऊर्मियाँ)।
- **वह्नेः (Vahneh):** अग्नि की।
- **ज्वाला (Jvala):** ज्वाला/लपटें।
- **भङ्ग्यः (Bhangyah):** भंगिमाएं/रूप।
- **प्रभा (Prabha):** प्रभा/किरणें।
- **रवेः (Raveh):** रवि (सूर्य) की।
- **मम (Mama):** मेरी।
- **एव (Eva):** ही।
- **भैरवस्य (Bhairavasya):** भैरव की।
- **एता (Eta):** ये।
- **विश्वभङ्ग्यो (Vishva bhangyah):** विश्व की रचनाएं।
- **विभेदिताः (Vibheditah):** विभेदित/अलग-अलग।

#### भावार्थ:
जैसे जल की लहरें जल ही हैं, आग की लपटें आग ही हैं, और सूर्य की किरणें सूर्य ही हैं - वैसे ही यह विविध विश्व मुझ भैरव की ही लहरें हैं।

#### WWWH Framework:
- **What:** कॉस्मिक डांस।
- **Why:** लहर समुद्र से अलग नहीं है। हम भगवान से अलग नहीं हैं।
- **When:** प्रकृति को देखते समय।
- **How:** पेड़, पहाड़, लोग - सब भगवान की लहरें हैं। सब एक ही समुद्र का पानी है।

---

### विधि 86: भ्रान्ति (Delusion)

> **भ्रान्त्वा वेदविदिद्भ्रान्ते देहं वा प्राणमेव वा।**
> **चित्तं वास्मिन्नहंकारं विमुह्यति मूढधीः ॥१०९॥**
> *(Bhrantva vedavidid bhrante deham va pranam eva va |*
> *Chittam vasmin ahankaram vimuhyati mudhadhih || 109 ||)*

#### शब्दार्थ:
- **भ्रान्त्वा (Bhrantva):** भ्रम में पड़कर/घूमकर।
- **वेदविदित् (Vedavidit):** वेद (ज्ञान) को जानने वाला।
- **भ्रान्ते (Bhrante):** भ्रांति में।
- **देहं (Deham):** देह को।
- **वा (Va):** या।
- **प्राणम् (Pranam):** प्राण को।
- **एव (Eva):** ही।
- **वा (Va):** अथवा।
- **चित्तं (Chittam):** चित्त को।
- **वा (Va):** या।
- **अस्मिन् (Asmin):** इसमें।
- **अहंकारं (Ahankaram):** अहंकार को।
- **विमुह्यति (Vimuhyati):** मोहित होता है।
- **मूढधीः (Mudhadhih):** मूढ़ बुद्धि वाला।

#### भावार्थ:
जो लोग शरीर, प्राण या चित्त को ही "मैं" मान लेते हैं, वे मूर्ख हैं और भ्रम में हैं। (यह विधि निषेध द्वारा सत्य को जानने की है)।

#### WWWH Framework:
- **What:** आइडेंटिटी क्राइसिस।
- **Why:** गलत पहचान ही दुख का कारण है।
- **When:** जब "मेरा" या "मुझे" का भाव आए।
- **How:** हंसें और कहें - "यह शरीर मैं नहीं हूँ, यह तो बस एक कपड़े की तरह है"।

---

### विधि 87: अविचल (Unmoving)

> **ततो विकारहीनोऽस्मि परिच्छिन्नो न सर्वगः।**
> **इति वा भावयेच्चित्ते त्वं ज्ञानेनाद्वयो भवेत् ॥११०॥**
> *(Tato vikarahino asmi paricchinno na sarvagah |*
> *Iti va bhavayech chitte tvam jnanenadvayo bhavet || 110 ||)*

#### शब्दार्थ:
- **विकारहीनोऽस्मि (Vikarahino asmi):** मैं विकार रहित हूँ।
- **न परिच्छिन्नो (Na paricchinno):** सीमित नहीं हूँ।
- **इति (Iti):** ऐसा।
- **भावयतः (Bhavayatah):** भावना करने वाले की।
- **सर्वगः (Sarvagah):** सर्वव्यापी हूँ।
- **अद्वयो (Advayo):** अद्वैत (दो नहीं)।
- **ज्ञानं (Jnanam):** ज्ञान।
- **भाति (Bhati):** प्रकाशित होता है।

#### भावार्थ:
"मैं विकार रहित हूँ, मैं सीमित नहीं हूँ, मैं सर्वव्यापी हूँ" - ऐसी भावना करने से योगी अद्वैत ज्ञान को प्राप्त होता है।

#### WWWH Framework:
- **What:** इनफिनिट सेल्फ।
- **Why:** सीमाएं (Boundaries) मन की उपज हैं।
- **When:** मेडिटेशन में।
- **How:** अपनी सीमाओं को मिटा दें। महसूस करें कि आप कमरे की दीवारों के पार फैल गए हैं।

---

### विधि 88: अकिंचन (Nothingness)

> **किञ्चिज्ज्ञैर्या स्मृता माया सा त्वं भासो न वा भवेत्।**
> **सर्वं चराचरं दुःखं भारं भावयतो लयः ॥१११॥**
> *(Kinchij jnair ya smrita maya sa tvam bhaso na va bhavet |*
> *Sarvam characharam duhkham bharam bhavayato layah || 111 ||)*

#### शब्दार्थ:
- **किञ्चिज्ज्ञैः (Kinchij jnaih):** अल्पज्ञों द्वारा।
- **या (Ya):** जो।
- **प्रोक्ता (Prokta):** कही गई है।
- **माया (Maya):** माया।
- **सा (Sa):** वह।
- **न (Na):** नहीं।
- **किञ्चन (Kinchan):** कुछ भी।
- **दुःखं भारं (Duhkham bharam):** दुःख और भार।
- **इति (Iti):** ऐसा।
- **ज्ञात्वा (Jnatva):** जानकर।
- **लयः (Layah):** लय/मुक्ति।

#### भावार्थ:
अल्पज्ञ जिसे माया कहते हैं, वह वास्तव में कुछ नहीं है। "यह सब चराचर जगत दुःख और भार रूप है" - ऐसा मानकर (त्यागने से) मन का लय हो जाता है।

#### WWWH Framework:
- **What:** वर्ल्ड इज़ सफरिंग (बुद्ध का मार्ग)।
- **Why:** जब तक दुनिया में सुख दिखेगा, मन वहां जाएगा। जब दुख दिखेगा, मन वापस लौटेगा।
- **When:** वैराग्य जगाने के लिए।
- **How:** देखें कि हर खुशी के पीछे दुख छिपा है। इस बोझ को उतार फेंको।

---

### विधि 89: ईश्वर इच्छा (Will of God)

> **ईश्वरो बहिरुन्मेषो निमेषोऽन्तः सदा विभुः।**
> **इत्यभियुक्तियोगेन लभते तत्त्वमुत्तमम् ॥११२॥**
> *(Ishvaro bahir unmesho nimesho antah sada vibhuh |*
> *Ityabhiyukti yogena labhate tattvam uttamam || 112 ||)*

#### शब्दार्थ:
- **बहिरुन्मेषो (Bahir unmesho):** बाहर प्रकट होना।
- **निमेषोऽन्तः (Nimesho antah):** अंदर छिपना।
- **विभुः (Vibhuh):** व्यापक प्रभु।
- **इति (Iti):** ऐसा।
- **भावयतः (Bhavayatah):** भावना करने वाले को।
- **लभते (Labhate):** प्राप्त करता है।
- **तत्त्वमुत्तमम् (Tattvam uttamam):** उत्तम तत्व।

#### भावार्थ:
"ईश्वर ही बाहर प्रकट होता है (सृष्टि) और वही अंदर समेट लेता है (प्रलय)" - इस भावना से उत्तम तत्व की प्राप्ति होती है।

#### WWWH Framework:
- **What:** डिवाइन प्ले।
- **Why:** कर्तापन का बोझ उतर जाता है।
- **When:** सफलता या असफलता में।
- **How:** जो हो रहा है, उसे भगवान की मर्जी समझें। "तेरा तुझको अर्पण"।

---

### विधि 90: न मैं न वह (Neither I nor He)

> **तस्याशक्तस्य देवेशि न मे मुक्तिर्न बन्धनम्।**
> **प्रविश्य तत्त्वमेवैतदहो विस्मयमिदं महत् ॥११३॥**
> *(Tasya ashaktasya deveshi na me muktir na bandhanam |*
> *Pravishya tattvam evaitad aho vismayam idam mahat || 113 ||)*

#### शब्दार्थ:
- **अशक्तस्य (Ashaktasya):** अशक्त/निराधार का।
- **न मे मुक्तिः (Na me muktih):** न मेरी मुक्ति है।
- **न बन्धनम् (Na bandhanam):** न बंधन है।
- **इति (Iti):** ऐसा।
- **प्रविश्य (Pravisya):** प्रवेश करके।
- **तत्त्वे (Tattve):** तत्व में।
- **पश्येत् (Pashyet):** देखे।
- **विस्मयम् (Vismayam):** आश्चर्य।
- **इदम् (Idam):** यह।

#### भावार्थ:
"न मेरी मुक्ति है, न बंधन है (क्योंकि मैं हूँ ही नहीं)" - इस तत्व में प्रवेश करना महान आश्चर्य (Wonder) है।

#### WWWH Framework:
- **What:** नो बॉन्डेज, नो फ्रीडम।
- **Why:** मुक्ति भी एक इच्छा है। जब "मैं" ही नहीं, तो कैद कौन?
- **When:** आध्यात्मिक अहंकार आने पर।
- **How:** हंसें कि आप मुक्त होने की कोशिश कर रहे हैं। कौन मुक्त होगा?

---

### विधि 91: सूर्य रश्मि (Sun Rays)

> **इदमित्यस्य वैलग्न्यात्परब्रह्मप्रकाशनात्।**
> **यथा रश्मिर्विभातीह रवौ तद्वच्चिदात्मनि ॥११४॥**
> *(Idam ityasya vailagnyat parabrahma prakashanat |*
> *Yatha rashmir vibhatiha ravau tadvach chidatmani || 114 ||)*

#### शब्दार्थ:
- **इदमित्यस्य (Idam ityasya):** इस (जगत) के।
- **वैलग्न्यात् (Vailagnyat):** अलग होने से।
- **रश्मिः (Rashmih):** किरण।
- **इव (Iva):** की तरह।
- **विवस्वतः (Vivasvatah):** सूर्य की।
- **परब्रह्म (Parabrahma):** परब्रह्म।
- **प्रकाशते (Prakashate):** प्रकाशित होता है।
- **चिदात्मनि (Chidatmani):** चिदात्मा में।
- **सर्वं (Sarvam):** सब।
- **भैरव (Bhairava):** भैरव।
- **मयत्वेन (Mayatvena):** मय होने से/रूप होने से।
- **भावयन् (Bhavayan):** भावना करते हुए।
- **अखिलं (Akhilam):** संपूर्ण।
- **जगत् (Jagat):** जगत।
- **निराधारः (Niradharah):** आधार रहित।
- **सुखं (Sukham):** सुख।
- **अद्वैतं (Advaitam):** अद्वैत।
- **परब्रह्म (Parabrahma):** परब्रह्म।
- **प्रजायते (Prajayate):** उत्पन्न होता है/प्राप्त होता है।

#### भावार्थ:
जैसे सूर्य की किरणें सूर्य से अभिन्न हैं, वैसे ही यह जगत (Idam) उस चिदात्मा (Consciousness) से अभिन्न है। इस भेद के मिटने से परब्रह्म प्रकाशित होता है।

#### WWWH Framework:
- **What:** सोर्स और रेज़।
- **Why:** हम खुद को किरण समझते हैं और सूरज को भूल जाते हैं।
- **When:** धूप में।
- **How:** किरण को पकड़कर सूरज तक पहुंचें। दुनिया को पकड़कर भगवान तक पहुंचें।

---

### विधि 92: ज्ञान का आधार (Basis of Knowledge)

> **जगत्प्रकाशको यस्मादन्यः सूर्यो न विद्यते।**
> **तस्मादात्मप्रकाशोऽयं जगदित्यवधारयेत् ॥११५॥**
> *(Jagat prakashako yasmad anyah suryo na vidyate |*
> *Tasmad atma prakasho ayam jagad ityavadharayet || 115 ||)*

#### शब्दार्थ:
- **जगत्प्रकाशको (Jagat prakashako):** जगत को प्रकाशित करने वाला।
- **आत्मप्रकाशोऽयं (Atma prakasho ayam):** यह आत्म-प्रकाश ही है।
- **अन्यः (Anyah):** दूसरा।
- **न (Na):** नहीं।
- **सूर्यगः (Suryagah):** सूर्य में स्थित।
- **इति (Iti):** ऐसा।
- **अवधारयेत् (Avadharayet):** निश्चय करें।

#### भावार्थ:
इस जगत को प्रकाशित करने वाला आत्मा (चेतना) के सिवाय कोई दूसरा सूर्य नहीं है। इसलिए निश्चय करें कि यह सारा जगत मेरा ही प्रकाश है।

#### WWWH Framework:
- **What:** आई एम द लाइट।
- **Why:** बिना चेतना के दुनिया अंधेरी है। आप हैं, इसलिए दुनिया है।
- **When:** दुनिया को देखते समय।
- **How:** महसूस करें कि आपकी आंखों से रोशनी निकल रही है जो चीजों को "दिखा" रही है।

---

### विधि 93: प्राण का लय (Dissolution of Prana)

> **तन्त्रेण स्वपदोत्पत्तिर्लक्षितैर्वा स्वलक्षितैः।**
> **एकं स्वं भावयेद्देहं तदा संविन्मयो भवेत् ॥११६॥**
> *(Tantrena svapadotpattir lakshitair va svalakshitaih |*
> *Ekam svam bhavayed deham tada samvinmayo bhavet || 116 ||)*

#### शब्दार्थ:
- **तन्त्रेण (Tantrena):** तंत्र (उपाय/विधि) से।
- **स्वपदोत्पत्तिः (Svapada utpattih):** अपने पद (स्वरूप) की उत्पत्ति/प्राप्ति।
- **लक्षितैः (Lakshitaih):** लक्षणों द्वारा।
- **वा (Va):** अथवा।
- **स्वलक्षितैः (Svalakshitaih):** अपने द्वारा लक्षित (अनुभव किए गए)।
- **एकं (Ekam):** एक।
- **स्वं (Svam):** अपने।
- **भावयेत् (Bhavayet):** भावना करें।
- **देहं (Deham):** शरीर को।
- **तदा (Tada):** तब।
- **संविन्मयो (Samvinmayo):** संवित (ज्ञान/चेतना) मय।
- **भवेत् (Bhavet):** हो जाता है।

#### भावार्थ:
प्राण, अपान आदि के लक्षणों द्वारा या अपने अनुभव द्वारा, अपने शरीर को और प्राण को एक (Unified) अनुभव करें। तब योगी ज्ञानमय हो जाता है।

#### WWWH Framework:
- **What:** यूनिफाइड फील्ड।
- **Why:** शरीर के टुकड़े मत करो (हाथ, पैर, सिर)। इसे एक ऊर्जा का गोला समझो।
- **When:** योग करते समय।
- **How:** पूरे शरीर को एक साथ महसूस करें, हिस्सों में नहीं।

---

### विधि 94: शब्द ब्रह्म (Sound Brahman)

> **आदिमध्यान्तशून्यासु शब्दराशिसु या ध्वनिः।**
> **तदादिमध्यान्तेष्वेकैवाविभवा सा ॥११७॥**
> *(Adi madhyanta shuniyasu shabda rashisu ya dhvanih |*
> *Tad adi madhyanteshu ekaiva avibhava sa || 117 ||)*

#### शब्दार्थ:
- **आदि (Adi):** आदि (शुरुआत)।
- **मध्य (Madhya):** मध्य।
- **अन्त (Anta):** और अंत से।
- **शून्यासु (Shunyasu):** शून्य/रहित।
- **शब्दराशिसु (Shabda rashisu):** शब्दों के समूह में।
- **या (Ya):** जो।
- **ध्वनिः (Dhvanih):** ध्वनि।
- **तदादिमध्यान्तेषु (Tad adi madhya anteshu):** उस (ध्वनि) के आदि, मध्य और अंत में।
- **एका (Eka):** एक।
- **एव (Eva):** ही।
- **अविभवा (Avibhava):** अविभव (व्यापक/अखंड)।
- **सा (Sa):** वह (चिदात्मा)।

#### भावार्थ:
सभी शब्दों और ध्वनियों में जो एक अखंड ध्वनि (Soundless Sound) छिपी है - जो आदि, मध्य और अंत से रहित है - उस पर ध्यान दें।

#### WWWH Framework:
- **What:** अनहद नाद।
- **Why:** शब्द बनते और मिटते हैं, लेकिन "ध्वनि का आधार" (Silence) हमेशा रहता है।
- **When:** शोर के बीच।
- **How:** शब्दों को न सुनें, उस सन्नाटे को सुनें जिस पर शब्द तैर रहे हैं।

---

### विधि 95: अ-शब्द (Soundless)

> **न मे बन्धो न मोक्षो मे भीतस्यैता विभीषिकाः।**
> **प्रतिबिम्बमिदं बुद्धेर्जलेष्विव विवस्वतः ॥११८॥**
> *(Na me bandho na moksho me bhitasya eta vibhishikah |*
> *Pratibimbam idam buddher jaleshviva vivasvatah || 118 ||)*

#### शब्दार्थ:
- **न मे बन्धो (Na me bandho):** न मेरा बंधन है।
- **न (Na):** न।
- **मोक्षः (Mokshah):** मोक्ष।
- **विभीषिकाः (Vibhishikah):** डराने वाली (कल्पनाएं)।
- **शान्ताः (Shantah):** शांत।
- **विवस्वतः (Vivasvatah):** सूर्य का।
- **इव (Iva):** की तरह।
- **प्रतिबिम्बम् (Pratibimbam):** प्रतिबिंब/परछाई।

#### भावार्थ:
"न मेरा बंधन है, न मोक्ष। ये सब डरे हुए मन की कल्पनाएं हैं। जैसे पानी में सूर्य का प्रतिबिंब होता है, वैसे ही बुद्धि में यह संसार है।"

#### WWWH Framework:
- **What:** रिफ्लेक्शन।
- **Why:** प्रतिबिंब को कैद नहीं किया जा सकता। आप प्रतिबिंब हैं।
- **When:** डर लगने पर।
- **How:** याद रखें - पानी हिलने से सूरज नहीं हिलता। मन हिलने से "आप" नहीं हिलते।

---

### विधि 96: इंद्रिय अगोचर (Beyond Senses)

> **इन्द्रियद्वारकं सर्वं सुखदुःखादिसङ्गमम्।**
> **इतीन्द्रियाणि संत्यज्य स्वस्थो वर्तते ॥११९॥**
> *(Indriya dvarakam sarvam sukha dukhadisangamam |*
> *Iti indriyani santyajya svastho vartate || 119 ||)*

#### शब्दार्थ:
- **इन्द्रियद्वारकं (Indriya dvarakam):** इंद्रियों के द्वारा।
- **सर्वं (Sarvam):** सब।
- **सुखदुःखादि (Sukha duhkhadi):** सुख-दुःख आदि।
- **सङ्गमम् (Sangamam):** संगम/मिलन।
- **इति (Iti):** ऐसा।
- **इन्द्रियाणि (Indriyani):** इंद्रियों को।
- **संत्यज्य (Santyajya):** त्यागकर।
- **स्वस्थो (Svastho):** अपने में स्थित (Swasth).
- **वर्तते (Vartate):** रहता है।

#### भावार्थ:
सुख-दुःख आदि सब इंद्रियों के द्वारा ही आते हैं। इसलिए इंद्रियों (के जुड़ाव) को त्यागकर, योगी अपने आप में (स्वस्थ) स्थित हो जाता है।

#### WWWH Framework:
- **What:** विद्ड्रॉल (प्रत्याहार)।
- **Why:** डाकिया (इंद्रियां) ही चिट्ठी (सुख-दुख) लाता है। दरवाजा बंद, चिट्ठी बंद।
- **When:** बहुत ज्यादा स्टिमुलेशन होने पर।
- **How:** अपनी इंद्रियों को कछुए की तरह समेट लें। बाहर की दुनिया को बाहर छोड़ दें।

---

### विधि 97: अ-भाव (Non-Being)

> **ज्ञानप्रकाशकं सर्वं सर्वेणात्मा प्रकाशकः।**
> **एकमेव स्वभावत्वमिति भावयतः शिवः ॥१२०॥**
> *(Jnana prakashakam sarvam sarvena atma prakashakah |*
> *Ekam eva svabhavatvam iti bhavayatah shivah || 120 ||)*

#### शब्दार्थ:
- **ज्ञानप्रकाशकं (Jnana prakashakam):** ज्ञान को प्रकाशित करने वाला।
- **सर्वं (Sarvam):** सब।
- **सर्वेणात्मा (Sarvena atma):** सब कुछ आत्मा है।
- **प्रकाशकः (Prakashakah):** प्रकाशक।
- **एकम् (Ekam):** एक।
- **एव (Eva):** ही।
- **स्वभावत्वम् (Svabhavatvam):** स्वभाव।
- **इति (Iti):** ऐसा।
- **भावयतः (Bhavayatah):** भावना करने वाले का।
- **शिवः (Shivah):** शिव।

#### भावार्थ:
"सब कुछ ज्ञान (चेतना) से प्रकाशित है और आत्मा ही सबको प्रकाशित करती है। सब एक ही स्वभाव है" - ऐसा भाव करने वाला शिव हो जाता है।

#### WWWH Framework:
- **What:** वन नेचर।
- **Why:** अलग-अलग चीजें नहीं हैं, एक ही "चीज" अलग-अलग रूपों में है।
- **When:** भेदभाव मिटाने के लिए।
- **How:** सोने के गहने अलग हैं, लेकिन सोना एक है। रूपों को भूल जाएं, तत्व को देखें।

---

### विधि 98: मन का लय (Mind Dissolution)

> **मानसं चेतना शक्तिरात्मा चेति चतुष्टयम्।**
> **यदा प्रिये परिक्षीणं तदा तद्भैरवं वपुः ॥१२१॥**
> *(Manasam chetana shaktir atma cheti chatushtayam |*
> *Yada priye parikshinam tada tad bhairavam vapuh || 121 ||)*

#### शब्दार्थ:
- **मानसं (Manasam):** मन।
- **चेतना (Chetana):** चेतना।
- **शक्तिः (Shaktih):** शक्ति।
- **आत्मा (Atma):** आत्मा।
- **च (Cha):** और।
- **इति (Iti):** ऐसा।
- **चतुष्टयम् (Chatushtayam):** चारों।
- **यदा (Yada):** जब।
- **प्रिये (Priye):** हे प्रिये।
- **परिक्षीणं (Parikshinam):** क्षीण/नष्ट हो जाता है।
- **तदा (Tada):** तब।
- **तत् (Tat):** वह।
- **भैरवं वपुः (Bhairavam vapuh):** भैरव शरीर/स्वरूप।

#### भावार्थ:
हे प्रिये! जब मन, चेतना, शक्ति और आत्मा (का भेद) - यह चारों क्षीण हो जाते हैं (मिट जाते हैं), तब जो बचता है, वही भैरव का स्वरूप है।

#### WWWH Framework:
- **What:** बियॉन्ड डेफिनिशन्स।
- **Why:** शब्द (मन, आत्मा) भी बंधन हैं। सत्य शब्दों से परे है।
- **When:** समाधि की अवस्था में।
- **How:** शब्दों को छोड़ दें। "मैं आत्मा हूँ" - यह भी एक विचार है। इसे भी छोड़ दें।

---

### विधि 99: वैराग्य (Dispassion)

> **निस्तरङ्गोपदेशानां शतमुक्तं समासतः।**
> **द्वादशाब्दा तु यो देवि सोऽपि ज्ञानं न विन्दति ॥१२२॥**
> *(Nistaranga upadeshana shatam uktam samasatah |*
> *Dvadashabda tu yo devi so api jnanam na vindati || 122 ||)*

#### शब्दार्थ:
- **निस्तरङ्ग (Nistaranga):** तरंग रहित/शांत।
- **उपदेशानां (Upadeshanaam):** उपदेशों का।
- **शतम् (Shatam):** सौ।
- **उक्तम् (Uktam):** कहा गया है।
- **समासतः (Samasatah):** संक्षेप में।
- **द्वादशाब्दा (Dvadashabda):** बारह वर्ष तक।
- **तु (Tu):** तो।
- **यः (Yah):** जो।
- **देवि (Devi):** हे देवी।
- **सः (Sah):** वह।
- **अपि (Api):** भी।
- **ज्ञानं (Jnanam):** ज्ञान।
- **न (Na):** नहीं।
- **विन्दति (Vindati):** प्राप्त करता है।

#### भावार्थ:
(यह विधि अभ्यास की निरंतरता पर जोर देती है)। यदि कोई शांत मन से इन उपदेशों का अभ्यास नहीं करता, तो बारह वर्ष तक सुनने पर भी उसे ज्ञान प्राप्त नहीं होता।

#### WWWH Framework:
- **What:** प्रैक्टिस।
- **Why:** सिर्फ सुनने से कुछ नहीं होगा। करना पड़ेगा।
- **When:** अभी।
- **How:** एक विधि चुनें और उसे जीवन बना लें। इन्फॉर्मेशन नहीं, ट्रांसफॉर्मेशन चाहिए।

---

### विधि 100: शब्द ब्रह्म (Word Brahman)

> **यदा त्वेकत्र संरूढस्तदा तस्य लयोदयौ।**
> **गच्छतस्तद्गतं रूपं तेजसः परमात्मनः ॥१२३॥**
> *(Yada tvekatra samrudhas tada tasya layodayau |*
> *Gachchatas tad gatam rupam tejasah paramatmanah || 123 ||)*

#### शब्दार्थ:
- **यदा (Yada):** जब।
- **तु (Tu):** तो।
- **एकत्र (Ekatra):** एक में।
- **संरूढः (Samrudhah):** आरूढ़/स्थिर।
- **तदा (Tada):** तब।
- **तस्य (Tasya):** उसका।
- **लयोदयौ (Layodayau):** लय और उदय।
- **गच्छतः (Gachchatas):** जाते हैं/मिट जाते हैं।
- **तत्गतं (Tatgatam):** उसमें स्थित।
- **रूपं (Rupam):** रूप।
- **तेजसः (Tejasah):** तेज का।
- **परमात्मनः (Paramatmanah):** परमात्मा का।

#### भावार्थ:
जब चित्त एक जगह स्थिर हो जाता है, तब लय और उदय (सृष्टि और प्रलय) का भेद मिट जाता है और परमात्मा का तेज प्रकट होता है।

#### WWWH Framework:
- **What:** अनशेकेबल फोकस।
- **Why:** जब मन एक बिंदु पर रुकता है, तो समय (Time) रुक जाता है।
- **When:** त्राटक या ध्यान में।
- **How:** एक चीज पर टिके रहें। इतना टिकें कि आप और वह चीज एक हो जाएं।

---

### विधि 101: अविश्वास (Disbelief)

> **यत्र यत्र न मे पूजा न मे मन्त्रो न मे जपः।**
> **यत्र यत्र न मे ध्यानं तत्र तत्र हि संस्थितिः ॥१२४॥**
> *(Yatra yatra na me puja na me mantro na me japah |*
> *Yatra yatra na me dhyanam tatra tatra hi samsthitih || 124 ||)*

#### शब्दार्थ:
- **यत्र यत्र (Yatra yatra):** जहां-जहां।
- **न मे पूजा (Na me puja):** न मेरी पूजा।
- **न मे मन्त्रो (Na me mantro):** न मेरा मंत्र।
- **न मे जपः (Na me japah):** न मेरा जप।
- **न मे ध्यानं (Na me dhyanam):** न मेरा ध्यान।
- **तत्र तत्र (Tatra tatra):** वहीं-वहीं।
- **हि (Hi):** निश्चित ही।
- **संस्थितिः (Samsthitih):** सम्यक स्थिति/समाधि।

#### भावार्थ:
"न मेरी कोई पूजा है, न मंत्र है, न जप है, न ध्यान है" - जहां ये सब नहीं हैं (सब विधियों का निषेध), वहीं मेरी सच्ची स्थिति (समाधि) है।

#### WWWH Framework:
- **What:** नो-मेथड मेथड।
- **Why:** विधियां साधन हैं, साध्य नहीं। अंत में नाव भी छोड़नी पड़ती है।
- **When:** जब आप विधियों से थक जाएं।
- **How:** सब कुछ छोड़ दें। पूजा, पाठ, ध्यान - सब। बस "होने" (Being) में रह जाएं।

---

### विधि 102: शिव का स्थान (Abode of Shiva)

> **तदेव पूज्यं या पूजा तदेवं या च पूजिका।**
> **तदेव पूज्यते यद्वा सा पूजा सा परा कला ॥१२५॥**
> *(Tad eva pujyam ya puja tad evam ya cha pujika |*
> *Tad eva pujyate yad va sa puja sa para kala || 125 ||)*

#### शब्दार्थ:
- **तत् (Tat):** वह।
- **एव (Eva):** ही।
- **पूज्यं (Pujyam):** पूजनीय।
- **या (Ya):** जो।
- **पूजा (Puja):** पूजा।
- **च (Cha):** और।
- **पूजिका (Pujika):** पूजा करने वाली।
- **पूज्यते (Pujyate):** पूजा जाता है।
- **यद्वा (Yad va):** अथवा।
- **सा (Sa):** वह।
- **परा कला (Para kala):** सर्वोच्च कला।

#### भावार्थ:
जो पूजा है, वही पूज्य है। जो पुजारी है, वही पूजा है। सब कुछ एक ही है। यह अद्वैत भाव ही सर्वोच्च कला (पूजा) है।

#### WWWH Framework:
- **What:** अद्वैत भक्ति।
- **Why:** भक्त और भगवान दो नहीं हैं।
- **When:** पूजा करते समय।
- **How:** महसूस करें कि आप (पुजारी), मूर्ति (भगवान) और फूल (पूजा) - तीनों एक ही ऊर्जा के रूप हैं।

---

### विधि 103: सर्वत्र समता (Equality Everywhere)

> **सर्वत्र सर्वदा सर्वं तत्त्वं तस्माद्द्वयं कुतः।**
> **सर्वत्र पूज्यं सर्वत्र तृप्तिः सर्वत्र मे स्थितिः ॥१२६॥**
> *(Sarvatra sarvada sarvam tattvam tasmad dvayam kutah |*
> *Sarvatra pujyam sarvatra triptih sarvatra me sthitih || 126 ||)*

#### शब्दार्थ:
- **सर्वत्र (Sarvatra):** सब जगह।
- **सर्वदा (Sarvada):** हमेशा।
- **सर्वं (Sarvam):** सब।
- **तत्त्वं (Tattvam):** तत्व।
- **तस्मात् (Tasmat):** इसलिए।
- **द्वयं (Dvayam):** द्वैत।
- **कुतः (Kutah):** कहां।
- **पूज्यं (Pujyam):** पूजनीय।
- **तृप्तिः (Triptih):** तृप्ति।
- **मे (Me):** मेरी।
- **स्थितिः (Sthitih):** स्थिति।
- **अकारं (Akaram):** 'अ' कार (आकार)।
- **आश्रित्य (Ashritya):** आश्रय लेकर।
- **अशून्यं (Ashunyam):** अशून्य (भरा हुआ)।
- **शून्यं (Shunyam):** शून्य।
- **इति (Iti):** ऐसा।
- **भावयेत् (Bhavayet):** भावना करें।
- **ततः (Tatah):** तब।
- **तत् (Tat):** वह।
- **शान्तम् (Shantam):** शांत।
- **एव (Eva):** ही।
- **तत्र (Tatra):** वहां।
- **लीनः (Linah):** लीन।
- **भवेत् (Bhavet):** हो जाता है।

#### भावार्थ:
सब जगह, हमेशा, सब कुछ वही एक तत्व है, तो फिर द्वैत (दूसरा) कहां है? इसलिए सब जगह पूजा है, सब जगह तृप्ति है और सब जगह मेरी स्थिति है।

#### WWWH Framework:
- **What:** टोटल एक्सेप्टेंस।
- **Why:** भगवान मंदिर में नहीं, हर कण में है।
- **When:** हर पल।
- **How:** कूड़े के ढेर में भी वही दिव्यता देखें जो मंदिर की मूर्ति में देखते हैं।

---

### विधि 104: काल (Time)

> **सर्वत्र भैरवो भावः सामान्येष्वपि गोचरः।**
> **न च तद्व्यतिरेकेण परोऽस्तीति विभावयेत् ॥१२७॥**
> *(Sarvatra bhairavo bhavah samanyeshv api gocharah |*
> *Na cha tad vyatirekena paro astiti vibhavayet || 127 ||)*

#### शब्दार्थ:
- **सर्वत्र (Sarvatra):** सब जगह।
- **भैरवो भावः (Bhairavo bhavah):** भैरव भाव।
- **सामान्येष्वपि (Samanyeshv api):** सामान्य (तुच्छ) वस्तुओं में भी।
- **गोचरः (Gocharah):** दिखाई देता है।
- **न (Na):** नहीं।
- **च (Cha):** और।
- **तद्व्यतिरेकेण (Tad vyatirekena):** उसके अलावा।
- **परः (Parah):** दूसरा।
- **अस्ति (Asti):** है।
- **इति (Iti):** ऐसा।
- **विभावयेत् (Vibhavayet):** भावना करें।

#### भावार्थ:
सामान्य से सामान्य वस्तुओं में भी भैरव भाव (दिव्यता) दिखाई देता है। उसके सिवाय और कुछ भी नहीं है - ऐसी भावना करें।

#### WWWH Framework:
- **What:** गॉड इन स्मॉल थिंग्स।
- **Why:** हम बड़े चमत्कारों का इंतजार करते हैं और छोटे चमत्कारों (सांस, फूल) को अनदेखा कर देते हैं।
- **When:** रोजमर्रा की जिंदगी में।
- **How:** चाय पीते समय, चाय को भगवान समझें। चलते समय, जमीन को भगवान समझें।

---

### विधि 105: भैरव भाव (Feeling of Bhairava)

> **विशुद्धैः करणैः सर्वैरादौ वर्णैर्निजैः सदा।**
> **विभुरन्वयमासाद्य भवेद्विस्वमयो विभुः ॥१२८॥**
> *(Vishuddhaih karanaih sarvair adau varnair nijaih sada |*
> *Vibhur anvayam asadya bhaved visvamayo vibhuh || 128 ||)*

#### शब्दार्थ:
- **विशुद्धैः (Vishuddhaih):** विशुद्ध/निर्मल।
- **करणैः (Karanaih):** इंद्रियों/अंतःकरण से।
- **सर्वैः (Sarvaih):** सभी।
- **आदौ (Adau):** आदि में/शुरुआत में।
- **वर्णैः (Varnaih):** वर्णों/अक्षरों से।
- **निजैः (Nijaih):** अपने।
- **सदा (Sada):** सदा/हमेशा।
- **विभुः (Vibhuh):** व्यापक प्रभु।
- **अन्वयम् (Anvayam):** अन्वय/संबंध।
- **आसाद्य (Asadya):** प्राप्त करके/स्थापित करके।
- **भवेत् (Bhavet):** हो जाता है।
- **विश्वमयो (Vishvamayo):** विश्वमय।

#### भावार्थ:
विशुद्ध इंद्रियों और अंतःकरण द्वारा, और अपने वर्णों (ध्वनियों/मंत्रों) द्वारा, सदा ईश्वर के साथ संबंध (Oneness) स्थापित करके योगी विश्वमय हो जाता है।

#### WWWH Framework:
- **What:** प्यूरिफिकेशन।
- **Why:** गंदा शीशा चेहरा नहीं दिखाता। मन साफ हो, तो भगवान दिखता है।
- **When:** साधना से पहले।
- **How:** अपनी इंद्रियों को शुद्ध करें (सात्विक भोजन, अच्छा देखना/सुनना)। फिर देखें।

---

### विधि 106: मैं और शिव (I and Shiva)

> **अहं ममेति भावोऽयं ज्ञेये भावे विकल्प्यते।**
> **न विभाव्यो न च ग्राह्यः स एव परमः शिवः ॥१२९॥**
> *(Aham mameti bhavo ayam jneye bhave vikalpyate |*
> *Na vibhavyo na cha grahyah sa eva paramah shivah || 129 ||)*

#### शब्दार्थ:
- **अहं (Aham):** मैं।
- **मम (Mama):** मेरा।
- **इति (Iti):** ऐसा।
- **भावोऽयं (Bhavo ayam):** यह भाव।
- **ज्ञेये (Jneye):** ज्ञेय में।
- **भावे (Bhave):** भाव/पदार्थ में।
- **विकल्प्यते (Vikalpyate):** कल्पना की जाती है।
- **न (Na):** नहीं।
- **विभाव्यो (Vibhavyo):** भावना करने योग्य।
- **च (Cha):** और।
- **ग्राह्यः (Grahyah):** ग्रहण करने योग्य।
- **सः (Sah):** वह।
- **एव (Eva):** ही।
- **परमः शिवः (Paramah shivah):** परम शिव।

#### भावार्थ:
"मैं" और "मेरा" - यह भाव केवल अज्ञान (ज्ञेय पदार्थों) में होता है। जो न भावना करने योग्य है (अचिंत्य) और न पकड़ने योग्य (अग्राह्य), वही परम शिव है।

#### WWWH Framework:
- **What:** बियॉन्ड ईगो।
- **Why:** "मैं" सबसे बड़ा झूठ है।
- **When:** जब घमंड आए।
- **How:** देखें कि "मैं" कहां है? क्या हाथ मैं हूँ? क्या पैर मैं हूँ? आप कहीं नहीं मिलेंगे।

---

### विधि 107: सर्वशून्यता (Total Void)

> **सर्वो वैकत्र चिद्रूपे दैवते भावयेन्मयि।**
> **तदा तन्मयतामेत्य तद्रूपो जायते क्षणात् ॥१३०॥**
> *(Sarvo vaikatra chidrupe daivate bhavayen mayi |*
> *Tada tanmayatam etya tadrupo jayate kshanat || 130 ||)*

#### शब्दार्थ:
- **सर्वो (Sarvo):** सब कुछ।
- **वा (Va):** अथवा।
- **एकत्र (Ekatra):** एक ही।
- **चिद्रूपे (Chidrupe):** चैतन्य रूप।
- **दैवते (Daivate):** देवता में।
- **भावयेत् (Bhavayet):** भावना करें।
- **मयि (Mayi):** मुझमें।
- **तदा (Tada):** तब।
- **तन्मयताम् (Tanmayatam):** तन्मयता/एकरूपता।
- **एत्य (Etya):** प्राप्त होकर।
- **तद्रूपो (Tadrupo):** उसी रूप (शिव रूप)।
- **जायते (Jayate):** हो जाता है।
- **क्षणात् (Kshanat):** क्षण भर में।

#### भावार्थ:
"यह सब कुछ (जगत) मुझ चैतन्य रूप देवता में ही स्थित है" - ऐसी भावना करने से, उसी क्षण तन्मय होकर योगी तद्रूप (शिव रूप) हो जाता है।

#### WWWH Framework:
- **What:** आई एम द कंटेनर।
- **Why:** दुनिया आपके बाहर नहीं, आपके अंदर है (मन में)।
- **When:** दुनिया को देखते समय।
- **How:** महसूस करें कि पहाड़, नदियां, तारे - सब आपके अंदर तैर रहे हैं।

---

### विधि 108: अज्ञान (Ignorance)

> **यदा न किञ्चिज्ज्ञानानि निराकारतयोदिता।**
> **तदा स परमेशानः स्वभावज्योतिरुज्ज्वलः ॥१३१॥**
> *(Yada na kinchij jnanani nirakarataya udita |*
> *Tada sa parameshanah svabhava jyotir ujjvalah || 131 ||)*

#### शब्दार्थ:
- **यदा (Yada):** जब।
- **न (Na):** नहीं।
- **किञ्चित् (Kinchit):** कुछ भी।
- **ज्ञानानि (Jnanani):** ज्ञान।
- **निराकारतया (Nirakarataya):** निराकार रूप से।
- **उदिता (Udita):** उदित/प्रकट।
- **तदा (Tada):** तब।
- **स (Sa):** वह।
- **परमेशानः (Parameshanah):** परमेश्वर।
- **स्वभाव (Svabhava):** स्वभाव से।
- **ज्योतिः (Jyotih):** ज्योति/प्रकाश।
- **उज्ज्वलः (Ujjvalah):** उज्ज्वल।
- **यदा (Yada):** जब।
- **न (Na):** नहीं।
- **यत् (Yat):** जो।
- **किञ्चित् (Kinchit):** कुछ भी।
- **तत् (Tat):** वह।
- **इति (Iti):** ऐसा।
- **ध्यात्वा (Dhyatva):** ध्यान करके।
- **सर्वम् (Sarvam):** सब।
- **अनाधारम् (Anadharam):** आधार रहित।
- **उल्लसेत् (Ullaset):** उल्लास/प्रकट हो।
- **ईश्वरः (Ishvarah):** ईश्वर।
- **सद्भावः (Sadbhavah):** सद्भाव/सत्ता।
- **भक्तस्य (Bhaktasya):** भक्त का।
- **वरदः (Varadah):** वर देने वाला।
- **भवेत् (Bhavet):** होता है।

#### भावार्थ:
जब कोई भी ज्ञान (विषय ज्ञान) नहीं रहता और चित्त निराकार हो जाता है, तब वह परमेश्वर स्वभाव से ही उज्ज्वल प्रकाश के रूप में प्रकट होता है।

#### WWWH Framework:
- **What:** अन-नोइंग (Un-knowing).
- **Why:** ज्ञान (Information) कचरा है। शून्यता (Empty mind) ही दर्पण है।
- **When:** ध्यान की गहराई में।
- **How:** अपने सारे ज्ञान को भूल जाएं। एक बच्चे की तरह हो जाएं जो कुछ नहीं जानता।

---

### विधि 109: शाश्वत (Eternal)

> **यत्र यत्र मनो याति तत्तत्तेनैव तत्क्षणम्।**
> **परित्यज्यानवस्थित्या निस्तरङ्गा तदा स्थितिः ॥१३२॥**
> *(Yatra yatra mano yati tat tat tenaiva tat kshanam |*
> *Parityajya anavasthitya nistaranga tada sthitih || 132 ||)*

#### शब्दार्थ:
- **यत्र यत्र (Yatra yatra):** जहां-जहां।
- **मनो (Mano):** मन।
- **याति (Yati):** जाता है।
- **तत् तत् (Tat tat):** उसे-उसे।
- **तेनैव (Tenaiva):** उसी से।
- **तत्क्षणम् (Tat kshanam):** उसी क्षण।
- **परित्यज्य (Parityajya):** छोड़कर।
- **अनवस्थित्या (Anavasthitya):** स्थित न होने से (चंचलता त्यागकर)।
- **निस्तरङ्गा (Nistaranga):** तरंग रहित/शांत।
- **तदा (Tada):** तब।
- **स्थितिः (Sthitih):** स्थिति।

#### भावार्थ:
मन जहां-जहां जाए, उसे उसी क्षण वहां से हटा लें (विषय को छोड़ दें)। इस प्रकार मन के कहीं भी स्थित न होने से, तरंग रहित (शांत) स्थिति प्राप्त होती है।

#### WWWH Framework:
- **What:** माइंड कंट्रोल।
- **Why:** मन बंदर की तरह है। उसे कहीं टिकने मत दो।
- **When:** जब मन भटके।
- **How:** मन किसी विचार पर गया - "कट!"। दूसरे पर गया - "कट!"। उसे खाली रखो।

---

### विधि 110: भय का नाश (Destruction of Fear)

> **भया सर्वं रवयति सर्वदो व्यापकोऽखिले।**
> **इति भैरवशब्दस्य संततोच्चारणाच्छिवः ॥१३३॥**
> *(Bhaya sarvam ravayati sarvado vyapako akhile |*
> *Iti bhairava shabdasya santatocharanat shivah || 133 ||)*

#### शब्दार्थ:
- **भया (Bhaya):** भय से।
- **सर्वं (Sarvam):** सबको।
- **रवयति (Ravayati):** रवायति (शब्द करता है/गुंजाता है)।
- **सर्वदः (Sarvadah):** सब कुछ देने वाला।
- **व्यापकः (Vyapakah):** व्यापक।
- **अखिले (Akhile):** अखिल (संपूर्ण विश्व) में।
- **इति (Iti):** ऐसा।
- **भैरवशब्दस्य (Bhairava shabdasya):** 'भैरव' शब्द का।
- **संततोच्चारणात् (Santatocharanat):** संतत (निरंतर) उच्चारण से।
- **शिवः (Shivah):** शिव (हो जाता है)।

#### भावार्थ:
"जो अपने भय (शासन) से सबको गुंजाता है (नियंत्रित करता है) और जो सबमें व्यापक है" - इस अर्थ वाले "भैरव" शब्द का निरंतर उच्चारण करने से शिव की प्राप्ति होती है।

#### WWWH Framework:
- **What:** मंत्र योग (भैरव)।
- **Why:** शब्द में शक्ति होती है। "भैरव" शब्द भय को नष्ट करता है।
- **When:** डर या कमजोरी लगने पर।
- **How:** "भैरव... भैरव..." का जाप करें। महसूस करें कि यह ध्वनि आपको शक्तिशाली बना रही है।

---

### विधि 111: अहं (Ego)

> **अहं ममेति भावोऽयं प्रसरेद्यावदात्मनि।**
> **तावदस्मिन्निराधारं मनः कृत्वा तदा स्थितिः ॥१३४॥**
> *(Aham mameti bhavo ayam prasared yavad atmani |*
> *Tavad asmin niradharam manah kritva tada sthitih || 134 ||)*

#### शब्दार्थ:
- **अहं (Aham):** मैं।
- **मम (Mama):** मेरा।
- **इति (Iti):** ऐसा।
- **भावोऽयं (Bhavo ayam):** यह भाव।
- **प्रसरेत् (Prasaret):** प्रसरेत् (फैले/उठे)।
- **यावत् (Yavat):** जब तक।
- **आत्मनि (Atmani):** आत्मा में।
- **तावत् (Tavat):** तब तक।
- **अस्मिन् (Asmin):** इसमें (इस भाव में)।
- **निराधारं (Niradharam):** निराधार (आधार रहित)।
- **मनः (Manah):** मन को।
- **कृत्वा (Kritva):** करके।
- **तदा (Tada):** तब।
- **स्थितिः (Sthitih):** स्थिति (शांति)।

#### भावार्थ:
जब तक "मैं" और "मेरा" का भाव आत्मा में उठता है, तब तक मन को निराधार (Supportless) कर दें (उस भाव को न पकड़ें)। ऐसा करने से शांति (स्थिति) मिलती है।

#### WWWH Framework:
- **What:** ईगो डिसोल्यूशन।
- **Why:** "मैं" एक विचार है। अगर आप इसे ऊर्जा (Attention) न दें, तो यह मर जाएगा।
- **When:** जब अहंकार सिर उठाए।
- **How:** "मैं" का विचार आया। उसे इग्नोर कर दें। जैसे आकाश बादलों को इग्नोर करता है।

---

### विधि 112: पूर्णता (Completeness)

> **नित्यः पूर्णः प्रकाशोऽहं सत्तामात्रस्वरूपकः।**
> **इति विश्रान्तिमासाद्य भवति स्थिरधीः पुमान् ॥१३५॥**
> *(Nityah purnah prakasho aham sattamatra svarupakah |*
> *Iti vishrantim asadya bhavati sthiradhih puman || 135 ||)*

#### शब्दार्थ:
- **नित्यः (Nityah):** नित्य/शाश्वत।
- **पूर्णः (Purnah):** पूर्ण।
- **प्रकाशोऽहं (Prakasho aham):** मैं प्रकाश स्वरूप हूँ।
- **सत्तामात्र (Sattamatra):** केवल अस्तित्व।
- **स्वरूपकः (Svarupakah):** स्वरूप वाला।
- **इति (Iti):** इस प्रकार।
- **विश्रान्तिम् (Vishrantim):** विश्राम/शांति।
- **आसाद्य (Asadya):** प्राप्त होकर/पाकर।
- **भवति (Bhavati):** हो जाता है।
- **स्थिरधीः (Sthiradhih):** स्थिर बुद्धि वाला।
- **पुमान् (Puman):** पुरुष/साधक।

#### भावार्थ:
"मैं नित्य हूँ, पूर्ण हूँ, प्रकाश स्वरूप हूँ और केवल सत्ता (Pure Existence) मात्र हूँ" - इस प्रकार विश्राम (Relaxation) को प्राप्त होकर योगी स्थिर बुद्धि वाला हो जाता है।

#### WWWH Framework:
- **What:** द फाइनल ट्रुथ।
- **Why:** आप कुछ "बनने" की कोशिश कर रहे हैं, जबकि आप पहले से ही "पूर्ण" हैं।
- **When:** साधना के अंत में।
- **How:** कुछ मत करो। बस जानो - "मैं हूँ"। (Just Be).

---

## निष्कर्ष (Conclusion)

विज्ञान भैरव तंत्र की ये 112 विधियां केवल पढ़ने के लिए नहीं, बल्कि जीने के लिए हैं। शिव कहते हैं कि इनमें से **कोई भी एक विधि** (जो आपके स्वभाव के अनुकूल हो) यदि पूरी निष्ठा और गहराई से साधी जाए, तो वह आपको परम चेतना (भैरव अवस्था) तक ले जाने में सक्षम है।

यह ग्रंथ धर्म या संप्रदाय से परे है। यह शुद्ध विज्ञान (Pure Science) है - चेतना के रूपांतरण का विज्ञान।

**शुभम भवतु!**

# पतंजलि योग सूत्र (Patanjali Yoga Sutras)

यह दस्तावेज महर्षि पतंजलि द्वारा रचित योग सूत्रों का संकलन है। यहाँ हर सूत्र को **शब्दार्थ**, **भावार्थ** और **WWWH (What, Why, When, How)** फ्रेमवर्क के माध्यम से समझाया गया है ताकि इसे आधुनिक जीवन में आसानी से अपनाया जा सके।

---

## समाधि पाद (Samadhi Pada) - अध्याय 1

### सूत्र 1.1: योग का आरंभ

> **अथ योगानुशासनम् ॥१॥**
> *(Atha yoganushasanam)*

#### शब्दार्थ (Word Meaning):
- **अथ (Atha):** अब (Now/Here begins) - एक मंगल सूचक शब्द जो आरंभ का प्रतीक है।
- **योग (Yoga):** योग (Union/Integration) - जुड़ना या समाधि।
- **अनुशासनम् (Anushasanam):** अनुशासन (Discipline/Instruction) - वह ज्ञान जो पहले से मौजूद है, उसे व्यवस्थित रूप में प्रस्तुत करना।

#### भावार्थ (Meaning):
अब योग का अनुशासन (उपदेश) आरंभ होता है। यह केवल एक किताब पढ़ना नहीं है, बल्कि जीवन को एक अनुशासन में ढालने की शुरुआत है। यह उन लोगों के लिए है जो मानसिक और आध्यात्मिक रूप से तैयार हैं।

#### WWWH Framework:
- **What (क्या):** यह अपने जीवन को अनुशासित करने और स्वयं को जानने की यात्रा की शुरुआत है।
- **Why (क्यों):** बिखरे हुए मन और जीवन को व्यवस्थित करने के लिए। बिना अनुशासन के कोई भी सिद्धि या शांति संभव नहीं है।
- **When (कब):** 'अथ' का अर्थ है 'अभी'। जब भी आपको लगे कि बाहरी दुनिया से सुख नहीं मिल रहा और आप भीतर की ओर मुड़ना चाहते हैं, तभी योग शुरू होता है।
- **How (कैसे):**
  - संकल्प लें कि आप अपने शारीरिक और मानसिक स्वास्थ्य के प्रति गंभीर हैं।
  - एक दिनचर्या (Routine) बनाएं और उसका पालन करें।

---

### सूत्र 1.2: योग की परिभाषा

> **योगश्चित्तवृत्तिनिरोधः ॥२॥**
> *(Yogas chitta vritti nirodhah)*

#### शब्दार्थ (Word Meaning):
- **योगः (Yogah):** योग।
- **चित्त (Chitta):** मन/अंतःकरण (Mind/Consciousness) - जिसमें मन, बुद्धि और अहंकार शामिल हैं।
- **वृत्ति (Vritti):** लहरें/विचार/हलचल (Fluctuations/Modifications) - मन में उठने वाले विचार।
- **निरोधः (Nirodhah):** रोकना/नियंत्रण (Restraint/Cessation) - पूरी तरह से शांत हो जाना।

#### भावार्थ (Meaning):
चित्त (मन) की वृत्तियों (विचारों की लहरों) को पूरी तरह से रोक देना या शांत कर देना ही योग है। जब मन शांत होता है, तभी हम अपनी वास्तविक प्रकृति को देख पाते हैं।

#### WWWH Framework:
- **What (क्या):** मन में लगातार चलने वाले विचारों की भीड़ को शांत करना।
- **Why (क्यों):** क्योंकि अशांत मन में हम वास्तविकता को नहीं देख सकते, जैसे हिलते हुए पानी में अपना प्रतिबिंब नहीं दिखता। शांति और स्पष्टता के लिए यह जरूरी है।
- **When (कब):** हर समय, विशेषकर जब आप तनाव, क्रोध या चिंता में हों।
- **How (कैसे):**
  - **साक्षी भाव (Witnessing):** अपने विचारों को बिना जज किए देखें।
  - **प्राणायाम:** सांसों पर ध्यान केंद्रित करके मन को स्थिर करें।
  - **त्राटक:** किसी एक बिंदु पर ध्यान लगाकर मन की भटकन रोकें।

---

### सूत्र 1.3: स्वयं की स्थिति

> **तदा द्रष्टुः स्वरूपेऽवस्थानम् ॥३॥**
> *(Tada drashtuh svarupe avasthanam)*

#### शब्दार्थ (Word Meaning):
- **तदा (Tada):** तब (Then) - जब मन शांत हो जाता है (निरोध की अवस्था में)।
- **द्रष्टुः (Drashtuh):** देखने वाला/साक्षी/आत्मा (The Seer/Witness).
- **स्वरूपे (Svarupe):** अपने निज रूप में (In his own nature).
- **अवस्थानम् (Avasthanam):** स्थित हो जाता है (Is established).

#### भावार्थ (Meaning):
जब चित्त की वृत्तियां शांत हो जाती हैं, तब दृष्टा (आत्मा/साक्षी) अपने वास्तविक स्वरूप में स्थित हो जाता है। तब हम यह नहीं सोचते कि "मैं शरीर हूँ" या "मैं मन हूँ", बल्कि हम शुद्ध चेतना का अनुभव करते हैं।

#### WWWH Framework:
- **What (क्या):** अपनी असली पहचान (Self-Realization) को जानना।
- **Why (क्यों):** दुखों से मुक्ति पाने के लिए। जब हम खुद को बाहरी चीजों से अलग समझते हैं, तो बाहरी उथल-पुथल हमें परेशान नहीं करती।
- **When (कब):** ध्यान की गहरी अवस्था में या जब आप पूर्णतः वर्तमान क्षण में हों।
- **How (कैसे):**
  - "मैं कौन हूँ?" (Self-Enquiry) का विचार करें।
  - ध्यान के दौरान जब विचार शून्य हो जाएं, उस सन्नाटे (Silence) को महसूस करें।

---

### सूत्र 1.4: भटकाव की स्थिति

> **वृत्तिसारूप्यमितरत्र ॥४॥**
> *(Vritti sarupyam itaratra)*

#### शब्दार्थ (Word Meaning):
- **वृत्ति (Vritti):** विचार/मन की हलचल।
- **सारूप्यम् (Sarupyam):** एक जैसा रूप होना/पहचान कर लेना (Identification with).
- **इतरत्र (Itaratra):** दूसरी अवस्थाओं में/इसके अलावा (At other times).

#### भावार्थ (Meaning):
जब हम योग (समाधि) की स्थिति में नहीं होते, तब हम अपनी वृत्तियों (विचारों) के साथ एकरूप हो जाते हैं। अगर मन में क्रोध है, तो हम सोचते हैं "मैं क्रोधी हूँ"। अगर मन में दुख है, तो हम सोचते हैं "मैं दुखी हूँ"। हम भूल जाते हैं कि हम केवल देखने वाले (साक्षी) हैं।

#### WWWH Framework:
- **What (क्या):** विचारों और भावनाओं के साथ खुद को मिला लेना (False Identification)।
- **Why (क्यों):** यही अज्ञान और दुख का मुख्य कारण है। हम फिल्म के पात्र के साथ इतना जुड़ जाते हैं कि उसके दुख में रोने लगते हैं।
- **When (कब):** सामान्य जाग्रत अवस्था में, जब हम बेहोशी में जीते हैं।
- **How (कैसे):**
  - **Detachment:** जब गुस्सा आए, तो कहें "मेरे मन में गुस्सा आ रहा है" न कि "मैं गुस्सा हूँ"।
  - अपने आप को अपने विचारों से अलग (Disidentify) करने का अभ्यास करें।

---



---

### सूत्र 1.5: वृत्तियों के प्रकार

> **वृत्तयः पञ्चतय्यः क्लिष्टाक्लिष्टाः ॥५॥**
> *(Vrittayah panchatayyah klishta aklishtah)*

#### शब्दार्थ:
- **वृत्तयः (Vrittayah):** मन की वृत्तियां।
- **पञ्चतय्यः (Panchatayyah):** पांच प्रकार की।
- **क्लिष्टा (Klishta):** दुख देने वाली (Painful/Detrimental).
- **अक्लिष्टाः (Aklishtah):** दुख न देने वाली (Not painful/Beneficial).

#### भावार्थ:
मन की वृत्तियां पांच प्रकार की होती हैं। इनमें से कुछ क्लिष्ट (दुखदायी, जो अज्ञान बढ़ाती हैं) होती हैं और कुछ अक्लिष्ट (सुखदायी, जो मुक्ति की ओर ले जाती हैं)।

#### WWWH Framework:
- **What:** विचारों का वर्गीकरण।
- **Why:** यह समझने के लिए कि कौन से विचार हमें बांधते हैं और कौन से मुक्त करते हैं।
- **When:** जब भी कोई विचार मन में आए।
- **How:** अपने विचारों को लेबल करें - क्या यह विचार मुझे तनाव दे रहा है (क्लिष्ट) या शांति (अक्लिष्ट)?

---

### सूत्र 1.6: पांच वृत्तियां

> **प्रमाणविपर्ययविकल्पनिद्रास्मृतयः ॥६॥**
> *(Pramana viparyaya vikalpa nidra smritayah)*

#### शब्दार्थ:
- **प्रमाण (Pramana):** सही ज्ञान (Right Knowledge).
- **विपर्यय (Viparyaya):** गलत ज्ञान (Misconception).
- **विकल्प (Vikalpa):** कल्पना (Verbal Delusion/Imagination).
- **निद्रा (Nidra):** नींद (Sleep).
- **स्मृतयः (Smritayah):** यादें (Memory).

#### भावार्थ:
ये पांच वृत्तियां हैं: प्रमाण (सही ज्ञान), विपर्यय (गलत फहमी), विकल्प (कोरी कल्पना), निद्रा (नींद), और स्मृति (यादें)। हमारा मन इन्हीं पांचों में उलझा रहता है।

#### WWWH Framework:
- **What:** मन की गतिविधियों की पहचान।
- **Why:** मन को शांत करने के लिए पहले यह जानना जरूरी है कि वह कर क्या रहा है।
- **When:** आत्म-निरीक्षण (Introspection) के समय।
- **How:** देखें कि अभी मन क्या कर रहा है? क्या वह पुरानी यादों (स्मृति) में है या भविष्य की कल्पना (विकल्प) में?

---

### सूत्र 1.7: प्रमाण (सही ज्ञान)

> **प्रत्यक्षानुमानागमाः प्रमाणानि ॥७॥**
> *(Pratyaksha anumana agamah pramanani)*

#### शब्दार्थ:
- **प्रत्यक्ष (Pratyaksha):** जो सामने दिख रहा है (Direct perception).
- **अनुमान (Anumana):** तर्क/अंदाजा (Inference).
- **आगमाः (Agamah):** शास्त्र/विश्वसनीय वचन (Testimony/Scriptures).
- **प्रमाणानि (Pramanaani):** ये तीन प्रमाण हैं।

#### भावार्थ:
सही ज्ञान तीन तरीकों से मिलता है: 1. खुद देखकर (प्रत्यक्ष), 2. तर्क या लक्षणों से समझकर (अनुमान), और 3. किसी ज्ञानी या शास्त्र की बात मानकर (आगम)।

#### WWWH Framework:
- **What:** सत्य को जानने के 3 रास्ते।
- **Why:** भ्रम से बचने के लिए हमें सबूत चाहिए।
- **When:** जब किसी बात पर शक हो।
- **How:** चेक करें - क्या मैंने खुद देखा? क्या यह लॉजिकल है? क्या किसी समझदार ने कहा है?

---

### सूत्र 1.8: विपर्यय (गलत ज्ञान)

> **विपर्ययो मिथ्याज्ञानमतद्रूपप्रतिष्ठम् ॥८॥**
> *(Viparyayo mithya jnanam atad rupa pratishtham)*

#### शब्दार्थ:
- **विपर्ययः (Viparyayah):** गलत समझ।
- **मिथ्याज्ञानम् (Mithya jnanam):** झूठा ज्ञान।
- **अतद्रूप (Atad rupa):** जो उसका असली रूप नहीं है।
- **प्रतिष्ठम् (Pratishtham):** उस पर आधारित।

#### भावार्थ:
किसी चीज को वह समझना जो वह नहीं है, विपर्यय है। जैसे अंधेरे में रस्सी को सांप समझ लेना।

#### WWWH Framework:
- **What:** गलतफहमी (Misunderstanding).
- **Why:** यह डर और क्लेश पैदा करता है।
- **When:** जब हम जल्दबाजी में निष्कर्ष निकालते हैं।
- **How:** अपनी धारणाओं (Assumptions) पर सवाल उठाएं। क्या मैं जो सोच रहा हूँ वह सच है?

---

### सूत्र 1.9: विकल्प (कोरी कल्पना)

> **शब्दज्ञानानुपाती वस्तुशून्यो विकल्पः ॥९॥**
> *(Shabda jnana anupati vastu shunyo vikalpah)*

#### शब्दार्थ:
- **शब्दज्ञान (Shabda jnana):** शब्दों के ज्ञान पर चलने वाला।
- **अनुपाती (Anupati):** अनुसरण करने वाला।
- **वस्तुशून्यः (Vastu shunyah):** वास्तविकता से खाली।
- **विकल्पः (Vikalpah):** कल्पना।

#### भावार्थ:
जो केवल शब्दों के जाल से पैदा हो, लेकिन जिसका वास्तव में कोई अस्तित्व न हो, वह विकल्प है। जैसे "खरगोश के सींग" - शब्द हैं, पर वास्तविकता नहीं।

#### WWWH Framework:
- **What:** ख्याली पुलाव या बेबुनियाद बातें।
- **Why:** हम अक्सर ऐसी चीजों से डरते या खुश होते हैं जो हैं ही नहीं (जैसे भविष्य की चिंता)।
- **When:** जब मन "अगर ऐसा हो गया तो..." (What if) में फंसा हो।
- **How:** वर्तमान में लौटें। सोचें कि क्या यह अभी वास्तव में हो रहा है?

---

### सूत्र 1.10: निद्रा (नींद)

> **अभावप्रत्ययालम्बना वृत्तिर्निद्रा ॥१०॥**
> *(Abhava pratyaya alambana vrittir nidra)*

#### शब्दार्थ:
- **अभाव (Abhava):** न होना/शून्यता (Absence).
- **प्रत्यय (Pratyaya):** ज्ञान/अनुभव।
- **आलम्बना (Alambana):** सहारा लेने वाली।
- **वृत्तिः (Vrittih):** विचार।
- **निद्रा (Nidra):** नींद।

#### भावार्थ:
जागने और सपने के विचारों के अभाव (Absence) का सहारा लेने वाली वृत्ति नींद है। नींद में भी मन पूरी तरह खत्म नहीं होता, बस "कुछ नहीं है" के विचार में लीन हो जाता है (इसलिए उठने पर याद रहता है कि "मैं अच्छे से सोया")।

#### WWWH Framework:
- **What:** अचेतन अवस्था।
- **Why:** शरीर और मन के रिचार्ज के लिए। लेकिन यह भी एक वृत्ति है जिसे समाधि में पार करना होता है।
- **When:** रात को सोते समय।
- **How:** इसे तामसिक (आलस्य) न बनने दें। गहरी और समय पर नींद लें।

---

### सूत्र 1.11: स्मृति (यादें)

> **अनुभूतविषयासंप्रमोषः स्मृतिः ॥११॥**
> *(Anubhuta vishaya asampramoshah smritih)*

#### शब्दार्थ:
- **अनुभूत (Anubhuta):** अनुभव किए हुए।
- **विषय (Vishaya):** विषय/बातें।
- **असंप्रमोषः (Asampramoshah):** न चुराना/न खोना (Not letting go/stealing back).
- **स्मृतिः (Smritih):** याद।

#### भावार्थ:
अनुभव की गई बातों को मन से न खोना (उन्हें फिर से याद करना) स्मृति है।

#### WWWH Framework:
- **What:** पुरानी रिकॉर्डिंग प्ले करना।
- **Why:** अच्छे काम के लिए जरूरी है, लेकिन बुरे अनुभवों की स्मृति दुख देती है।
- **When:** खाली समय में अक्सर यादें आती हैं।
- **How:** बुरी यादों को पकड़कर न रखें। उन्हें बादल की तरह गुजरने दें।

---

### सूत्र 1.12: अभ्यास और वैराग्य (उपाय)

> **अभ्यासवैराग्याभ्यां तन्निरोधः ॥१२॥**
> *(Abhyasa vairagyabhyam tannirodhah)*

#### शब्दार्थ (Word Meaning):
- **अभ्यास (Abhyasa):** निरंतर कोशिश/प्रैक्टिस (Practice).
- **वैराग्य (Vairagya):** अनासक्ति/छोड़ना (Dispassion/Non-attachment).
- **आभ्याम् (Abhyam):** इन दोनों के द्वारा (By these two).
- **तत् (Tat):** उनका (वृत्तियों का)।
- **निरोधः (Nirodhah):** रुकना/नियंत्रण (Restraint).

#### भावार्थ (Meaning):
मन की वृत्तियों को रोकने (योग सिद्ध करने) के दो ही मुख्य उपाय हैं: **अभ्यास** और **वैराग्य**। अभ्यास का मतलब है मन को स्थिर करने की लगातार कोशिश करना, और वैराग्य का मतलब है विषयों (भोग-विलास) के प्रति आकर्षण को हटाना।

#### WWWH Framework:
- **What (क्या):** मन को काबू करने के दो शक्तिशाली हथियार - निरंतर प्रयास और अनासक्ति।
- **Why (क्यों):** अभ्यास के बिना स्थिरता नहीं आती और वैराग्य के बिना मन बार-बार विषयों की ओर भागता है। ये दोनों पक्षी के दो पंखों की तरह हैं।
- **When (कब):** हर रोज, हर पल।
- **How (कैसे):**
  - **अभ्यास:** रोज एक ही समय पर बैठकर ध्यान या प्राणायाम करें, चाहे मन लगे या न लगे।
  - **वैराग्य:** अपनी इच्छाओं का विश्लेषण करें। क्या यह वस्तु मुझे स्थायी सुख देगी? अगर नहीं, तो उसके प्रति पागलपन छोड़ें।

---

### सूत्र 1.13: अभ्यास का स्वरूप

> **तत्र स्थितौ यत्नोऽभ्यासः ॥१३॥**
> *(Tatra sthitau yatno abhyasah)*

#### शब्दार्थ:
- **तत्र (Tatra):** उनमें (उन दोनों में से)।
- **स्थितौ (Sthitau):** स्थिरता के लिए (For stability).
- **यत्नः (Yatnah):** प्रयत्न/कोशिश (Effort).
- **अभ्यासः (Abhyasah):** अभ्यास है (Practice).

#### भावार्थ:
मन की चंचलता को रोककर उसे स्थिर रखने के लिए जो बार-बार प्रयत्न किया जाता है, उसे अभ्यास कहते हैं।

#### WWWH Framework:
- **What:** मन को बार-बार वापस लाने की कोशिश।
- **Why:** क्योंकि मन का स्वभाव भागना है, उसे टिकाने के लिए बलपूर्वक प्रयास (Willpower) चाहिए।
- **When:** जब भी मन ध्यान से भटके।
- **How:** जैसे ही ध्यान भटके, उसे प्यार से या दृढ़ता से वापस लक्ष्य पर लाएं।

---

### सूत्र 1.14: अभ्यास की दृढ़ता

> **स तु दीर्घकालनैरन्तर्यसत्कारासेवितो दृढभूमिः ॥१४॥**
> *(Sa tu dirghakala nairantarya satkara asevito dridhabhumih)*

#### शब्दार्थ:
- **स (Sa):** वह (अभ्यास)।
- **तु (Tu):** लेकिन/निश्चित ही।
- **दीर्घकाल (Dirghakala):** लंबे समय तक।
- **नैरन्तर्य (Nairantarya):** बिना रुके/लगातार (Uninterrupted).
- **सत्कार (Satkara):** आदर/श्रद्धा के साथ (With devotion/sincerity).
- **आसेवितः (Asevitah):** किया गया (Practiced).
- **दृढभूमिः (Dridhabhumih):** मजबूत नींव वाला (Firmly grounded).

#### भावार्थ:
वह अभ्यास तभी पक्का (दृढ़) होता है जब उसे **लंबे समय तक**, **बिना रुके (निरंतर)**, और **पूरे आदर/श्रद्धा** के साथ किया जाए।

#### WWWH Framework:
- **What:** सफलता का फॉर्मूला - समय + निरंतरता + श्रद्धा।
- **Why:** दो-चार दिन करके छोड़ने से कोई लाभ नहीं होता। आदत बदलने में समय लगता है।
- **When:** किसी भी नई आदत या स्किल को सीखते समय।
- **How:**
  - **दीर्घकाल:** धैर्य रखें, परिणाम तुरंत नहीं मिलेंगे।
  - **नैरन्तर्य:** रोज करें, छुट्टी न लें।
  - **सत्कार:** बेमन से नहीं, पूरे उत्साह और विश्वास से करें।

### सूत्र 1.15: वैराग्य (Dispassion)

> **दृष्टानुश्रविकविषयवितृष्णस्य वशीकारसंज्ञा वैराग्यम् ॥१५॥**
> *(Drishta anushravika vishaya vitrishnasya vashikara sanjna vairagyam)*

#### शब्दार्थ:
- **दृष्ट (Drishta):** देखे हुए (संसार के सुख)।
- **आनुश्रविक (Anushravika):** सुने हुए (स्वर्ग आदि के सुख)।
- **विषय (Vishaya):** भोग।
- **वितृष्णस्य (Vitrishnasya):** तृष्णा (प्यास) रहित।
- **वशीकार (Vashikara):** वश में करना/मास्टरी।
- **संज्ञा (Sanjna):** ज्ञान/अवस्था।

#### भावार्थ:
इस लोक के (धन, काम) और परलोक के (स्वर्ग) - सभी देखे और सुने हुए भोगों के प्रति लालच का पूरी तरह खत्म हो जाना और मन का वश में हो जाना वैराग्य है।

#### WWWH Framework:
- **What:** इच्छाओं की गुलामी से आजादी।
- **Why:** इच्छाएं मन को भटकाती हैं। जब तक मन बाहर सुख ढूंढेगा, वह भीतर स्थिर नहीं होगा।
- **When:** जब मन किसी चीज के लिए बहुत ललचाए।
- **How:** याद रखें कि हर बाहरी सुख अस्थायी है और अंत में दुख देता है।

---

### सूत्र 1.16: पर-वैराग्य (Highest Detachment)

> **तत्परं पुरुषख्यातेर्गुणवैतृष्ण्यम् ॥१६॥**
> *(Tatparam purusha khyater guna vaitrishnyam)*

#### शब्दार्थ:
- **तत्परं (Tatparam):** वह सर्वोच्च (वैराग्य)।
- **पुरुषख्यातेः (Purusha khyateh):** पुरुष (आत्मा) के ज्ञान से।
- **गुणवैतृष्ण्यम् (Guna vaitrishnyam):** गुणों (सत्व, रज, तम) के प्रति भी तृष्णा न रहना।

#### भावार्थ:
जब आत्मा का ज्ञान हो जाता है, तब प्रकृति के गुणों (सत्व, रज, तम) से भी कोई लगाव नहीं रहता। यह सबसे ऊँचा वैराग्य है।

#### WWWH Framework:
- **What:** पूर्ण स्वतंत्रता।
- **Why:** साधारण वैराग्य में हम बुरी चीजों को छोड़ते हैं, पर-वैराग्य में हम "होने" के भाव से भी ऊपर उठ जाते हैं।
- **When:** समाधि की उच्च अवस्था में।
- **How:** "मैं शरीर या मन नहीं, शुद्ध चेतना हूँ" - इस भाव में स्थित होकर।

### सूत्र 1.17: संप्रज्ञात समाधि

> **वितर्कविचारानन्दास्मितारूपानुगमात् संप्रज्ञातः ॥१७॥**
> *(Vitarka vichara ananda asmita rupa anugamat samprajnatah)*

#### शब्दार्थ:
- **वितर्क (Vitarka):** तर्क/स्थूल विचार।
- **विचार (Vichara):** सूक्ष्म विचार।
- **आनन्द (Ananda):** खुशी/हर्ष।
- **अस्मिता (Asmita):** "मैं हूँ" का भाव।
- **संप्रज्ञातः (Samprajnatah):** संप्रज्ञात समाधि (जिसमें आलंबन/सहारा रहता है)।

#### भावार्थ:
जब ध्यान किसी वस्तु (वितर्क), सूक्ष्म तत्व (विचार), आनंद, या अस्मिता (होने का भाव) पर टिका होता है, तो उसे संप्रज्ञात समाधि कहते हैं। इसमें अभी भी "ज्ञाता" और "ज्ञेय" का भेद रहता है।

#### WWWH Framework:
- **What:** सविकल्प समाधि (Focus with support).
- **Why:** मन को सीधे शून्य करना मुश्किल है, इसलिए पहले उसे किसी उच्च विचार पर टिकाते हैं।
- **When:** ध्यान की शुरुआती और मध्यम अवस्था में।
- **How:** किसी मंत्र, मूर्ति, या श्वास पर पूर्ण एकाग्रता।

---

### सूत्र 1.18: असंप्रज्ञात समाधि

> **विरामप्रत्ययाभ्यासपूर्वः संस्कारशेषोऽन्यः ॥१८॥**
> *(Virama pratyaya abhyasa purvah samskara shesho anyah)*

#### शब्दार्थ:
- **विराम (Virama):** रुक जाना।
- **प्रत्यय (Pratyaya):** विचार।
- **अभ्यासपूर्वः (Abhyasa purvah):** अभ्यास के बाद।
- **संस्कारशेषः (Samskara sheshah):** केवल संस्कार बचे रहना।
- **अन्यः (Anyah):** दूसरी (असंप्रज्ञात समाधि)।

#### भावार्थ:
जब सभी विचार (प्रत्यय) रुक जाते हैं और केवल पुराने संस्कार (बीज) शेष रह जाते हैं, वह असंप्रज्ञात समाधि है। यह पूर्ण शून्यता की ओर ले जाती है।

#### WWWH Framework:
- **What:** निर्विचार समाधि (Thoughtless awareness).
- **Why:** असली मुक्ति विचारों के पार है।
- **When:** गहरे ध्यान में जब आलंबन भी छूट जाए।
- **How:** "नेति-नेति" (यह नहीं, यह नहीं) के अभ्यास से मन को पूरी तरह शांत करके।

---

### सूत्र 1.19: भवप्रत्यय (Videha)

> **भवप्रत्ययो विदेहप्रकृतिलयानाम् ॥१९॥**
> *(Bhava pratyayo videha prakriti layanam)*

#### शब्दार्थ:
- **भवप्रत्ययः (Bhava pratyayah):** जन्म से ही प्राप्त।
- **विदेह (Videha):** शरीर रहित (देवता आदि)।
- **प्रकृतिलयानाम् (Prakriti layanam):** जो प्रकृति में लीन हो गए हैं।

#### भावार्थ:
कुछ लोग (विदेह और प्रकृतिलय) बिना योग अभ्यास के ही इस अवस्था में होते हैं, लेकिन यह उनकी पूर्ण मुक्ति नहीं है, वे पुनर्जन्म के चक्र में आ सकते हैं। असली योगी अभ्यास से आगे बढ़ता है।

#### WWWH Framework:
- **What:** प्राकृतिक समाधि (Natural state for some beings).
- **Why:** यह बताने के लिए कि केवल "शरीर भूल जाना" काफी नहीं है, विवेक (Wisdom) जरूरी है।
- **When:** तुलनात्मक अध्ययन के लिए।
- **How:** हमें इसकी नकल नहीं करनी है, हमें सूत्र 1.20 (श्रद्धा, वीर्य...) का मार्ग अपनाना है।

---

### सूत्र 1.20: साधक के गुण

> **श्रद्धावीर्यस्मृतिसमाधिप्रज्ञापूर्वक इतरेषाम् ॥२०॥**
> *(Shraddha virya smriti samadhi prajna purvaka itaresham)*

#### शब्दार्थ:
- **श्रद्धा (Shraddha):** विश्वास/आस्था (Faith).
- **वीर्य (Virya):** ऊर्जा/बल (Vigor/Energy).
- **स्मृति (Smriti):** याद रखना/लक्ष्य का स्मरण (Memory/Mindfulness).
- **समाधि (Samadhi):** एकाग्रता (Deep Concentration).
- **प्रज्ञा (Prajna):** विवेक/बुद्धि (Wisdom).

#### भावार्थ:
योगियों (साधकों) को सफलता इन पांच चीजों से मिलती है: श्रद्धा (लक्ष्य में विश्वास), वीर्य (उत्साह), स्मृति (बार-बार लक्ष्य को याद करना), समाधि (एकाग्रता), और प्रज्ञा (सही समझ)।

#### WWWH Framework:
- **What:** सफलता के 5 स्तंभ।
- **Why:** अगर श्रद्धा नहीं होगी तो ऊर्जा (वीर्य) नहीं आएगी। ऊर्जा नहीं होगी तो मन टिकेगा नहीं।
- **When:** जब भी आप निराश (Demotivated) महसूस करें।
- **How:** चेक करें कि किस चीज की कमी है? क्या विश्वास डगमगा गया है या आलस्य (ऊर्जा की कमी) आ गया है?

---

### सूत्र 1.21: सफलता की गति

> **तीव्रसंवेगानामासन्नः ॥२१॥**
> *(Tivra samveganam asannah)*

#### शब्दार्थ:
- **तीव्र (Tivra):** तेज/प्रचंड (Intense).
- **संवेगानाम् (Samveganam):** वेग/लगन वालों के लिए (For those with intense urge).
- **आसन्नः (Asannah):** बहुत पास है (Is very near).

#### भावार्थ:
जिनकी लगन और अभ्यास बहुत तीव्र होता है, उन्हें समाधि (सफलता) बहुत जल्दी मिलती है।

#### WWWH Framework:
- **What:** तीव्रता का महत्व।
- **Why:** ढीले-ढाले प्रयासों से योग सिद्ध नहीं होता।
- **When:** अभ्यास करते समय।
- **How:** अपने प्रयास में पूरी जान लगा दें (100% Commitment)।

### सूत्र 1.22: साधकों के स्तर

> **मृदुमध्याधिमात्रत्वात्ततोऽपि विशेषः ॥२२॥**
> *(Mridu madhya adhimatratvat tato api visheshah)*

#### शब्दार्थ:
- **मृदु (Mridu):** मंद (Mild).
- **मध्य (Madhya):** मध्यम (Medium).
- **अधिमात्र (Adhimatra):** तीव्र (Intense).
- **त्वात् (Tvat):** होने के कारण।
- **ततः अपि (Tatah api):** उससे भी।
- **विशेषः (Visheshah):** अंतर/भेद (Difference).

#### भावार्थ:
साधकों के प्रयास के अनुसार तीन स्तर होते हैं: मंद, मध्यम और तीव्र। इसी के अनुसार फल मिलने में भी अंतर होता है।

#### WWWH Framework:
- **What:** अपनी कैटेगरी पहचानना।
- **Why:** ताकि हम जान सकें कि हम कहाँ खड़े हैं और हमें कितनी मेहनत और करनी है।
- **When:** आत्म-मूल्यांकन (Self-evaluation) करते समय।
- **How:** खुद से पूछें - क्या मैं "मृदु" (कभी-कभी करने वाला) हूँ या "अधिमात्र" (जुनूनी) हूँ?

### सूत्र 1.23: ईश्वर प्रणिधान (Short cut)

> **ईश्वरप्रणिधानाद्वा ॥२३॥**
> *(Ishvara pranidhanad va)*

#### शब्दार्थ:
- **ईश्वर (Ishvara):** परमात्मा।
- **प्रणिधानात् (Pranidhanat):** भक्ति/समर्पण से (By devotion/surrender).
- **वा (Va):** अथवा (Or).

#### भावार्थ:
या फिर, ईश्वर के प्रति पूर्ण समर्पण (भक्ति) से भी समाधि शीघ्र प्राप्त हो सकती है।

#### WWWH Framework:
- **What:** समर्पण का मार्ग (Bhakti Yoga).
- **Why:** जब हम अपना अहंकार (Ego) ईश्वर को सौंप देते हैं, तो मन तुरंत शांत हो जाता है।
- **When:** जब अपनी मेहनत से बात न बने या मन बहुत भारी हो।
- **How:** "हे ईश्वर, मैं तेरा हूँ, सब तेरा है" - इस भाव में जिएं।

### सूत्र 1.24: ईश्वर कौन है?

> **क्लेशकर्मविपाकाशयैरपरामृष्टः पुरुषविशेष ईश्वरः ॥२४॥**
> *(Klesha karma vipaka ashayair aparamrishtah purusha vishesha ishvarah)*

#### शब्दार्थ:
- **क्लेश (Klesha):** दुख/अविद्या आदि।
- **कर्म (Karma):** अच्छे-बुरे काम।
- **विपाक (Vipaka):** कर्मफल।
- **आशयैः (Ashayaih):** संस्कारों के भंडार।
- **अपरामृष्टः (Aparamrishtah):** जो अछूता है/लिप्त नहीं है (Untouched).
- **पुरुषविशेषः (Purusha visheshah):** विशेष पुरुष (Special Self).
- **ईश्वरः (Ishvarah):** ईश्वर है।

#### भावार्थ:
जो क्लेश (दुख), कर्म, कर्मफल और संस्कारों से पूरी तरह मुक्त है, वह विशेष पुरुष (चेतना) ही ईश्वर है।

#### WWWH Framework:
- **What:** ईश्वर की परिभाषा।
- **Why:** ताकि हम किसी गलत चीज को ईश्वर न मान बैठें। ईश्वर कोई व्यक्ति नहीं, एक शुद्ध अवस्था है।
- **When:** ध्यान या प्रार्थना करते समय।
- **How:** ईश्वर को एक शुद्ध, मुक्त और सर्वोच्च चेतना के रूप में ध्याएं।

### सूत्र 1.25: सर्वज्ञता का बीज

> **तत्र निरतिशयं सर्वज्ञबीजम् ॥२५॥**
> *(Tatra niratishayam sarvajna bijam)*

#### शब्दार्थ:
- **तत्र (Tatra):** उसमें (ईश्वर में)।
- **निरतिशयं (Niratishayam):** जिससे ऊपर कुछ न हो (Unsurpassed).
- **सर्वज्ञबीजम् (Sarvajna bijam):** सब कुछ जानने का बीज (Seed of omniscience).

#### भावार्थ:
उस ईश्वर में ज्ञान की पराकाष्ठा है। वह सब कुछ जानता है और ज्ञान का आदि स्रोत है।

#### WWWH Framework:
- **What:** ज्ञान का स्रोत।
- **Why:** हम सीमित जानते हैं, ईश्वर असीमित जानता है।
- **When:** ज्ञान की खोज में।
- **How:** उस परम ज्ञान से जुड़ने की प्रार्थना करें।

### सूत्र 1.26: गुरुओं का गुरु

> **स पूर्वेषामपि गुरुः कालेनानवच्छेदात् ॥२६॥**
> *(Sa purvesham api guruh kalena anavacchedat)*

#### शब्दार्थ:
- **स (Sa):** वह (ईश्वर)।
- **पूर्वेषाम् (Purvesham):** पूर्वजों/प्राचीन ऋषियों का (Of the ancients).
- **अपि (Api):** भी।
- **गुरुः (Guruh):** गुरु/शिक्षक।
- **कालेन (Kalena):** समय से।
- **अनवच्छेदात् (Anavacchedat):** बंधा न होने के कारण (Not limited by time).

#### भावार्थ:
वह (ईश्वर) प्राचीन गुरुओं (ब्रह्मा, आदि) का भी गुरु है, क्योंकि वह समय (Time) से परे है। उसका कभी नाश नहीं होता।

#### WWWH Framework:
- **What:** आदि गुरु (The First Teacher).
- **Why:** इंसानी गुरु आते-जाते हैं, पर ईश्वरीय ज्ञान शाश्वत है।
- **When:** जब कोई बाहरी मार्गदर्शक न मिले।
- **How:** अपने भीतर बैठे उस "आदि गुरु" से मार्गदर्शन मांगें।

### सूत्र 1.27: ईश्वर का नाम (ॐ)

> **तस्य वाचकः प्रणवः ॥२७॥**
> *(Tasya vachakah pranavah)*

#### शब्दार्थ:
- **तस्य (Tasya):** उसका (ईश्वर का)।
- **वाचकः (Vachakah):** नाम/संकेत (Designator).
- **प्रणवः (Pranavah):** ॐ (Om).

#### भावार्थ:
उस ईश्वर का वाचक (नाम) 'ॐ' (प्रणव) है।

#### WWWH Framework:
- **What:** ब्रह्मांड की ध्वनि (Cosmic Sound).
- **Why:** ॐ कोई साधारण शब्द नहीं, यह अस्तित्व का कंपन (Vibration) है।
- **When:** ध्यान के समय।
- **How:** ॐ को केवल बोलें नहीं, उसके कंपन को महसूस करें।

### सूत्र 1.28: जप का तरीका

> **तज्जपस्तदर्थभावनम् ॥२८॥**
> *(Taj japas tad artha bhavanam)*

#### शब्दार्थ:
- **तत् (Tat):** उसका (ॐ का)।
- **जपः (Japah):** जप (Repetition).
- **तदर्थ (Tad artha):** उसका अर्थ (Meaning).
- **भावनम् (Bhavanam):** चिंतन/महसूस करना (Contemplation/Feeling).

#### भावार्थ:
उस (ॐ) का जप उसके अर्थ (ईश्वर के स्वरूप) को महसूस करते हुए करना चाहिए। तोता रटंत नहीं।

#### WWWH Framework:
- **What:** सही जप विधि।
- **Why:** बिना भावना के शब्द केवल शोर हैं। भावना से ही शक्ति आती है।
- **When:** मंत्र जप के समय।
- **How:** जब "ॐ" बोलें, तो सोचें कि आप उस परम शक्ति को पुकार रहे हैं और वह आप में भर रही है।

### सूत्र 1.29: जप का फल

> **ततः प्रत्यक्चेतनाधिगमोऽप्यन्तरायाभावश्च ॥२९॥**
> *(Tatah pratyak chetana adhigamo api antaraya abhavash cha)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (जप से)।
- **प्रत्यक्चेतना (Pratyak chetana):** अंतरात्मा (Inward consciousness).
- **अधिगमः (Adhigamah):** प्राप्ति/ज्ञान (Realization).
- **अपि (Api):** भी।
- **अन्तराय (Antaraya):** बाधाएं (Obstacles).
- **अभावः (Abhavah):** नाश (Absence).
- **च (Cha):** और।

#### भावार्थ:
उस (ईश्वर प्रणिधान/जप) से अंतरात्मा का ज्ञान होता है और मार्ग की सभी बाधाएं (Antarayas) दूर हो जाती हैं।

#### WWWH Framework:
- **What:** डबल फायदा - आत्मज्ञान + समस्याओं का अंत।
- **Why:** ईश्वर से जुड़ने पर छोटी-मोटी बाधाएं अपने आप हट जाती हैं।
- **When:** जब जीवन में रुकावटें आ रही हों।
- **How:** समस्याओं से लड़ने की बजाय ईश्वर पर ध्यान लगाएं, समस्याएं खुद सुलझ जाएंगी।

### सूत्र 1.30: 9 बाधाएं (Antarayas)

> **व्याधिस्त्यानसंशयप्रमादालस्याविरतिभ्रान्तिदर्शनालब्धभूमिकत्वानवस्थितत्वानि चित्तविक्षेपास्तेऽन्तरायाः ॥३०॥**
> *(Vyadhi styana samshaya pramada alasya avirati bhranti darshana alabdha bhumikatva anavasthitatvani chitta vikshepas te antarayah)*

#### शब्दार्थ:
- **व्याधि (Vyadhi):** बीमारी।
- **स्त्यान (Styana):** मानसिक जड़ता/मन न लगना।
- **संशय (Samshaya):** शक (Doubt).
- **प्रमाद (Pramada):** लापरवाही (Carelessness).
- **आलस्य (Alasya):** सुस्ती (Laziness).
- **अविरति (Avirati):** विषयों में आसक्ति (Craving).
- **भ्रान्तिदर्शन (Bhranti darshana):** गलत समझ (Delusion).
- **अलब्धभूमिकत्व (Alabdha bhumikatva):** स्थिति न मिलना (Failure to attain state).
- **अनवस्थितत्व (Anavasthitatva):** टिक न पाना (Instability).
- **चित्तविक्षेपाः (Chitta vikshepah):** मन के भटकाव।
- **ते अन्तरायाः (Te antarayah):** वे बाधाएं हैं।

#### भावार्थ:
योग मार्ग में ये 9 मुख्य बाधाएं हैं: बीमारी, मन का भारीपन, शक, लापरवाही, आलस्य, भोगों की प्यास, भ्रम, सफलता न मिलना, और मिली हुई सफलता पर टिक न पाना।

#### WWWH Framework:
- **What:** दुश्मनों की लिस्ट।
- **Why:** शत्रु को जाने बिना उसे हराया नहीं जा सकता।
- **When:** जब साधना में रुकावट आए।
- **How:** पहचानें कि अभी कौन रोक रहा है? क्या यह आलस्य है या शक? फिर उसका इलाज करें।

### सूत्र 1.31: बाधाओं के लक्षण

> **दुःखदौर्मनस्यांगमेजयत्वश्वासप्रश्वासा विक्षेपसहभुवः ॥३१॥**
> *(Duhkha daurmanasya angamejayatva shvasa prashvasa vikshepa sahabhuvah)*

#### शब्दार्थ:
- **दुःख (Duhkha):** दर्द।
- **दौर्मनस्य (Daurmanasya):** मन की उदासी/चिड़चिड़ापन (Despair).
- **अंगमेजयत्व (Angamejayatva):** शरीर का कांपना (Trembling of body).
- **श्वास-प्रश्वासा (Shvasa prashvasa):** सांस का उखड़ना (Irregular breathing).
- **विक्षेपसहभुवः (Vikshepa sahabhuvah):** विक्षेपों (बाधाओं) के साथी।

#### भावार्थ:
जब ऊपर बताई गई बाधाएं आती हैं, तो उनके साथ ये 4 लक्षण भी आते हैं: दुख, मन की निराशा, शरीर का कांपना, और सांसों का अनियंत्रित होना।

#### WWWH Framework:
- **What:** स्ट्रेस के लक्षण (Symptoms).
- **Why:** शरीर और सांसें मन की हालत बता देती हैं।
- **When:** डायग्नोसिस के लिए।
- **How:** अगर सांस उखड़ी हुई है या मन उदास है, तो समझ जाएं कि कोई "अंतराय" (बाधा) आ गया है।

### सूत्र 1.32: एक तत्व अभ्यास (Solution)

> **तत्प्रतिषेधार्थमेकतत्त्वाभ्यासः ॥३२॥**
> *(Tat pratishedha artham eka tattva abhyasah)*

#### शब्दार्थ:
- **तत् (Tat):** उनका (बाधाओं का)।
- **प्रतिषेधार्थम् (Pratishedha artham):** रोकने/हटाने के लिए।
- **एकतत्त्व (Eka tattva):** एक ही तत्व/विषय।
- **अभ्यासः (Abhyasah):** अभ्यास।

#### भावार्थ:
इन बाधाओं को दूर करने के लिए किसी **एक तत्व** (One Principle/Subject) का बार-बार अभ्यास करना चाहिए।

#### WWWH Framework:
- **What:** फोकस (Focus).
- **Why:** जब मन 10 जगह भागता है तो कमजोर होता है। जब एक जगह टिकता है तो लेजर जैसा शक्तिशाली हो जाता है।
- **When:** जब मन बहुत भटक रहा हो।
- **How:** कोई भी एक चीज चुनें (ईश्वर, सांस, गुरु, या कोई विचार) और बस उसी पर डटे रहें। बार-बार न बदलें।
