### सूत्र 3.51: देवताओं का निमंत्रण

> **स्थान्युपनिमन्त्रणे संगस्मयाकरणं पुनरनिष्टप्रसंगात् ॥५१॥**
> *(Sthani upanimantrane sanga smaya akaranam punah anishta prasangat)*

#### शब्दार्थ:
- **स्थानि (Sthani):** देवता/लोकपाल (Celestial beings).
- **उपनिमन्त्रणे (Upanimantrane):** बुलाने पर/निमंत्रण देने पर।
- **संग (Sanga):** आसक्ति (Attachment).
- **स्मय (Smaya):** गर्व (Pride).
- **अकरणम् (Akaranam):** न करना।
- **पुनः (Punah):** फिर से।
- **अनिष्ट (Anishta):** अनिष्ट/पतन (Fall).
- **प्रसंगात् (Prasangat):** संभावना होने से।

#### भावार्थ:
जब देवता (उच्च लोकों के प्राणी) योगी को बुलाएं या प्रलोभन दें, तो न तो आसक्ति (Attachment) करनी चाहिए और न ही गर्व (Pride), क्योंकि इससे दोबारा पतन (Fall) होने का डर रहता है।

#### WWWH Framework:
- **What:** फाइनल टेस्ट।
- **Why:** देवता योगी की परीक्षा लेते हैं।
- **When:** अंतिम लक्ष्य से पहले।
- **How:** स्वर्ग को भी "ना" कहें।

---

### सूत्र 3.52: क्षण संयम (Time Knowledge)

> **क्षणतत्क्रमयोः संयमाद्विवेकजं ज्ञानम् ॥५२॥**
> *(Kshana tat kramayoh samyamat vivekajam jnanam)*

#### शब्दार्थ:
- **क्षण (Kshana):** क्षण (Moment).
- **तत्क्रमयोः (Tat kramayoh):** उसके क्रम (Sequence) पर।
- **संयमात् (Samyamat):** संयम करने से।
- **विवेकजम् (Vivekajam):** विवेक से उत्पन्न (Born of discrimination).
- **ज्ञानम् (Jnanam):** ज्ञान।

#### भावार्थ:
क्षण (Moment) और उसके क्रम (Sequence) पर संयम करने से विवेक-जनित ज्ञान (Highest Knowledge) प्राप्त होता है।

#### WWWH Framework:
- **What:** टाइम ट्रेवल (Understanding Time).
- **Why:** समय क्षणों का एक सिलसिला है।
- **When:** वास्तविकता को समझने के लिए।
- **How:** समय की सबसे छोटी इकाई (वर्तमान क्षण) पर फोकस करें।

---

### सूत्र 3.53: भेद ज्ञान

> **जातिलक्षणदेशैरन्यतानवच्छेदात्तुल्ययोस्ततः प्रतिपत्तिः ॥५३॥**
> *(Jati lakshana deshaih anyata anavacchedat tulyayoh tatah pratipattih)*

#### शब्दार्थ:
- **जाति (Jati):** जाति (Species).
- **लक्षण (Lakshana):** लक्षण (Characteristic).
- **देशैः (Deshaih):** देश/स्थान (Place).
- **अन्यता (Anyata):** भेद।
- **अनवच्छेदात् (Anavacchedat):** अलग न किए जाने के कारण।
- **तुल्ययोः (Tulyayoh):** दो समान वस्तुओं में।
- **ततः (Tatah):** उससे (विवेक ज्ञान से)।
- **प्रतिपत्तिः (Pratipattih):** ज्ञान/भेद पता चलना।

#### भावार्थ:
जब दो चीजें बिल्कुल एक जैसी हों (जाति, लक्षण और देश में कोई अंतर न हो), तो उनमें भेद करने की शक्ति इसी विवेकज ज्ञान से आती है।

#### WWWH Framework:
- **What:** एब्सोल्यूट क्लैरिटी।
- **Why:** दो समान परमाणुओं में भी अंतर देखने के लिए।
- **When:** जब तर्क (Logic) फेल हो जाए।
- **How:** अपनी अंतर्दृष्टि (Intuition) का उपयोग करें।

---

### सूत्र 3.54: तारक ज्ञान

> **तारकं सर्वविषयं सर्वथाविषयमक्रमं चेति विवेकजं ज्ञानम् ॥५४॥**
> *(Tarakam sarva vishayam sarvatha vishayam akramam cheti vivekajam jnanam)*

#### शब्दार्थ:
- **तारकम् (Tarakam):** तारने वाला (Savior/Deliverer).
- **सर्वविषयम् (Sarva vishayam):** सब विषयों को जानने वाला।
- **सर्वथाविषयम् (Sarvatha vishayam):** सब प्रकार से/हर काल में जानने वाला।
- **अक्रमम् (Akramam):** बिना क्रम के (Instantaneous).
- **च (Cha):** और।
- **इति (Iti):** ऐसा।
- **विवेकजम् (Vivekajam):** विवेक से उत्पन्न।
- **ज्ञानम् (Jnanam):** ज्ञान है।

#### भावार्थ:
यह विवेकज ज्ञान "तारक" (संसार सागर से तारने वाला) है। यह सभी विषयों को (सर्वविषयं), सभी प्रकार से (सर्वथाविषयं), और बिना किसी क्रम के (एक साथ) जानता है।

#### WWWH Framework:
- **What:** मुक्तिदाता ज्ञान।
- **Why:** यह आपको संसार से बचाता है।
- **When:** ज्ञान की अंतिम चमक।
- **How:** यह अचानक बिजली की तरह कौंधता है और सब कुछ साफ कर देता है।

---

### सूत्र 3.55: कैवल्य (Liberation)

> **सत्त्वपुरुषयोः शुद्धिसाम्ये कैवल्यमिति ॥५५॥**
> *(Sattva purushayoh shuddhi samye kaivalyam iti)*

#### शब्दार्थ:
- **सत्त्व (Sattva):** बुद्धि।
- **पुरुषयोः (Purushayoh):** पुरुष (आत्मा) की।
- **शुद्धि (Shuddhi):** शुद्धता।
- **साम्ये (Samye):** समान होने पर।
- **कैवल्यम् (Kaivalyam):** कैवल्य (Liberation).
- **इति (Iti):** समाप्त (End of Chapter).

#### भावार्थ:
जब बुद्धि (सत्व) भी पुरुष (आत्मा) की तरह पूरी तरह शुद्ध हो जाती है (यानी बुद्धि का भी लय हो जाता है), तब "कैवल्य" (मोक्ष) घटित होता है।

#### WWWH Framework:
- **What:** परम मुक्ति।
- **Why:** आत्मा अपने शुद्ध स्वरूप में लौट आती है।
- **When:** जब बुद्धि का अस्तित्व आत्मा से अलग न रहे।
- **How:** विवेकख्याति और वैराग्य के माध्यम से।

## कैवल्य पाद (Kaivalya Pada) - अध्याय 4

### सूत्र 4.1: सिद्धियों के स्रोत

> **जन्मौषधिमन्त्रतपःसमाधिजाः सिद्धयः ॥१॥**
> *(Janma aushadhi mantra tapah samadhijah siddhayah)*

#### शब्दार्थ:
- **जन्म (Janma):** जन्म से।
- **औषधि (Aushadhi):** जड़ी-बूटियों/रसायनों से।
- **मन्त्र (Mantra):** मंत्र जाप से।
- **तपः (Tapah):** तपस्या से।
- **समाधि (Samadhi):** समाधि से।
- **जाः (Jah):** उत्पन्न होने वाली।
- **सिद्धयः (Siddhayah):** सिद्धियां हैं।

#### भावार्थ:
सिद्धियां पांच प्रकार से प्राप्त हो सकती हैं:
1. **जन्म से:** (जैसे पक्षियों का उड़ना, या किसी बच्चे का पूर्व जन्म के संस्कारों के साथ पैदा होना)।
2. **औषधि से:** (विशेष जड़ी-बूटियों या रसायनों के प्रयोग से)।
3. **मंत्र से:** (मंत्रों की शक्ति से)।
4. **तप से:** (कठोर तपस्या से)।
5. **समाधि से:** (योग के द्वारा)।
*नोट: समाधि से प्राप्त सिद्धियां ही श्रेष्ठ और स्थायी होती हैं।*

#### WWWH Framework:
- **What:** सुपरपावर के सोर्स।
- **Why:** यह बताने के लिए कि योग ही एकमात्र रास्ता नहीं है, लेकिन सबसे सुरक्षित है।
- **When:** जब कोई चमत्कार दिखे।
- **How:** शॉर्टकट (ड्रग्स/औषधि) न अपनाएं, समाधि का रास्ता चुनें।

---

### सूत्र 4.2: जाति परिवर्तन (Transformation)

> **जात्यन्तरपरिणामः प्रकृत्यापूरात् ॥२॥**
> *(Jatyantara parinamah prakriti apurat)*

#### भावार्थ:
एक जाति (Species/Form) से दूसरी जाति में बदलना "प्रकृति के आपूर" (Inflow of nature) से होता है। यानी प्रकृति खुद खाली जगह को भरती है और बदलाव लाती है।

#### WWWH Framework:
- **What:** इवोल्यूशन (Evolution).
- **Why:** प्रकृति हमेशा पूर्णता की ओर बहती है।
- **When:** जब हम अपनी सीमाओं को तोड़ते हैं।
- **How:** रुकावटें हटा दें, प्रकृति खुद आपको बदल देगी।

---

### सूत्र 4.3: निमित्त (Instrumentality)

> **निमित्तमप्रयोजकं प्रकृतीनां वरणभेदस्तु ततः क्षेत्रिकवत् ॥३॥**
> *(Nimittam aprayojakam prakritinam varana bhedas tu tatah kshetrikavat)*

#### भावार्थ:
मनुष्य के कर्म (निमित्त) प्रकृति को *चलाते* नहीं हैं, वे केवल "वरण भेद" (रुकावटों को हटाना) करते हैं। जैसे किसान (क्षेत्रिक) पानी को खेत में *धकेलता* नहीं है, बस मेड़ (Barrier) तोड़ देता है, और पानी अपने आप बह जाता है।

#### WWWH Framework:
- **What:** किसान का उदाहरण।
- **Why:** हमें कुछ "करना" नहीं है, बस "न करना" (बाधाएं हटाना) है।
- **When:** जब लगे कि बहुत मेहनत करनी पड़ रही है।
- **How:** अपनी बुरी आदतों (बाधाओं) को हटाएं, अच्छी आदतें अपने आप आ जाएंगी।

---

### सूत्र 4.4: निर्माण चित्त (Created Minds)

> **निर्माणचित्तान्यस्मितामात्रान् ॥४॥**
> *(Nirmana chittani asmita matrat)*

#### शब्दार्थ:
- **निर्माण (Nirmana):** निर्माण/रचित (Created).
- **चित्तानि (Chittani):** चित्त/मन (Minds).
- **अस्मिता (Asmita):** अस्मिता/अहंकार (Egoism).
- **मात्रात् (Matrat):** मात्र से/केवल से।

#### भावार्थ:
योगी जब एक साथ कई शरीर धारण करता है (कर्मों को जल्दी भोगने के लिए), तो उन शरीरों के लिए "निर्माण चित्त" (Created Minds) केवल "अस्मिता" (Ego) से ही बनाए जाते हैं।

#### WWWH Framework:
- **What:** क्लोन माइंड्स।
- **Why:** कर्मों को तेजी से निपटाने के लिए।
- **When:** जब योगी एक साथ कई शरीरों में कार्य करता है।
- **How:** अस्मिता (Ego) के कच्चे माल से नए मन बनाए जाते हैं।

---

### सूत्र 4.5: एक मन सबका शासक

> **प्रवृत्तिभेदे प्रयोजकं चित्तमेकमनेकेषाम् ॥५॥**
> *(Pravritti bhede prayojakam chittam ekam anekesham)*

#### शब्दार्थ:
- **प्रवृत्ति (Pravritti):** प्रवृत्ति/क्रिया (Activity).
- **भेदे (Bhede):** भेद/अलग होने पर।
- **प्रयोजकम् (Prayojakam):** संचालक/प्रेरक (Director).
- **चित्तम् (Chittam):** चित्त/मन।
- **एकम् (Ekam):** एक।
- **अनेकेषाम् (Anekesham):** अनेकों का।

#### भावार्थ:
भले ही उन अलग-अलग शरीरों की क्रियाएं अलग-अलग हों, लेकिन उन अनेक मनों का संचालक (Director) वह "एक" मुख्य चित्त (Yogi's original mind) ही होता है।

#### WWWH Framework:
- **What:** मास्टर कंट्रोल।
- **Why:** एक ड्राइवर, कई गाड़ियां।
- **When:** मल्टीपल बॉडीज को मैनेज करते समय।
- **How:** मुख्य मन सैटेलाइट मनों को कंट्रोल करता है।

---

### सूत्र 4.6: ध्यानज चित्त

> **तत्र ध्यानजमनाशयम् ॥६॥**
> *(Tatra dhyanajam anashayam)*

#### शब्दार्थ:
- **तत्र (Tatra):** उनमें (उन मनों में)।
- **ध्यानजम् (Dhyanajam):** ध्यान से उत्पन्न (Born of meditation).
- **अनाशयम् (Anashayam):** आशय रहित/संस्कार रहित (Without impressions).

#### भावार्थ:
उन विभिन्न प्रकार के मनों में, जो मन "ध्यान" से उत्पन्न होता है, वह "अनाशय" होता है - यानी उसमें कर्मों के संस्कार (Karmic impressions) जमा नहीं होते। वह मुक्त होता है। बाकी सब में कर्म संस्कार होते हैं।

#### WWWH Framework:
- **What:** प्योर माइंड।
- **Why:** क्योंकि ध्यान वाला मन कर्मों में नहीं फंसता।
- **When:** मुक्ति के लिए।
- **How:** हर काम ध्यान (Awareness) के साथ करें।

---

### सूत्र 4.7: योगी का कर्म

> **कर्माशुक्लाकृष्णं योगिनस्त्रिविधमितरेषाम् ॥७॥**
> *(Karma ashukla akrishnam yoginas trividham itaresham)*

#### शब्दार्थ:
- **कर्म (Karma):** कर्म।
- **अशुक्ल (Ashukla):** न सफेद (पुण्य)।
- **अकृष्णम् (Akrishnam):** न काला (पाप)।
- **योगिनः (Yoginah):** योगी का।
- **त्रिविधम् (Trividham):** तीन प्रकार का।
- **इतरेषाम् (Itaresham):** दूसरों का।

#### भावार्थ:
योगी का कर्म न तो शुक्ल (पुण्य/White) होता है और न ही कृष्ण (पाप/Black)। वह निष्काम होता है। जबकि दूसरों (साधारण मनुष्यों) का कर्म तीन प्रकार का होता है: शुक्ल (पुण्य), कृष्ण (पाप), और मिश्रित (पाप-पुण्य दोनों)।
3. **शुक्ल-कृष्ण:** मिश्रित (अच्छे-बुरे)।

#### WWWH Framework:
- **What:** कर्म से आजादी।
- **Why:** अच्छा कर्म भी सोने की बेड़ी है।
- **When:** निष्काम कर्म करते समय।
- **How:** फल की इच्छा के बिना काम करें।

---

### सूत्र 4.8: वासनाओं का प्रकट होना

> **ततस्तद्विपाकानुगुणानामेवाभिव्यक्तिर्वासनानाम् ॥८॥**
> *(Tatas tad vipaka anugunanam eva abhivyaktir vasananam)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (तीन प्रकार के कर्मों से)।
- **तद् (Tad):** उनके।
- **विपाक (Vipaka):** फल।
- **अनुगुणानाम् (Anugunanam):** अनुकूल/अनुसार (Corresponding).
- **एव (Eva):** ही।
- **अभिव्यक्तिः (Abhivyaktih):** प्रकट होना (Manifestation).
- **वासनानाम् (Vasananam):** वासनाओं का।

#### भावार्थ:
उन तीन प्रकार के कर्मों से, केवल वही वासनाएं (Tendencies) प्रकट होती हैं जो उस जन्म या परिस्थिति के "अनुकूल" (Compatible) होती हैं। (जैसे बिल्ली के शरीर में शेर वाली वासनाएं प्रकट नहीं होंगी, केवल बिल्ली वाली होंगी)।

#### WWWH Framework:
- **What:** कर्म एक्टिवेशन।
- **Why:** आप इंसान के शरीर में जानवर की तरह व्यवहार नहीं कर सकते (पूरी तरह से)।
- **When:** जब वातावरण बीज के अनुकूल हो।
- **How:** वही बीज उगते हैं जिन्हें सही मिट्टी मिलती है।

---

### सूत्र 4.9: वासनाओं की निरंतरता

> **जातिदेशकालव्यवहितानामप्यानन्तर्यं स्मृतिसंस्कारयोरेकरूपत्वात् ॥९॥**
> *(Jati desha kala vyavahitanam apy anantaryam smriti samskarayoh ekarupatvat)*

#### शब्दार्थ:
- **जाति (Jati):** जाति (Species).
- **देश (Desha):** देश/स्थान (Space).
- **काल (Kala):** काल/समय (Time).
- **व्यवहितानाम् (Vyavahitanam):** व्यवधान/दूरी होने पर भी (Separated by).
- **अपि (Api):** भी।
- **आनन्तर्यम् (Anantaryam):** निरंतरता (Continuity).
- **स्मृति (Smriti):** स्मृति (Memory).
- **संस्कारयोः (Samskarayoh):** संस्कारों की।
- **एकरूपत्वात् (Ekarupatvat):** एक रूप होने के कारण।

#### भावार्थ:
भले ही जन्म (जाति), स्थान (देश) और समय (काल) का कितना भी अंतर क्यों न हो, वासनाओं में निरंतरता (Continuity) बनी रहती है, क्योंकि स्मृति और संस्कार एक ही रूप हैं। (सैकड़ों जन्मों बाद भी पुरानी आदतें वापस आ सकती हैं)।

#### WWWH Framework:
- **What:** कर्म क्लाउड स्टोरेज।
- **Why:** डेटा कभी डिलीट नहीं होता।
- **When:** पुनर्जन्म में।
- **How:** अगर आप 100 जन्मों बाद फिर से बाघ बनें, तो आपकी पुरानी बाघ वाली आदतें जाग जाएंगी।

---

### सूत्र 4.10: जीने की इच्छा

> **तासामनादित्वं चाशिषो नित्यत्वात् ॥१०॥**
> *(Tasam anaditvam cha ashishah nityatvat)*

#### शब्दार्थ:
- **तासाम् (Tasam):** उनकी (वासनाओं की)।
- **अनादित्वम् (Anaditvam):** अनादि होना (Beginningless).
- **च (Cha):** और।
- **आशिषः (Ashishah):** जीने की इच्छा/आशीष (Desire to live).
- **नित्यत्वात् (Nityatvat):** नित्य होने के कारण।

#### भावार्थ:
वे वासनाएं "अनादि" (Beginningless) हैं, क्योंकि "जीने की इच्छा" (Self-preservation instinct) नित्य है। (हर प्राणी हमेशा से जीना चाहता है, यह इच्छा कभी नई पैदा नहीं होती)।

#### WWWH Framework:
- **What:** सर्वाइवल इंस्टिंक्ट।
- **Why:** "मैं बना रहूँ" यह रूट सॉफ्टवेयर है।
- **When:** हमेशा से।
- **How:** यह आत्मा की यात्रा में हार्डकोडेड है।

### सूत्र 4.11: वासना का नाश

> **हेतुफलाश्रयालम्बनैः संगृहीतत्वादेषामभावे तदभावः ॥११॥**
> *(Hetu phala ashraya alambanaih sangrihitatvat esham abhave tad abhavah)*

#### भावार्थ:
वासनाएं चार चीजों पर टिकी हैं:
1. **हेतु:** अविद्या (Ignorance).
2. **फल:** सुख-दुख (Result).
3. **आश्रय:** चित्त (Mind).
4. **आलम्बन:** विषय (Objects).
इन चारों के अभाव (हटने) से वासनाओं का भी अभाव हो जाता है।

#### WWWH Framework:
- **What:** जड़ से इलाज।
- **Why:** ऊपर से पत्तियां काटने से पेड़ नहीं मरता।
- **When:** बुरी आदतों को छोड़ने के लिए।
- **How:** अविद्या (हेतु) को ज्ञान से काटें।

### सूत्र 4.12: अतीत और अनागत

> **अतीतानागतं स्वरूपतोऽस्त्यध्वभेदाद्धर्माणाम् ॥१२॥**
> *(Atita anagatam svarupato asti adhva bhedat dharmanam)*

#### शब्दार्थ:
- **अतीतानागतम् (Atita anagatam):** अतीत (Past) और अनागत (Future).
- **स्वरूपतः (Svarupatah):** अपने स्वरूप में.
- **अस्ति (Asti):** है/विद्यमान है.
- **अध्व (Adhva):** मार्ग/काल (Time phase).
- **भेदात् (Bhedat):** भेद के कारण.
- **धर्माणाम् (Dharmanam):** धर्मों/गुणों का.

#### भावार्थ:
अतीत (Past) और भविष्य (Future) अपने असली स्वरूप में हमेशा विद्यमान रहते हैं। अंतर केवल उनके "धर्म" (अवस्था/Time phase) में होता है। (जैसे पानी, बर्फ और भाप - तीनों H2O हैं, बस अवस्था अलग है)।

#### WWWH Framework:
- **What:** टाइम इज ए सर्कल।
- **Why:** कुछ भी नष्ट नहीं होता, बस रूप बदलता है।
- **When:** वास्तविकता को समझते समय।
- **How:** भूतकाल "गायब" नहीं हुआ है, वह बस एक अलग अवस्था में मौजूद है।

### सूत्र 4.13: गुणों का खेल

> **ते व्यक्तसूक्ष्मा गुणात्मानः ॥१३॥**
> *(Te vyakta sukshmah guna atmanah)*

#### शब्दार्थ:
- **ते (Te):** वे (धर्म/संस्कार).
- **व्यक्त (Vyakta):** प्रकट (Manifest).
- **सूक्ष्माः (Sukshmah):** सूक्ष्म (Subtle).
- **गुणात्मानः (Guna atmanah):** गुणों (सत्व, रजस, तमस) के स्वरूप वाले.

#### भावार्थ:
वे धर्म (चाहे प्रकट हों या सूक्ष्म) सब के सब तीन गुणों (सत्व, रजस, तमस) के ही स्वरूप हैं।

#### WWWH Framework:
- **What:** द मैट्रिक्स कोड।
- **Why:** हर चीज 3 गुणों से बनी है।
- **When:** किसी भी वस्तु का विश्लेषण करते समय।
- **How:** हर चीज में सत्व, रजस और तमस का खेल देखें।

### सूत्र 4.14: वस्तु तत्व

> **परिणामैकत्वाद्वस्तुतत्त्वम् ॥१४॥**
> *(Parinama ekatvad vastu tattvam)*

#### शब्दार्थ:
- **परिणाम (Parinama):** परिणाम/बदलाव.
- **एकत्वात् (Ekatvad):** एक होने के कारण.
- **वस्तु (Vastu):** वस्तु.
- **तत्त्वम् (Tattvam):** तत्व/असलीयत.

#### भावार्थ:
गुणों का परिणाम (Transformation) "एक" होने के कारण, वह वस्तु "एक" दिखाई देती है। (जैसे धागे बहुत सारे हैं, लेकिन उनकी बुनाई एक होने से "कपड़ा" एक दिखता है)।

#### WWWH Framework:
- **What:** एकता का भ्रम।
- **Why:** तेजी से बदलते गुण एक ठोस वस्तु का भ्रम पैदा करते हैं (जैसे घूमता हुआ पंखा)।
- **When:** वस्तुओं को देखते समय।
- **How:** समझें कि "ठोस" वस्तुएं वास्तव में गुणों का निरंतर प्रवाह हैं।

### सूत्र 4.15: वस्तु और चित्त

> **वस्तुसाम्ये चित्तभेदात्तयोर्विभक्तः पन्थाः ॥१५॥**
> *(Vastu samye chitta bhedat tayoh vibhaktah panthah)*

#### शब्दार्थ:
- **वस्तु (Vastu):** वस्तु.
- **साम्ये (Samye):** समान होने पर भी.
- **चित्त (Chitta):** चित्त/मन.
- **भेदात् (Bhedat):** भेद/अलग होने के कारण.
- **तयोः (Tayoh):** उन दोनों का.
- **विभक्तः (Vibhaktah):** अलग/भिन्न.
- **पन्थाः (Panthah):** रास्ता/मार्ग.

#### भावार्थ:
वस्तु वही रहती है, लेकिन उसे देखने वाले चित्त (मन) अलग-अलग होते हैं। इसलिए वस्तु और मन दोनों अलग-अलग हैं। (एक ही लड़की किसी के लिए बेटी है, किसी के लिए पत्नी, और किसी के लिए दुश्मन)। लड़की वही है, देखने वाले का नजरिया अलग है)।

#### WWWH Framework:
- **What:** सब्जेक्टिव रियलिटी।
- **Why:** दुनिया वैसी नहीं है जैसी वह है, दुनिया वैसी है जैसे हम हैं।
- **When:** जब किसी से झगड़ा हो।
- **How:** समझें कि यह उसका नजरिया है, परम सत्य नहीं।

### सूत्र 4.16: क्या वस्तु मन पर निर्भर है?

> **न चैकचित्ततन्त्रं वस्तु तदप्रमाणकं तदा किं स्यात् ॥१६॥**
> *(Na cha eka chitta tantram vastu tad apramanakam tada kim syat)*

#### शब्दार्थ:
- **न (Na):** नहीं.
- **च (Cha):** और.
- **एक (Eka):** एक.
- **चित्त (Chitta):** चित्त/मन.
- **तन्त्रम् (Tantram):** अधीन/निर्भर.
- **वस्तु (Vastu):** वस्तु.
- **तद् (Tad):** वह.
- **अप्रमाणकम् (Apramanakam):** प्रमाण रहित/न दिखने पर.
- **तदा (Tada):** तब.
- **किम् (Kim):** क्या.
- **स्यात् (Syat):** होगा.

#### भावार्थ:
वस्तु केवल एक मन पर निर्भर नहीं है। अगर ऐसा होता, तो जब वह मन उसे नहीं देख रहा होता, तो क्या वह वस्तु गायब हो जाती? (नहीं, वस्तु का अपना स्वतंत्र अस्तित्व है)।

#### WWWH Framework:
- **What:** ऑब्जेक्टिव रियलिटी।
- **Why:** दुनिया तब भी रहती है जब आप सो रहे होते हैं।
- **When:** आइडियलिज्म बनाम रियलिज्म की बहस में।
- **How:** जंगल में पेड़ गिरता है, चाहे कोई सुने या न सुने।

### सूत्र 4.17: वस्तु का ज्ञान

> **तदुपरागापेक्षित्वाच्चित्तस्य वस्तु ज्ञाताज्ञातम् ॥१७॥**
> *(Tad uparaga apekshitvat chittasya vastu jnata ajnatam)*

#### शब्दार्थ:
- **तत् (Tat):** उसका (वस्तु का).
- **उपरग (Uparaga):** रंग/छाया/प्रतिबिंब.
- **अपेक्षित्वात् (Apekshitvat):** अपेक्षित होने के कारण.
- **चित्तस्य (Chittasya):** चित्त का.
- **वस्तु (Vastu):** वस्तु.
- **ज्ञात (Jnata):** ज्ञात/जाना हुआ.
- **अज्ञातम् (Ajnatam):** अज्ञात/अनजाना.

#### भावार्थ:
वस्तु का ज्ञान चित्त को तब होता है जब वस्तु का "रंग" (Reflection) चित्त पर पड़ता है। इसलिए वस्तु कभी ज्ञात (Known) होती है और कभी अज्ञात (Unknown)।
- **How:** अपने विचारों को ऐसे देखें जैसे आप सड़क किनारे बैठकर ट्रैफिक देख रहे हों।

### सूत्र 4.18: चित्त जड़ है

> **न तत्स्वाभासं दृश्यत्वात् ॥१८॥**
> *(Na tat svabhasam drishyatvat)*

#### शब्दार्थ:
- **न (Na):** नहीं.
- **तत् (Tat):** वह (मन).
- **स्वाभासम् (Svabhasam):** स्वयं प्रकाश (Self-luminous).
- **दृश्यत्वात् (Drishyatvat):** दृश्य होने के कारण (Seen object).

#### भावार्थ:
चित्त (मन) "स्वाभास" (Self-illuminating) नहीं है (यानी वह खुद को नहीं जान सकता), क्योंकि वह "दृश्य" (देखने की चीज) है। (जैसे आंख सब कुछ देखती है लेकिन खुद को नहीं देख सकती)।

#### WWWH Framework:
- **What:** चंद्रमा, सूर्य नहीं।
- **Why:** मन केवल आत्मा के प्रकाश से चमकता है।
- **When:** जब आपको लगे कि "मेरा मन बहुत तेज है"।
- **How:** समझें कि मन सिर्फ एक रिफ्लेक्टर (परावर्तक) है।

### सूत्र 4.19: एक साथ दो नहीं

> **एकसमये चोभयानवधारणम् ॥१९॥**
> *(Eka samaye cha ubhaya anavadharanam)*

#### शब्दार्थ:
- **एकसमये (Eka samaye):** एक समय में.
- **च (Cha):** और.
- **उभय (Ubhaya):** दोनों (मन और विषय).
- **अनवधारणम् (Anavadharanam):** धारण/ज्ञान नहीं हो सकता.

#### भावार्थ:
एक ही समय में चित्त "खुद को" और "विषय को" - दोनों को नहीं जान सकता। (मन एक समय में एक ही काम कर सकता है)।

#### WWWH Framework:
- **What:** सिंगल थ्रेड प्रोसेसिंग।
- **Why:** मन एक बार में एक ही काम कर सकता है।
- **When:** मल्टीटास्किंग का भ्रम होने पर।
- **How:** आप एक ही पल में कैमरा लेंस और फोटो दोनों को नहीं देख सकते।

### सूत्र 4.20: स्मृति संकर

> **चित्तान्तरदृश्ये बुद्धिबुद्धेरतिप्रसङ्गः स्मृतिसंकरश्च ॥२०॥**
> *(Chitta antara drishye buddhi buddher atiprasangah smriti sankarash cha)*

#### शब्दार्थ:
- **चित्तान्तर (Chitta antara):** दूसरे चित्त द्वारा.
- **दृश्ये (Drishye):** देखे जाने पर.
- **बुद्धिबुद्धेः (Buddhi buddheh):** बुद्धि की बुद्धि (Cognition of cognition).
- **अतिप्रसङ्गः (Atiprasangah):** अतिप्रसंग/अनंत दोष (Infinite regress).
- **स्मृतिसंकरः (Smriti sankarah):** स्मृतियों का मिश्रण/उलझन (Confusion of memory).
- **च (Cha):** और.

#### भावार्थ:
अगर हम कहें कि "एक मन को दूसरा मन देखता है", तो फिर उस दूसरे मन को देखने के लिए तीसरा मन चाहिए होगा... ऐसे "अतिप्रसंग" (Infinite Regress) हो जाएगा और स्मृतियों की खिचड़ी (Confusion) बन जाएगी। इसलिए मन को देखने वाला मन नहीं, बल्कि पुरुष (आत्मा) है।

#### WWWH Framework:
- **What:** इनफिनिट लूप एरर।
- **Why:** देखने वाले को देखने वाला कौन है?
- **When:** चेतना के रहस्य को तर्क से सुलझाते समय।
- **How:** इस लूप को रोकें और समझें कि अंतिम साक्षी (पुरुष) स्वयं प्रकाश है।

### सूत्र 4.21: आत्म-ज्ञान

> **चितेरप्रतिसंक्रमायास्तदाकारापत्तौ स्वबुद्धिसंवेदनम् ॥२१॥**
> *(Chiter apratisankramayas tad akara apattau sva buddhi samvedanam)*

#### शब्दार्थ:
- **चितेः (Chiteh):** चिति शक्ति/पुरुष (Consciousness).
- **अप्रतिसंक्रमायाः (Apratisankramayah):** जो बदलती नहीं/कहीं जाती नहीं (Unchanging).
- **तदाकारापत्तौ (Tad akara apattau):** उसका आकार लेने पर (बुद्धि में).
- **स्वबुद्धि (Sva buddhi):** अपनी बुद्धि का.
- **संवेदनम् (Samvedanam):** ज्ञान/अनुभव.

#### भावार्थ:
जब अपरिणामी "चिति शक्ति" (पुरुष/Consciousness) बुद्धि के आकार में ढल जाती है (यानी बुद्धि उसमें रिफ्लेक्ट होती है), तब बुद्धि को अपना ज्ञान होता है।

#### WWWH Framework:
- **What:** रिफ्लेक्शन।
- **Why:** जड़ मस्तिष्क (Brain) चेतन कैसे हो जाता है?
- **When:** मन-शरीर की समस्या (Mind-Body Problem) को समझते समय।
- **How:** मन आत्मा का प्रतिबिंब पकड़ता है और "जीवित" होने का नाटक करता है।

---

### सूत्र 4.22: चित्त की पूर्णता

> **द्रष्टृदृश्योपरक्तं चित्तं सर्वार्थम् ॥२२॥**
> *(Drashtri drishya uparaktam chittam sarvartham)*

#### शब्दार्थ:
- **द्रष्टृ (Drashtri):** द्रष्टा (Seer/Purusha).
- **दृश्य (Drishya):** दृश्य (Seen/Object).
- **उपरक्तम् (Uparaktam):** रंगा हुआ (Colored by).
- **चित्तम् (Chittam):** चित्त/मन.
- **सर्वार्थम् (Sarvartham):** सर्वार्थ/पूर्ण (All-comprehending).

#### भावार्थ:
जब चित्त एक तरफ "द्रष्टा" (पुरुष) और दूसरी तरफ "दृश्य" (संसार) - दोनों से रंग जाता है, तो वह "सर्वार्थ" (All-comprehending) हो जाता है। (मन ही पुल है जो आत्मा और संसार को जोड़ता है)।

#### WWWH Framework:
- **What:** पुल (Bridge).
- **Why:** मन आत्मा को संसार से जोड़ता है।
- **When:** हर अनुभव में।
- **How:** मन का एक चेहरा आत्मा की ओर है, दूसरा संसार की ओर।

### सूत्र 4.23: वासनाओं का उद्देश्य

> **तदसंख्येयवासनाभिश्चित्रमपि परार्थं संहत्यकारित्वात् ॥२३॥**
> *(Tad asankhyeya vasanabhish chitram api parartham samhatya karitvat)*

#### शब्दार्थ:
- **तद् (Tad):** वह (मन).
- **असंख्येय (Asankhyeya):** असंख्य.
- **वासनाभिः (Vasanabhih):** वासनाओं से.
- **चित्रम् (Chitram):** चित्रित/भरा हुआ (Speckled).
- **अपि (Api):** भी.
- **परार्थम् (Parartham):** दूसरे (पुरुष) के लिए.
- **संहत्यकारित्वात् (Samhatya karitvat):** मिलकर कार्य करने के कारण.

#### भावार्थ:
हालांकि चित्त अनगिनत वासनाओं से रंगा हुआ (चित्र-विचित्र) है, फिर भी वह "परार्थ" (दूसरे के लिए, यानी पुरुष के लिए) काम करता है, क्योंकि वह "संहत्यकारी" (मिलकर बना हुआ/Compound) है। (जैसे घर ईंटों से बना है लेकिन वह घर के लिए नहीं, रहने वाले के लिए है)।

#### WWWH Framework:
- **What:** मन एक सेवक है।
- **Why:** मन का अपना कोई उद्देश्य नहीं है, वह सिर्फ आत्मा के भोग या मोक्ष के लिए काम करता है।
- **When:** जब मन मालिक बनने की कोशिश करे।
- **How:** याद दिलाएं कि "तू मेरा नौकर है, मैं तेरा नहीं।"

---

### सूत्र 4.24: विशेष दर्शन

> **विशेषदर्शिन आत्मभावभावनाविनिवृत्तिः ॥२४॥**
> *(Vishesha darshina atma bhava bhavana vinivrittih)*

#### शब्दार्थ:
- **विशेषदर्शिनः (Vishesha darshinah):** विशेष दर्शी (जिसे भेद दिख गया है).
- **आत्मभाव (Atma bhava):** आत्म भाव (मैं शरीर/मन हूँ, यह सोच).
- **भावना (Bhavana):** भावना/जिज्ञासा (Curiosity/Reflection).
- **विनिवृत्तिः (Vinivrittih):** पूरी तरह निवृत्त/समाप्त हो जाती है.

#### भावार्थ:
जो योगी चित्त और पुरुष के इस "विशेष" (भेद) को देख लेता है, उसकी "आत्मभाव भावना" (मैं शरीर/मन हूँ, यह सोच) हमेशा के लिए निवृत्त (समाप्त) हो जाती है।

#### WWWH Framework:
- **What:** खोज का अंत।
- **Why:** जब चश्मा पहना हो तो उसे ढूंढना नहीं पड़ता।
- **When:** आत्म-ज्ञान (Enlightenment) पर।
- **How:** जब आप *जान* लेते हैं कि आप आत्मा हैं, तो "मैं कौन हूँ" पूछना बंद कर देते हैं।

---

### सूत्र 4.25: कैवल्य की ओर

> **तदा विवेकनिम्नं कैवल्यप्राग्भारं चित्तम् ॥२५॥**
> *(Tada viveka nimnam kaivalya pragbharam chittam)*

#### भावार्थ:
तब उस योगी का चित्त "विवेक" (Discrimination) की ढलान पर बहने लगता है और "कैवल्य" (Liberation) के समुद्र की ओर झुक जाता है।

#### WWWH Framework:
- **What:** ग्रेविटी ऑफ गॉड।
- **Why:** एक बार सत्य दिख जाए, तो मन अपने आप मुक्ति की ओर भागता है।
- **When:** आत्म-ज्ञान होने पर।
- **How:** जैसे नदी समुद्र की ओर बहती है, वैसे ही सहज रहें।

---

### सूत्र 4.26: छिद्रों में विचार

> **तच्छिद्रेषु प्रत्ययान्तराणि संस्कारेभ्यः ॥२६॥**
> *(Tach chidreshu pratyaya antarani samskarebhyah)*

#### शब्दार्थ:
- **तच्छिद्रेषु (Tach chidreshu):** उसके (विवेक के) छिद्रों/अंतराल में.
- **प्रत्ययान्तराणि (Pratyaya antarani):** दूसरे विचार/प्रत्यय.
- **संस्कारेभ्यः (Samskarebhyah):** (पुराने) संस्कारों से.

#### भावार्थ:
उस विवेक प्रवाह के बीच-बीच में (छिद्रों में) अगर कभी ध्यान टूटता है, तो पुराने संस्कारों के कारण दूसरे विचार आ सकते हैं।

#### WWWH Framework:
- **What:** पुराने मेहमान।
- **Why:** संस्कार इतनी आसानी से नहीं जाते।
- **When:** जब आप थोड़े भी लापरवाह होते हैं।
- **How:** उन्हें बस बादल की तरह गुजरने दें, उनसे लड़ें नहीं।

---

### सूत्र 4.27: उनका नाश

> **हानमेषां क्लेशवदुक्तम् ॥२७॥**
> *(Hanam esham kleshavad uktam)*

#### शब्दार्थ:
- **हानम् (Hanam):** नाश/त्याग.
- **एषाम् (Esham):** इनका (संस्कारों का).
- **क्लेशवत् (Kleshavad):** क्लेशों की तरह.
- **उक्तम् (Uktam):** कहा गया है.

#### भावार्थ:
इन संस्कारों का नाश भी उसी तरह करना चाहिए जैसे क्लेशों (अविद्या आदि) का नाश किया गया था (यानी ज्ञान की आग से)।

#### WWWH Framework:
- **What:** सफाई अभियान।
- **Why:** जली हुई रस्सी भी रस्सी जैसी दिखती है, उसे राख कर दें।
- **When:** जब पुरानी आदतें लौटने की कोशिश करें।
- **How:** ज्ञान की अग्नि से उन्हें पूरी तरह जला दें।

---

### सूत्र 4.28: धर्ममेघ समाधि

> **प्रसंख्यानेऽप्यकुसीदस्य सर्वथा विवेकख्यातेर्धर्ममेघः समाधिः ॥२८॥**
> *(Prasankhyane api akusidasya sarvatha viveka khyater dharma meghah samadhih)*

#### शब्दार्थ:
- **प्रसंख्याने (Prasankhyane):** सर्वोच्च ज्ञान (Omniscience) में.
- **अपि (Api):** भी.
- **अकुसीदस्य (Akusidasya):** जिसे कोई ब्याज/फल नहीं चाहिए (Disinterested).
- **सर्वथा (Sarvatha):** सब प्रकार से.
- **विवेकख्यातेः (Viveka khyateh):** विवेक ख्याति से.
- **धर्ममेघः (Dharma meghah):** धर्ममेघ (Cloud of Virtue).
- **समाधिः (Samadhih):** समाधि.

#### भावार्थ:
जब योगी को उस सर्वोच्च ज्ञान (Prasankhyana) से भी कोई लगाव (Interest/Profit) नहीं रहता, तब उस पूर्ण वैराग्य से "धर्ममेघ समाधि" (Cloud of Virtue Samadhi) घटित होती है।

#### WWWH Framework:
- **What:** ज्ञान की बारिश।
- **Why:** जब ज्ञान का भी अहंकार नहीं रहता, तब असली धर्म बरसता है।
- **When:** वैराग्य की पराकाष्ठा पर।
- **How:** "मैं ज्ञानी हूँ" - इस विचार को भी छोड़ दें।

---

### सूत्र 4.29: क्लेश कर्म निवृत्ति

> **ततः क्लेशकर्मनिवृत्तिः ॥२९॥**
> *(Tatah klesha karma nivrittih)*

#### शब्दार्थ:
- **ततः (Tatah):** उससे (धर्ममेघ समाधि से).
- **क्लेश (Klesha):** क्लेश (Afflictions).
- **कर्म (Karma):** कर्म.
- **निवृत्तिः (Nivrittih):** निवृत्ति/समाप्ति.

#### भावार्थ:
उस (धर्ममेघ समाधि) से सभी क्लेश (अविद्या, अस्मिता, राग, द्वेष, अभिनिवेश) और सभी कर्म (शुक्ल, कृष्ण, मिश्र) पूरी तरह समाप्त हो जाते हैं।

#### WWWH Framework:
- **What:** पूर्ण मुक्ति।
- **Why:** कोई बीज नहीं बचा जो उग सके।
- **When:** धर्ममेघ समाधि के बाद।
- **How:** जड़ कट गई, पेड़ गिर गया।

---

### सूत्र 4.30: अनंत ज्ञान

> **तदा सर्वावरणमलापेतस्य ज्ञानस्यानन्त्याज्ज्ञेयमल्पम् ॥३०॥**
> *(Tada sarva avarana mala apetasya jnanasya anantyat jneyam alpam)*

#### शब्दार्थ:
- **तदा (Tada):** तब.
- **सर्व (Sarva):** सभी.
- **आवरण (Avarana):** आवरण/पर्दे.
- **मल (Mala):** मल/अशुद्धियां.
- **अपेतस्य (Apetasya):** हट जाने से.
- **ज्ञानस्य (Jnanasya):** ज्ञान के.
- **आनन्त्यात् (Anantyat):** अनंत होने के कारण.
- **ज्ञेयम् (Jneyam):** जानने योग्य.
- **अल्पम् (Alpam):** अल्प/थोड़ा.

#### भावार्थ:
तब, सभी पर्दों और मल (Impurities) के हट जाने से ज्ञान "अनंत" (Infinite) हो जाता है। उसके सामने "जानने योग्य" (Knowable) चीजें बहुत थोड़ी (तुच्छ) रह जाती हैं।

#### WWWH Framework:
- **What:** अनलिमिटेड नॉलेज।
- **Why:** जब बादल हटते हैं, तो आकाश अनंत दिखता है।
- **When:** मुक्ति के क्षण में।
- **How:** अपनी सीमाओं (Limiting beliefs) को हटाकर।

---

### सूत्र 4.31: क्रम समाप्ति

> **ततः कृतार्थानां परिणामक्रमसमाप्तिर्गुणानाम् ॥३१॥**
> *(Tatah kritarthanam parinama krama samaptir gunanam)*

#### शब्दार्थ:
- **ततः (Tatah):** तब.
- **कृतार्थानाम् (Kritarthanam):** जिनका प्रयोजन पूरा हो गया है.
- **परिणाम (Parinama):** परिणाम/बदलाव.
- **क्रम (Krama):** क्रम.
- **समाप्तिः (Samaptih):** समाप्ति.
- **गुणानाम् (Gunanam):** गुणों की.

#### भावार्थ:
तब गुणों (सत्व, रजस, तमस) का काम पूरा हो जाता है (कृतार्थ), और उनका "परिणाम क्रम" (बदलने का सिलसिला) समाप्त हो जाता है।

#### WWWH Framework:
- **What:** मिशन अकंप्लिश्ड।
- **Why:** गुणों ने आपको सत्य दिखा दिया, अब उनका काम खत्म।
- **When:** खेल खत्म होने पर।
- **How:** पर्दा गिरता है।

---

### सूत्र 4.32: क्रम का लक्षण

> **क्षणप्रतियोगी परिणामापरान्तनिर्ग्राह्यः क्रमः ॥३२॥**
> *(Kshana pratiyogi parinama aparanta nirgrahyah kramah)*

#### शब्दार्थ:
- **क्षण (Kshana):** क्षण.
- **प्रतियोगी (Pratiyogi):** प्रतियोगी/साथ चलने वाला.
- **परिणाम (Parinama):** परिणाम.
- **अपरान्त (Aparanta):** अंत में.
- **निर्ग्राह्यः (Nirgrahyah):** ग्रहण करने योग्य/समझ में आने वाला.
- **क्रमः (Kramah):** क्रम.

#### भावार्थ:
"क्रम" (Sequence) वह है जो क्षणों (Moments) के बदलने से होता है और जिसे परिणाम के अंत में (पूरी प्रक्रिया होने के बाद) समझा जाता है। अब यह क्रम रुक जाता है।

#### WWWH Framework:
- **What:** समय का भ्रम।
- **Why:** समय केवल बदलाव का माप है।
- **When:** जब बदलाव रुक जाता है, समय रुक जाता है।
- **How:** टाइमलाइन से बाहर निकलें।

---

### सूत्र 4.33: कैवल्य (The Final State)

> **पुरुषार्थशून्यानां गुणानां प्रतिप्रसवः कैवल्यं स्वरूपप्रतिष्ठा वा चितिशक्तिरिति ॥३३॥**
> *(Purusha artha shunyanam gunanam pratiprasavah kaivalyam svarupa pratishtha va chiti shaktir iti)*

*(कुछ पाठों में यह 34वां सूत्र है)*

#### शब्दार्थ:
- **पुरुषार्थशून्यानाम् (Purusha artha shunyanam):** पुरुष के लिए जिनका कोई प्रयोजन नहीं रहा.
- **गुणानाम् (Gunanam):** गुणों का.
- **प्रतिप्रसवः (Pratiprasavah):** प्रतिप्रसव/अपने कारण में लीन होना (Involution).
- **कैवल्यम् (Kaivalyam):** कैवल्य.
- **स्वरूपप्रतिष्ठा (Svarupa pratishtha):** अपने स्वरूप में स्थित होना.
- **वा (Va):** या.
- **चितिशक्तिः (Chiti shaktir):** चिति शक्ति (Power of Consciousness).
- **इति (Iti):** ऐसा (समाप्त).

#### भावार्थ:
जब गुणों का पुरुष के लिए कोई प्रयोजन (Purpose) नहीं रहता, तो वे अपने कारण (प्रकृति) में वापस लीन हो जाते हैं (प्रतिप्रसव)। और "चिति शक्ति" (पुरुष/आत्मा) अपने शुद्ध स्वरूप में प्रतिष्ठित हो जाती है। यही **कैवल्य** है।

#### WWWH Framework:
- **What:** द एंड (The End) और नई शुरुआत।
- **Why:** खेल खत्म, खिलाड़ी अपने घर वापस।
- **When:** अब और अभी (शाश्वत वर्तमान में)।
- **How:** बस "हो" (Just Be).

---

*कैवल्य पाद (अध्याय 4) समाप्त।*

---
**।। इति पतञ्जलि योगसूत्रम् सम्पूर्णम् ।।**

## 3. व्यायाम और ध्यान (Movement & Meditation)

- **When (कब):** सुबह 6:00 - 7:00 बजे
- **What (क्या):** योग, प्राणायाम (सांसों का अभ्यास) और ध्यान।
- **Why (क्यों):** शरीर में ऊर्जा का संचार करने और ऑफिस के तनाव के लिए मन को तैयार करने के लिए। यह 'कफ' (Kapha) काल की शुरुआत है, इसलिए शरीर को सक्रिय करना जरूरी है।
- **How (कैसे):**
  - 20 मिनट सूर्य नमस्कार या स्ट्रेचिंग।
  - 10 मिनट प्राणायाम (अनुलोम-विलोम, कपालभाति)।
  - 10 मिनट शांत बैठकर ध्यान।

---

## 4. अभ्यंग और स्नान (Self-Massage & Bath)

- **When (कब):** सुबह 7:00 - 7:30 बजे
- **What (क्या):** शरीर पर तेल लगाना और स्नान करना।
- **Why (क्यों):** वात दोष को संतुलित करने, त्वचा को पोषण देने और सुस्ती दूर करने के लिए।
- **How (कैसे):**
  - तिल या सरसों के तेल से शरीर की हल्की मालिश करें (सप्ताहांत पर पूरी मालिश, रोज कम से कम सिर और पैरों के तलवे)।
  - सामान्य तापमान या गुनगुने पानी से स्नान करें।

---

## 5. नाश्ता (Breakfast)

- **When (कब):** सुबह 7:30 - 8:30 बजे
- **What (क्या):** हल्का और सुपाच्य भोजन।
- **Why (क्यों):** जठराग्नि (Digestive Fire) अभी मध्यम होती है। शरीर को दिन भर के लिए ईंधन चाहिए, लेकिन भारीपन नहीं।
- **How (कैसे):**
  - दलिया, ओट्स, फल, या भीगे हुए मेवे।
  - चाय/कॉफी की जगह हर्बल चाय को प्राथमिकता दें।
  - भोजन शांति से बैठकर करें, जल्दबाजी में नहीं।

---

## 6. कार्य का प्रथम चरण (Deep Work Phase)

- **When (कब):** सुबह 9:30 - दोपहर 1:00 बजे
- **What (क्या):** सबसे कठिन और महत्वपूर्ण ऑफिस का काम।
- **Why (क्यों):** यह 'पित्त' (Pitta) काल की शुरुआत है। इस समय एकाग्रता और विश्लेषण क्षमता (Analytical Skills) सबसे अधिक होती है।
- **How (कैसे):**
  - सबसे मुश्किल प्रोजेक्ट्स को पहले निपटाएं।
  - मल्टीटास्किंग से बचें।
  - बीच में 5 मिनट का स्ट्रेचिंग ब्रेक लें।

---

## 7. दोपहर का भोजन (Lunch)

- **When (कब):** दोपहर 1:00 - 2:00 बजे
- **What (क्या):** दिन का सबसे बड़ा और मुख्य भोजन।
- **Why (क्यों):** सूर्य अपने चरम पर होता है, जिससे जठराग्नि सबसे तेज होती है। भारी भोजन को पचाने का यह सबसे सही समय है।
- **How (कैसे):**
  - दाल, चावल, रोटी, सब्जी, छाछ/दही।
  - भोजन के बाद 100 कदम जरूर चलें (शतपावली)।
  - तुरंत काम पर न लौटें, 10-15 मिनट वज्रासन में बैठें या वामकुक्षी (बाईं करवट लेटकर विश्राम) करें (यदि संभव हो)।

---

## 8. कार्य का द्वितीय चरण (Creative/Routine Work)

- **When (कब):** दोपहर 2:30 - शाम 5:30 बजे
- **What (क्या):** मीटिंग्स, ईमेल, और कम दिमाग लगाने वाले काम।
- **Why (क्यों):** यह 'वात' काल फिर से शुरू होता है। शरीर में थोड़ी सुस्ती आ सकती है, इसलिए रचनात्मक या संचार (Communication) वाले काम बेहतर होते हैं।
- **How (कैसे):**
  - टीम मीटिंग्स और कॉल्स निपटाएं।
  - हर 45 मिनट में अपनी कुर्सी से उठकर थोड़ा चलें।
  - आँखों को आराम देने के लिए स्क्रीन से दूर देखें।

---

## 9. संध्या और घर वापसी (Transition & Sunset)

- **When (कब):** शाम 6:00 - 7:00 बजे
- **What (क्या):** ऑफिस से निकलना, हल्का व्यायाम या वॉक।
- **Why (क्यों):** यह 'संधिकाल' है (दिन और रात का मिलन)। काम के तनाव को घर ले जाने से रोकने के लिए।
- **How (कैसे):**
  - ऑफिस का काम ऑफिस में छोड़ दें।
  - घर लौटते समय कोई पॉडकास्ट सुनें या शांत रहें।
  - घर पहुंचकर हाथ-मुंह धोएं और दीया जलाएं (त्राटक या प्रार्थना)।

---

## 10. रात्रि भोजन (Dinner)

- **When (कब):** शाम 7:00 - 8:00 बजे (सूर्यास्त के आसपास)
- **What (क्या):** बहुत हल्का भोजन।
- **Why (क्यों):** कफ काल शुरू होने वाला है और पाचन अग्नि मंद हो जाती है। सोने से कम से कम 2-3 घंटे पहले भोजन करना चाहिए।
- **How (कैसे):**
  - खिचड़ी, सूप, या उबली हुई सब्जियां।
  - भारी, तला-भुना या मांसाहार रात में वर्जित है।

---

## 11. स्वाध्याय और शयन (Self-Study & Sleep)

- **When (कब):** रात 9:00 - 10:00 बजे
- **What (क्या):** परिवार के साथ समय, किताब पढ़ना, और सोना।
- **Why (क्यों):** रात 10 बजे से 'पित्त' काल फिर शुरू होता है। अगर आप 10 बजे तक नहीं सोते, तो 'सेकंड विंड' (Second Wind) मिल जाती है और फिर नींद नहीं आती। शरीर की मरम्मत (Repair) इसी समय होती है।
- **How (कैसे):**
  - स्क्रीन (मोबाइल/टीवी) को 9 बजे बंद कर दें।
  - हल्दी वाला दूध (Golden Milk) पी सकते हैं।
  - दिन भर के लिए कृतज्ञता (Gratitude) व्यक्त करें और 10 बजे तक सो जाएं।

### विशेष सुझाव (Special Tips for Office Workers):
1. **Hydration:** अपनी डेस्क पर तांबे का जग रखें और घूंट-घूंट पानी पिएं।
2. **Posture:** रीढ़ की हड्डी सीधी रखें, यह ऊर्जा के प्रवाह (Prana Flow) के लिए जरूरी है।
3. **Breathing:** जब भी तनाव महसूस हो, 2 मिनट के लिए गहरी सांसें (Deep Breathing) लें।

    <script>
        // Configuration: List of files to include
        const files = [
            { name: "Vigyan Bhairav Tantra", id: "book-vigyan" },
            { name: "Patanjali Yoga Sutras", id: "book-patanjali" },
            { name: "Vedic Time Table", id: "book-timetable" }
        ];

        const fileListEl = document.getElementById('fileList');
        const contentEl = document.getElementById('content');
        const sidebarEl = document.getElementById('sidebar');
        const overlayEl = document.querySelector('.overlay');
        let currentTheme = localStorage.getItem('theme') || 'light';

        // Initialize
        function init() {
            setTheme(currentTheme);
            renderFileList();
            
            // Load the first file by default
            if(files.length > 0) {
                loadFile(files[0]);
            }
        }

        // Render Sidebar List
        function renderFileList() {
            fileListEl.innerHTML = '';
            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.textContent = file.name;
                li.onclick = () => {
                    loadFile(file);
                    closeSidebar(); // Close sidebar on mobile after selection
                };
                li.dataset.id = file.id;
                fileListEl.appendChild(li);
            });
        }

        // Load and Render File
        function loadFile(file) {
            // Update Active State
            document.querySelectorAll('.file-item').forEach(el => {
                el.classList.remove('active');
                if(el.dataset.id === file.id) el.classList.add('active');
            });

            contentEl.innerHTML = '<div class="loading">Loading...</div>';

            try {
                // Get embedded content
                const scriptTag = document.getElementById(file.id);
                if (!scriptTag) throw new Error('Content not found');
                
                const text = scriptTag.textContent;
                
                // Parse Markdown
                contentEl.innerHTML = marked.parse(text);
                
                // Scroll to top
                document.querySelector('.main-content').scrollTop = 0;

            } catch (error) {
                contentEl.innerHTML = `
                    <div style="text-align:center; padding: 50px;">
                        <h2>⚠️ Error Loading File</h2>
                        <p>Could not load content for <strong>${file.name}</strong>.</p>
                    </div>
                `;
                console.error(error);
            }
        }

        // Theme Handling
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            currentTheme = theme;
            localStorage.setItem('theme', theme);

            // Update Buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase() === theme) btn.classList.add('active');
            });
        }

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            sidebarEl.classList.toggle('open');
            overlayEl.classList.toggle('open');
        }

        function closeSidebar() {
            sidebarEl.classList.remove('open');
            overlayEl.classList.remove('open');
        }

        // Start
        init();
    </script>
</body>
</html>
