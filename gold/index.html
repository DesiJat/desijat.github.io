<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-top:0;
    text-align:center;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#d4af37;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#b89322;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#fafafa;
    border-radius:8px;
}

.result p{
    margin:8px 0;
}

.total{
    font-size:22px;
    font-weight:bold;
    color:#0a7a0a;
}
</style>
</head>
<body>

<div class="container">

<h2>Gold Price Calculator</h2>

<div class="form-group">
<label>24K Gold Rate (₹ / gram)</label>
<input type="number" id="rate24k" value="15651">
</div>

<div class="form-group">
<label>Gold Purity</label>
<select id="purity">
<option value="1">24K (99.9%)</option>
<option value="0.916" selected>22K (91.6%)</option>
<option value="0.833">20K (83.3%)</option>
<option value="0.75">18K (75%)</option>
<option value="0.585">14K (58.5%)</option>
</select>
</div>

<div class="form-group">
<label>Gold Weight (grams)</label>
<input type="number" id="weight" value="10">
</div>

<div class="form-group">
<label>Making Charges (₹)</label>
<input type="number" id="making" value="0">
</div>

<div class="form-group">
<label>GST (%)</label>
<input type="number" id="gst" value="3">
</div>

<button onclick="calculateGold()">
Calculate
</button>

<div class="result" id="result"></div>

</div>

<script>

function money(value){
    return Number(value).toLocaleString(
        'en-IN',
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );
}

function calculateGold(){

    const rate24k =
        Number(
            document.getElementById('rate24k').value
        );

    const purity =
        Number(
            document.getElementById('purity').value
        );

    const weight =
        Number(
            document.getElementById('weight').value
        );

    const making =
        Number(
            document.getElementById('making').value
        );

    const gstPercent =
        Number(
            document.getElementById('gst').value
        );

    const adjustedRate =
        rate24k * purity;

    const goldValue =
        adjustedRate * weight;

    const subTotal =
        goldValue + making;

    const gstAmount =
        subTotal *
        gstPercent /
        100;

    const finalAmount =
        subTotal + gstAmount;

    document.getElementById('result').innerHTML = `
        <p><strong>Adjusted Gold Rate:</strong> ₹ ${money(adjustedRate)} / gram</p>

        <p><strong>Gold Value:</strong> ₹ ${money(goldValue)}</p>

        <p><strong>Making Charges:</strong> ₹ ${money(making)}</p>

        <p><strong>Subtotal:</strong> ₹ ${money(subTotal)}</p>

        <p><strong>GST (${gstPercent}%):</strong> ₹ ${money(gstAmount)}</p>

        <hr>

        <p class="total">
            Final Value: ₹ ${money(finalAmount)}
        </p>
    `;
}

calculateGold();

</script>

</body>
</html>
